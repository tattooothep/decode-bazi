งจบบนกระดาษเท่านั้น ข้อตกลงปากเปล่าวันนี้คือปัญหางอกของเดือนหน้า"},"劫財|執":{"title":"วันเช็คของในมือคนอื่น","text":"งานที่ฝากเพื่อนไว้ เงินที่คนอื่นถืออยู่ เอกสารที่ยืมกันไป วันนี้ไล่เช็คให้ครบทีละรายการ ของสำคัญอย่าปล่อยไว้ในมือคนอื่นนานเกินจำเป็น"},"劫財|破":{"title":"วันงดคุยเงินกับเพื่อน","text":"วันนี้เสี่ยงแตกหักในวงสูงมาก เรื่องเงินระหว่างเพื่อนห้ามหยิบขึ้นมาคุยเด็ดขาด เลื่อนไปก่อน ถ้ามีวงไหนที่รู้อยู่แก่ใจว่าไม่ใช่ วันนี้ใช้ถอนตัวออกมาได้ขาดที่สุด"},"劫財|危":{"title":"วันอย่าเอาตัวไปค้ำใคร","text":"ค้ำประกัน ให้ยืมก้อนใหญ่ ลงชื่อแทนเพื่อน สามอย่างนี้ห้ามหมดวันนี้ ในวงคนให้ฟังเยอะพูดน้อย ความลับที่หลุดวันนี้เดินทางไวกว่าปกติ"},"劫財|成":{"title":"วันทีมเก็บชัยด้วยกัน","text":"งานที่ลงแรงร่วมกันมาถึงวันออกดอก ฉลองด้วยกัน แบ่งเครดิตให้ทั่วถึงทุกมือที่ช่วย ความใจกว้างวันนี้คือเงินต่อยอดของทีมในศึกหน้า"},"劫財|收":{"title":"วันสรุปบัญชีกองกลาง","text":"เงินรวมกลุ่ม ค่าใช้จ่ายที่ออกแทนกันไว้ ส่วนแบ่งที่เพื่อนถือค้าง วันนี้ตามเก็บและสรุปให้ตัวเลขตรงกันทุกคน บัญชีชัดวันนี้ มิตรภาพยาวถึงปีหน้า"},"劫財|開":{"title":"วันเปิดวงรับคนใหม่","text":"เปิดตัวโปรเจกต์ร่วม ขยายทีม รับสมัครคนเพิ่ม วันนี้คนดีๆ เดินเข้ามาเอง ประกาศออกไปให้ดัง วงที่เปิดรับวันนี้จะได้คนที่อยู่กันยาว"},"劫財|閉":{"title":"วันปิดกระเป๋าปิดวง","text":"งดสังสรรค์สักวัน เงินในกระเป๋าวันนี้รั่วง่ายเป็นพิเศษถ้าออกไปอยู่กลางวง เก็บตัวอยู่กับคนใกล้ชิดไม่กี่คนพอ ความเงียบวันนี้ประหยัดกว่าความสนุกเยอะ"},"食神|建":{"title":"วันเริ่มสิ่งที่ทำแล้วใจฟู","text":"โปรเจกต์สร้างสรรค์ งานอดิเรก คอร์สทำอาหาร สวนหลังบ้าน อะไรที่ทำแล้วมีความสุข วันนี้เริ่มแล้วจะไปได้ยาว เพราะเริ่มจากใจไม่ได้เริ่มจากฝืน"},"食神|除":{"title":"วันล้างความเครียดออกจากตัว","text":"นวด สปา ออกกำลังเบาๆ จัดบ้านให้โล่ง งานไหนที่ฝืนใจทำมานานให้ตัดออกวันนี้ ความเครียดที่ระบายออกวันนี้ออกง่ายกว่าทุกวัน อย่าเก็บไว้ข้ามคืน"},"食神|滿":{"title":"วันโต๊ะเต็มบ้านอุ่น","text":"เลี้ยงฉลอง ทำอาหารเลี้ยงคนที่รัก งานมงคลในครอบครัว วันนี้บรรยากาศเป็นใจสุดๆ มีเด็กในงานยิ่งเสริมโชค ความอิ่มวันนี้อิ่มถึงใจไม่ใช่แค่ท้อง"},"食神|平":{"title":"วันสบายๆ อย่ายัดตาราง","text":"ทำของอร่อยกิน เดินเล่น หยิบงานเบาๆ ที่ชอบมาละเลียด วันนี้จังหวะชีวิตขอช้าหน่อย อย่าอัดนัดแน่น ความเรียบง่ายวันนี้คือของขวัญ รับไว้เถอะ"},"食神|定":{"title":"วันปิดดีลบนโต๊ะอาหาร","text":"นัดคุยงานแบบสบายๆ มื้อกลางวันมื้อเย็นนี่แหละห้องประชุมที่ดีสุดของวัน เรื่องที่เครียดบนโต๊ะประชุม พอย้ายมาโต๊ะอาหารแล้วลงตัวง่ายอย่างไม่น่าเชื่อ"},"食神|執":{"title":"วันเก็บงานละเอียดด้วยใจเย็น","text":"งานฝีมือ งานครีเอทีฟที่ต้องเนี้ยบทุกมุม วันนี้มือนิ่งใจเย็นเป็นพิเศษ ค่อยๆ ทำ ค่อยๆ ชิม ค่อยๆ ขัด ของดีไม่เคยเสร็จเร็ว และวันนี้เราไม่รีบ"},"食神|破":{"title":"วันเลิกฝืนสนุก","text":"กิจกรรมที่เคยชอบแต่ตอนนี้ทำแล้วเหนื่อยใจ วันนี้ยอมรับและวางลงได้เลย อย่าฝืนยิ้มทั้งที่ข้างในล้า คืนพื้นที่ว่างให้ตัวเอง แล้วความสุขใหม่จะมีที่ลง"},"食神|危":{"title":"วันเพลินได้แต่มีเพดาน","text":"ของอร่อย ของหวาน ตะกร้าช้อปปิ้ง คือหลุมพรางประจำวันนี้ เพลินได้แต่ตั้งเพดานก่อนเริ่ม กินดื่มพอดีๆ กระเป๋ากับพุงจะขอบคุณเราพรุ่งนี้เช้า"},"食神|成":{"title":"วันปล่อยของแล้วคนรัก","text":"ผลงานสร้างสรรค์ที่บ่มมานานเสร็จพอดีวัน ปล่อยออกไปเลย เสียงตอบรับจะอบอุ่นเกินคาด งานที่ทำจากความสุขมันส่งกลิ่นหอมของมันเอง คนดูรู้"},"食神|收":{"title":"วันงานที่รักเริ่มคืนเงิน","text":"รายได้จากงานฝีมือ คอนเทนต์ ร้านเล็กๆ ที่ปั้นด้วยใจ วันนี้ตามเก็บได้เป็นกอบเป็นกำ จดสูตรเด็ด จดเคล็ดลับที่เพิ่งค้นพบเก็บเข้าคลังไว้ต่อยอด"},"食神|開":{"title":"วันเปิดร้านเปิดเมนู","text":"เปิดร้าน เปิดเมนูใหม่ ปล่อยคอนเทนต์ตัวแรก เปิดคลาสสอนสิ่งที่รัก วันนี้เสน่ห์เราดึงคนเข้ามาเอง ประตูที่เปิดด้วยรอยยิ้มวันนี้จะมีคนเดินเข้าไม่ขาด"},"食神|閉":{"title":"วันความสุขเงียบๆ","text":"นอนเร็ว ทำอาหารกินเองเงียบๆ ดูหนังที่ค้างไว้ วันนี้ความสุขไม่ต้องหาข้างนอก มันอยู่ในบ้านเราแล้ว พักให้เต็มอิ่ม พรุ่งนี้ค่อยไปต่อ"},"傷官|建":{"title":"วันเริ่มแผนฉีกแนว","text":"ไอเดียที่ไม่เหมือนใครที่เก็บไว้ในลิ้นชัก วันนี้หยิบมาร่างเป็นแผนจริงได้เลย ความคิดแล่นเร็วและคมเป็นพิเศษ แหกกรอบได้แต่แหกอย่างมีชั้นเชิง อย่าเหยียบเท้าใครตอนออกตัว"},"傷官|除":{"title":"วันรื้อวิธีเก่าที่อืด","text":"ขั้นตอนทำงานที่อืดมานาน วันนี้รื้อทิ้งแล้วเขียนใหม่ให้ลื่น ตัดขั้นตอนขยะออกไม่ต้องเสียดาย หัวเราแล่นพอจะเห็นว่าตรงไหนเกิน ตรงไหนขาด ลงมือเลย"},"傷官|滿":{"title":"วันเวทีเต็มคนฟัง","text":"นำเสนอ พรีเซนต์ ขึ้นเวที วันนี้คนพร้อมฟังเราเต็มห้อง โชว์ไอเดียได้สุดทาง แต่ไฟแรงวันนี้มีคมสองด้าน อย่าเผลอปล่อยมุกเหยียบใครกลางวง เสียของหมด"},"傷官|平":{"title":"วันขัดไอเดียให้ใช้ได้จริง","text":"ไอเดียบรรเจิดจะมีค่าก็ต่อเมื่อใช้ได้จริง วันนี้เหมาะปรับของล้ำให้ติดดิน งานเขียนงานแก้แบบเดินลื่น คุยแลกความคิดกับคนระดับเดียวกันแล้วสนุกจนลืมเวลา"},"傷官|定":{"title":"วันพูดเก่งก็ต้องเขียนให้ชัด","text":"ปิดดีลได้ด้วยฝีปากวันนี้ แต่ห้ามจบแค่คำพูดเด็ดขาด ตกลงอะไรได้ให้เขียนเป็นลายลักษณ์ทันที ขอบเขตงานยิ่งชัดยิ่งดี คารมดีวันนี้คือดาบสองคมของเดือนหน้า"},"傷官|執":{"title":"วันขัดชิ้นงานให้คม","text":"ดราฟต์ที่ค้าง คอนเทนต์ที่ติดท่อ วันนี้นั่งเกลาให้จบทีละชิ้น สายตาเราเห็นตำหนิที่เมื่อวานมองข้าม แก้อีกสามรอบก็ยังไหว เพราะวันนี้ยิ่งขัดยิ่งคม"},"傷官|破":{"title":"วันปากคือชนวน","text":"คำวิจารณ์เจ้านาย ผู้ใหญ่ หรือกติกาองค์กร วันนี้เก็บไว้ในใจก่อน พูดออกไปวันนี้คือระเบิด ถ้ามีแรงอยากรื้ออะไร ไปรื้อของเก่าที่ควรทิ้งจริงๆ แทน ได้ประโยชน์กว่ากันเยอะ"},"傷官|危":{"title":"วันไอเดียล้ำแต่พื้นบาง","text":"ความคิดวันนี้ล้ำจริงแต่พื้นข้างใต้ยังไม่แน่น อย่าเพิ่งประกาศใหญ่โต เช็คข้อกฎหมาย เช็คกติกา เช็คลิขสิทธิ์ให้ครบก่อน ของดีที่ออกตัวผิดจังหวะจะกลายเป็นของเสียทันที"},"傷官|成":{"title":"วันความคิดสร้างชื่อ","text":"งานที่ใช้หัวคิดฉีกแนวถึงวันเปิดตัว โลกพร้อมเห็นแล้วว่าเราไม่เหมือนใคร สไตล์ที่เคยถูกมองว่าแปลก วันนี้กลายเป็นลายเซ็น รับคำชมไปเต็มๆ ไม่ต้องถ่อม"},"傷官|收":{"title":"วันเก็บค่าความคิด","text":"ค่าไอเดีย ค่าลิขสิทธิ์ ค่างานครีเอทีฟที่ค้างจ่าย วันนี้ตามเก็บได้ครบ ปิดจ็อบแล้วรวบผลงานเข้าพอร์ต ของที่เราคิดมีราคา และวันนี้คือวันขึ้นเงิน"},"傷官|開":{"title":"วันปล่อยของให้โลกเห็น","text":"แคมเปญใหม่ ช่องทางใหม่ นวัตกรรมที่ซุ่มทำ วันนี้เปิดตัวแล้วเสียงดังในทางที่ดี ความกล้าพูดกล้าโชว์ของเราวันนี้คือแม่เหล็ก ยิ่งจริงใจยิ่งดูดคน"},"傷官|閉":{"title":"วันบ่มไอเดียไว้ก่อน","text":"ความคิดดีๆ ที่ผุดวันนี้ให้จดลงสมุดแต่อย่าเพิ่งปล่อย มันยังไม่สุก โพสต์เรื่องอ่อนไหวงดให้หมด วันนี้โลกไม่ต้องรู้ว่าเราคิดอะไร เดี๋ยวถึงเวลามันจะดังเอง"},"正財|建":{"title":"วันวางระบบเงินใหม่","text":"เปิดบัญชีเงินเก็บ เริ่มแผนรายรับรายจ่าย เริ่มงานที่เงินเข้าแน่นอนทุกเดือน วันนี้วางรากการเงินแล้วรากแข็ง เรื่องเงินที่เริ่มแบบมีระบบวันนี้จะเลี้ยงเราไปอีกนาน"},"正財|除":{"title":"วันอุดรูรั่วกระเป๋า","text":"ค่าสมาชิกที่ไม่ได้ใช้ รายจ่ายจุกจิกที่ไหลทิ้งทุกเดือน วันนี้ไล่ยกเลิกให้เกลี้ยง หนี้ก้อนเล็กก้อนน้อยปิดให้จบ เงินที่หยุดรั่ววันนี้คือเงินเก็บของทั้งปี"},"正財|滿":{"title":"วันเงินหมุนคึกคัก","text":"ขายดี ของเข้าของออกไหลลื่น ลูกค้าแน่นกว่าปกติ แต่วันเงินเยอะคือวันตัวเลขหลุดง่าย บันทึกทุกรายการอย่าให้ตกหล่น กำไรจริงอยู่ในสมุดบัญชีไม่ใช่ในความรู้สึก"},"正財|平":{"title":"วันบัญชีเรียบร้อย","text":"ทำบัญชี จ่ายบิล กระทบยอด ต่อรองราคาแบบตรงไปตรงมา วันนี้ตัวเลขนิ่งไม่มีเซอร์ไพรส์ งานการเงินประจำที่น่าเบื่อ ทำวันนี้แล้วเสร็จไวผิดปกติ"},"正財|定":{"title":"วันล็อกราคาล็อกดีล","text":"เซ็นดีลซื้อขาย ตกลงเงินเดือน เคาะราคางาน วันนี้ตัวเลขที่ตกลงแล้วยืนได้ยาวไม่พลิก ทั้งสองฝ่ายสบายใจ ดีลการเงินที่ผูกวันนี้เป็นดีลที่แฟร์และแน่น"},"正財|執":{"title":"วันไล่เก็บทีละบรรทัด","text":"ใบแจ้งหนี้ค้างส่ง เอกสารเบิกจ่าย ยอดที่ยังไม่กระทบ วันนี้นั่งไล่ทีละบรรทัดจนครบ ความละเอียดวันนี้คือกำไรตรงๆ เจอตัวเลขเพี้ยนหนึ่งจุดอาจคุ้มทั้งวัน"},"正財|破":{"title":"วันห้ามซื้อใหญ่ห้ามลงทุนใหม่","text":"ของชิ้นใหญ่ การลงทุนก้อนใหม่ วันนี้ห้ามควักเด็ดขาด เงินออกวันนี้ไหลไม่กลับ แต่ถ้ามีหนี้เสียหรือการลงทุนที่ขาดทุนยืดเยื้อ วันนี้ตัดขายทิ้งได้เด็ดขาดที่สุด"},"正財|危":{"title":"วันเงินก้อนใหญ่ห้ามขยับ","text":"โอนก้อนใหญ่ ย้ายพอร์ต เซ็นกู้ วันนี้เลื่อนให้หมด มิจฉาชีพและสัญญาแฝงดอกชุกเป็นพิเศษ ใครยื่นอะไรมาให้อ่านตัวหนังสือเล็กๆ สามรอบ ไม่ชัวร์คือไม่เซ็น"},"正財|成":{"title":"วันรับเงินก้อนที่รอ","text":"ดีลที่บ่มมานานสุกงอมพอดี ปิดการขายได้ เงินก้อนที่ตามมาหลายเดือนเข้าบัญชีวันนี้ เก็บหลักฐานให้ครบ ขอบคุณคู่ค้าให้สวย แล้วดีลหน้าจะง่ายกว่าเดิม"},"正財|收":{"title":"วันเก็บเงินเข้ากระเป๋า","text":"ทวงหนี้ เก็บค่าเช่า โอนเข้าบัญชีออม วันนี้คือวันเก็บแท้ๆ เงินวิ่งเข้าง่ายกว่าปกติ แต่กฎเหล็กคือห้ามปล่อยเงินออกใหม่ วันนี้กระเป๋ามีไว้รับ ไม่ได้มีไว้จ่าย"},"正財|開":{"title":"วันเปิดทางเงินใหม่ที่จับต้องได้","text":"เปิดหน้าร้าน เปิดรายได้เสริมที่มีลูกค้าจริง ขึ้นราคาอย่างมีเหตุผล วันนี้ตลาดเปิดรับ เงินทางใหม่ที่เริ่มวันนี้ไม่ใช่เงินลม เป็นเงินที่นับได้จริงทุกสิ้นเดือน"},"正財|閉":{"title":"วันปิดงบเก็บเงินเข้าเซฟ","text":"ปิดยอด ปิดงบเดือน ย้ายเงินเข้าที่ปลอดภัย วันนี้เหมาะสรุปมากกว่าใช้ ตะกร้าออนไลน์ที่ค้างไว้ให้ปล่อยมันค้างต่อไป กระเป๋าที่ปิดสนิทวันนี้คือกระเป๋าที่หนักขึ้นเดือนหน้า"},"偏財|建":{"title":"วันเปิดดีลเสริมนอกสาย","text":"รายได้เสริม ดีลระยะสั้น ลูกค้านอกสายตาที่เพิ่งทาบทาม วันนี้เริ่มได้จังหวะดี เงินจรกำลังมองหาที่ลง แค่เราต้องยื่นมือออกไปก่อน อย่ารอให้มันลอยมาเอง"},"偏財|除":{"title":"วันล้างของค้างพอร์ต","text":"ดีลที่ไม่คืนกำไร ของค้างสต๊อกที่กินที่ พอร์ตส่วนที่ถ่วง วันนี้ล้างออกได้ใจถึงที่สุด ปล่อยของเก่าออกไปให้ว่าง โอกาสใหม่ถึงจะมีที่จอด"},"偏財|滿":{"title":"วันลาภวิ่งเข้าหลายทาง","text":"งานสังคมวันนี้คือบ่อทอง คนแนะนำคนต่อเป็นทอดๆ นามบัตรแจกให้ทั่ว แต่ปากอย่ารับปากเกินตัว โอกาสมาสิบทางไม่ได้แปลว่าต้องคว้าทั้งสิบ เลือกที่ใช่พอ"},"偏財|平":{"title":"วันโอกาสมาแบบเงียบๆ","text":"ดีลดีๆ วันนี้ไม่ได้มาแบบเสียงดัง มันแฝงมาในบทสนทนาเล่นๆ กับคนรู้จัก เปิดหูไว้ตลอดวัน คำพูดผ่านๆ ของใครบางคนวันนี้อาจกลายเป็นรายได้ทั้งไตรมาส"},"偏財|定":{"title":"วันจับโอกาสให้เป็นสัญญา","text":"โอกาสที่ลอยวนอยู่รอบตัวหลายวัน วันนี้ต้องล็อกให้เป็นลายลักษณ์ก่อนลมเปลี่ยนทิศ เงื่อนไขไหนคุยได้แล้วให้เคาะเลย ของแบบนี้ผ่านแล้วผ่านเลย ไม่แวะรอบสอง"},"偏財|執":{"title":"วันขุดโอกาสจากรายละเอียด","text":"ดีลค้างท่อที่ทุกคนลืม เงื่อนไขที่ไม่มีใครอ่านถึงหน้าสุดท้าย วันนี้เจาะลงไปแล้วจะเจอของดีที่คนอื่นมองข้าม โอกาสงามๆ ของวันนี้ซ่อนอยู่ใต้กองเอกสาร"},"偏財|破":{"title":"วันเงินง่ายคือเหยื่อ","text":"หวย พนัน เก็งกำไรร้อน ของที่การันตีผลตอบแทนสูงผิดปกติ วันนี้ห้ามแตะทุกชนิด แต่ถ้าติดวงจรเสี่ยงอะไรอยู่ วันนี้คือวันตัดขาดที่เด็ดขาดที่สุดของเดือน"},"偏財|危":{"title":"วันโอกาสหอมผิดปกติ","text":"ดีลที่ดูดีเกินจริง คนแปลกหน้าที่ใจดีเกินเหตุ วันนี้คือวันของกับดักฉาบทอง ก่อนควักกระเป๋าให้ตรวจที่มาให้ลึกสามชั้น ของจริงไม่กลัวการตรวจสอบ ของปลอมจะรีบเร่งเรา"},"偏財|成":{"title":"วันตาไวได้รางวัล","text":"จังหวะเสี่ยงที่คำนวณมาดีแล้วออกผลวันนี้ ปิดดีลเสริมได้สวยงาม กำไรที่ได้มาจากสายตาไม่ใช่โชคช่วย จดวิธีคิดของรอบนี้ไว้ มันจะใช้ได้อีกหลายรอบ"},"偏財|收":{"title":"วันเก็บกำไรอย่าโลภต่อ","text":"ส่วนที่ถึงเป้าแล้วขายเก็บกำไรได้เลยวันนี้ เงินจรที่วิ่งเข้ามาให้รีบพาเข้าบัญชี อย่าต่อรอบด้วยความโลภ กำไรที่ไม่ได้เก็บยังไม่ใช่กำไร มันเป็นแค่ตัวเลข"},"偏財|開":{"title":"วันลองตลาดที่ไม่เคยลอง","text":"ช่องทางขายใหม่ กลุ่มลูกค้าที่ไม่เคยแตะ วันนี้เปิดแล้วมีคนรับ คนแปลกหน้าคือแหล่งลาภของวันนี้ ก้าวออกจากสนามเดิมสักก้าว เงินก้อนใหม่อยู่นอกรั้วที่เราคุ้น"},"偏財|閉":{"title":"วันพักการเสี่ยงทุกชนิด","text":"เงินจรวันนี้เข้าไวออกไวผิดปกติ ได้มาเท่าไหร่ให้ล็อกเข้าบัญชีที่ถอนยากทันที การเสี่ยงทุกรูปแบบพักไว้ก่อน มือที่ว่างจากการพนันวันนี้คือมือที่พร้อมรับโอกาสจริงพรุ่งนี้"},"正官|建":{"title":"วันเดินเรื่องทางการ","text":"ยื่นเอกสารราชการ เปิดเรื่องขอตำแหน่ง เริ่มกระบวนการที่มีขั้นตอนชัด วันนี้ระบบเป็นมิตรกับเรา ทำถูกขั้นตอนแล้วเรื่องลื่นผิดปกติ เตรียมเอกสารให้ครบแล้วเดินเข้าไปเลย"},"正官|除":{"title":"วันล้างประวัติให้สะอาด","text":"เรื่องค้างกับหน่วยงาน ใบอนุญาตที่ติดขัด ข้อผิดพลาดในระบบที่แขวนชื่อเราไว้ วันนี้เดินเรื่องแก้ได้จบ ประวัติที่สะอาดคือทรัพย์สินระยะยาว เคลียร์วันนี้สบายไปอีกนาน"},"正官|滿":{"title":"วันพิธีการเต็มยศ","text":"งานแต่งตั้ง งานฉลองตำแหน่ง พิธีเปิดที่ผู้ใหญ่มาเต็ม วันนี้แสงส่องมาที่เรา วางตัวให้สมบทบาท พูดน้อยแต่พูดให้มีน้ำหนัก ภาพจำวันนี้จะติดตาผู้ใหญ่ไปอีกนาน"},"正官|平":{"title":"วันตรงเวลาคือแต้มบวก","text":"ประชุมตามวาระ เอกสารประจำรอบ งานที่ต้องรายงานตามระบบ วันนี้เดินเรียบไม่มีคลื่น สิ่งเดียวที่ต้องทำให้เป๊ะคือเวลา คนที่ตรงเวลาวันนี้ถูกจดชื่อไว้ในทางที่ดี"},"正官|定":{"title":"วันผูกพันธะอย่างเป็นทางการ","text":"เซ็นสัญญาใหญ่ หมั้นหมาย รับตำแหน่ง แต่งตั้งคน วันนี้พันธะที่ผูกจะมั่นคงยาวนาน เรื่องที่ประกาศต่อหน้าคนหลายคนวันนี้ ฟ้าดินรับรู้และหนุนให้ยืน"},"正官|執":{"title":"วันตามเรื่องแบบสุภาพแต่ไม่ปล่อย","text":"เรื่องที่ยื่นค้างไว้ คำตอบที่เงียบหาย วันนี้ตามได้ผล ทวงแบบสุภาพ อ้างอิงเลขที่เอกสารให้ครบ ระบบราชการขยับให้คนที่ตามถูกวิธี และวันนี้วิธีเราถูก"},"正官|破":{"title":"วันอย่าเปิดศึกกับระบบ","text":"ขัดแย้งกับเจ้านาย ฟ้องร้อง ยื่นอุทธรณ์ วันนี้งดให้หมด แรงปะทะกับผู้มีอำนาจวันนี้เจ็บฝ่ายเราอย่างเดียว แต่ถ้ามีเรื่องที่อยากถอนฟ้อง ถอนเรื่อง เลิกรา วันนี้ทำได้จบสวย"},"正官|危":{"title":"วันชื่อเสียงเปราะ","text":"อย่าลงนามแทนใคร อย่ารับผิดชอบสิ่งที่เห็นไม่เต็มตา อย่าให้ใครยืมชื่อ วันนี้ชื่อเสียงที่สะสมมาหลายปีเสี่ยงกว่าปกติ ปกป้องลายเซ็นตัวเองเหมือนปกป้องเงินก้อนสุดท้าย"},"正官|成":{"title":"วันได้ตำแหน่งได้อนุมัติ","text":"เรื่องทางการที่รอมานานอนุมัติวันนี้ ตำแหน่งที่หวังมีชื่อเราติดประกาศ ผู้ใหญ่เห็นผลงานชัดเจน อย่าลืมขอบคุณคนที่ช่วยดันเรื่องให้ บันไดขั้นถัดไปจะได้มีคนคอยจับ"},"正官|收":{"title":"วันเบิกสิทธิ์ที่ถึงกำหนด","text":"สวัสดิการค้างเบิก สิทธิ์ที่ครบกำหนด เอกสารที่ต้องรวบปิดแฟ้ม วันนี้เดินเรื่องเก็บได้ครบถ้วน ผลของหน้าที่ที่ทำมาตลอดปี วันนี้แปลงเป็นของจริงที่จับต้องได้"},"正官|開":{"title":"วันเปิดเส้นทางอาชีพใหม่","text":"สมัครตำแหน่งใหม่ เปิดบริษัทจดทะเบียนถูกต้อง ยื่นเรื่องเลื่อนขั้น วันนี้ประตูสายอาชีพเปิดกว้าง เดินเข้าไปแบบมีเอกสารครบมือ โอกาสทางการวันนี้ให้คนที่พร้อมเท่านั้น"},"正官|閉":{"title":"วันเก็บแฟ้มทบทวนกติกา","text":"งดยื่นเรื่องใหม่วันนี้ ระบบไม่รับแขก เอาเวลาจัดแฟ้มเอกสารให้เรียบร้อย อ่านกติกา อ่านระเบียบที่เกี่ยวกับก้าวต่อไปให้แตก คนที่รู้กติกาลึกสุดคือคนที่ชนะรอบหน้า"},"七殺|建":{"title":"วันเปิดภารกิจหิน","text":"ศึกที่เลี่ยงไม่ได้ ภารกิจที่ยากที่สุดในลิสต์ วันนี้เปิดฉากได้เพราะใจเราถึงเป็นพิเศษ แต่กล้าอย่างเดียวไม่พอ ต้องมีแผนสำรองติดมือ ลุยด้วยสมองไม่ใช่แค่หมัด"},"七殺|除":{"title":"วันผ่าตัดปัญหาเรื้อรัง","text":"ปัญหาที่หนีมานาน แผลที่ปล่อยให้ลามมาหลายเดือน วันนี้มีดคมพอจะผ่าออก เจ็บสั้นๆ วันนี้ดีกว่าปวดยาวอีกปี เผชิญหน้าตรงๆ แล้วมันจะจบจริง"},"七殺|滿":{"title":"วันศึกมาหลายด้าน","text":"แรงกดดันถาโถมพร้อมกันหลายทาง เดดไลน์ชน คนทวง ปัญหางอก อย่ารับศึกทุกด้านพร้อมกัน จัดลำดับว่าด่านไหนต้องจบก่อน แล้วตีทีละด่าน วันนี้ชนะด้วยลำดับไม่ใช่ความเร็ว"},"七殺|平":{"title":"วันซ้อมรบช่วงพักยก","text":"แรงบีบเบาลงชั่วคราว อย่าเพิ่งวางใจว่าจบ ใช้วันนี้เคลียร์งานหนักแบบมีจังหวะ ซ้อมแผนรับมือรอบหน้า ลับอาวุธตอนสนามเงียบ พอศึกมาจริงเราจะพร้อมกว่าทุกคน"},"七殺|定":{"title":"วันตัดสินใจแล้วไม่เหลียวหลัง","text":"เรื่องใหญ่ที่แขวนอยู่กลางใจมานาน วันนี้ต้องเคาะ ข้อมูลมีครบแล้ว เหลือแค่ความกล้า เลือกทางแล้วเดินเลยไม่ต้องหันกลับ การลังเลต่อจากวันนี้แพงกว่าการเลือกผิด"},"七殺|執":{"title":"วันกัดไม่ปล่อย","text":"ปัญหายากที่ทุกคนถอย วันนี้เราไล่บี้ได้ทีละปมด้วยวินัยเหล็ก ไม่ต้องเร็วแต่ห้ามหยุด ความอึดวันนี้คืออาวุธลับ ปมที่แก้ไม่ได้มาทั้งเดือนจะคลายในมือคนที่ไม่ยอมวาง"},"七殺|破":{"title":"วันถอยหนึ่งก้าวคือชนะ","text":"วันนี้ชนวนปะทะไวมาก คำเดียวผิดที่อาจแตกหักถาวร ถอยหนึ่งก้าวไม่ใช่แพ้ มันคือการเลือกสนาม ถ้ามีอะไรต้องทุบทิ้งจริงๆ เช่น ของเก่าที่หมดอายุ วันนี้ทุบได้เต็มแรง"},"七殺|危":{"title":"วันอันตรายซ้อนอันตราย","text":"เสี่ยงกาย เสี่ยงคำพูด เสี่ยงเงิน งดครบทั้งสามวันนี้ ที่สูง เครื่องจักร ถนนลื่น เลี่ยงได้เลี่ยง เรื่องร้อนให้คนกลางคุยแทน วันนี้เก็บตัวในที่ปลอดภัยคือกลยุทธ์ ไม่ใช่ความขลาด"},"七殺|成":{"title":"วันศึกยาวจบด้วยชัย","text":"เรื่องที่สู้มายาวนานปิดฉากวันนี้ด้วยผลที่เราต้องการ ความกล้าที่เคยถูกมองว่าบ้าบิ่น วันนี้ถูกจดจำว่าเด็ดเดี่ยว รับความดีความชอบเต็มๆ แล้วพักหายใจให้เต็มปอด"},"七殺|收":{"title":"วันถอดบทเรียนเก็บอำนาจต่อรอง","text":"ศึกที่ผ่านมาให้อะไรมากกว่าชัยชนะ ถอดบทเรียนใส่กระเป๋า รวบอำนาจต่อรอง คอนเนคชั่น และความเกรงใจที่ได้มา เก็บเข้าคลังอย่างเงียบๆ ของพวกนี้จะออกดอกตอนศึกหน้า"},"七殺|開":{"title":"วันเปิดเกมรุกก่อนใคร","text":"คู่แข่งยังตั้งตัวไม่ติด ตลาดยังไม่ทันขยับ วันนี้ฟ้าเปิดให้คนกล้าลงมือก่อน เปิดเกมรุกที่คิดมานานได้เลย ความได้เปรียบของคนเดินก่อนวันนี้จะกินยาวหลายเดือน"},"七殺|閉":{"title":"วันพักรบถอนกำลัง","text":"วันนี้การนิ่งคือแต้มต่อ ถอนกำลังจากสนามที่ไม่คุ้ม อย่าแบกทุกศึกไว้คนเดียว มอบหมายได้มอบหมาย ปิดประตูพักผ่อนให้จริง แม่ทัพที่พักเป็นคือแม่ทัพที่อยู่รอดถึงสงครามหน้า"},"正印|建":{"title":"วันเปิดตำราบทใหม่","text":"สมัครคอร์ส เริ่มเรียนศาสตร์ใหม่ เริ่มเขียนคู่มือหรือหนังสือของตัวเอง วันนี้เริ่มเรื่องสายรู้แล้วมีผู้ใหญ่คอยหนุนตั้งแต่ก้าวแรก ความรู้ที่เริ่มเก็บวันนี้จะกลายเป็นบ้านหลังที่สอง"},"正印|除":{"title":"วันอัปเดตความรู้เก่า","text":"ความเชื่อที่ล้าสมัย ข้อมูลเก่าที่โลกวิ่งแซงไปแล้ว วันนี้ล้างออกจากหัวได้ง่ายที่สุด เคลียร์กองหนังสือ จัดไฟล์ให้เป็นระบบ พื้นที่สมองที่โล่งขึ้นวันนี้คือที่อยู่ของวิชาใหม่"},"正印|滿":{"title":"วันความเมตตาล้อมตัว","text":"งานสอน งานถ่ายทอด งานที่ต้องแบ่งปันความรู้ วันนี้คนพร้อมช่วยเราเต็มมือ ผู้ใหญ่ใจดีโผล่มาถูกจังหวะ รับน้ำใจไว้แล้วจดชื่อผู้ให้ วันหน้าเราจะได้เป็นฝ่ายส่งต่อ"},"正印|平":{"title":"วันสะสมทีละหน้า","text":"อ่าน เขียน ทบทวน แบบไม่ต้องรีบ วันนี้สมองซึมซับดีเป็นพิเศษกับของที่ค่อยๆ เข้า ยี่สิบหน้าวันนี้มีค่ากว่าสองร้อยหน้าตอนใกล้สอบ ความสม่ำเสมอคือพรสวรรค์ที่ฝึกได้"},"正印|定":{"title":"วันผูกสัญญากับผู้หลักผู้ใหญ่","text":"ตกลงเรื่องทุน เรื่องเรียน สัญญาระยะยาวที่มีผู้ใหญ่เกี่ยวข้อง วันนี้คำสัญญามีคนคุ้มครอง เงื่อนไขที่ตกลงจะแฟร์กับเราเกินคาด เพราะอีกฝ่ายเมตตาเราอยู่แล้วตั้งแต่ต้น"},"正印|執":{"title":"วันตามใบรับรองให้ครบ","text":"หน่วยกิตค้าง ใบรับรองที่ยังไม่ได้ไปรับ เอกสารวิชาการที่ขาดหน้า วันนี้ตามเก็บให้ครบทุกใบ ของพวกนี้ดูจุกจิกแต่คือกุญแจของประตูบานหน้า เก็บวันนี้ไม่ต้องวิ่งวุ่นวันเดดไลน์"},"正印|破":{"title":"วันเลิกเชื่อสิ่งที่พิสูจน์แล้วว่าผิด","text":"อย่าเถียงครู อย่าหักหน้าผู้มีพระคุณวันนี้ แรงปะทะกับคนที่เคยช่วยเราจะเจ็บลึกทั้งสองฝ่าย แต่ความเชื่อเก่าของตัวเองที่พิสูจน์แล้วว่าผิด วันนี้ทุบทิ้งได้เลยไม่ต้องเสียดาย"},"正印|危":{"title":"วันข่าวปลอมชุก","text":"ข้อมูลปลอม ข่าวลือ สถิติแต่ง วันนี้ลอยว่อนกว่าปกติ เช็คแหล่งที่มาก่อนเชื่อ เช็คซ้ำก่อนแชร์ และอย่าลงชื่อรับรองใครหรืออะไรง่ายๆ ความน่าเชื่อถือของเราแพงกว่าความไวของข่าว"},"正印|成":{"title":"วันความพยายามสายรู้ออกดอก","text":"สอบผ่าน ได้ใบรับรอง งานเขียนได้ตีพิมพ์ วันที่ห้องสมุดกับโต๊ะอ่านหนังสือตอบแทนเรา ความรู้ที่สะสมเงียบๆ วันนี้มีตราประทับรับรองอย่างเป็นทางการ ฉลองได้เต็มที่"},"正印|收":{"title":"วันสรุปวิชาเข้าคลัง","text":"จบคอร์ส จบเล่ม จบโปรเจกต์เรียนรู้ วันนี้อย่าเพิ่งรีบไปต่อ นั่งสรุปสิ่งที่ได้ลงสมุดหนึ่งหน้า วิชาที่ไม่ได้สรุปจะระเหย วิชาที่สรุปแล้วจะอยู่กับเราตลอดชีวิต"},"正印|開":{"title":"วันเปิดคลาสแบ่งปันวิชา","text":"เปิดสอน เปิดคลาส แชร์ความรู้สู่สาธารณะ วันนี้คนพร้อมรับสิ่งที่เรารู้ การสอนคือการเรียนรอบสอง ยิ่งให้ยิ่งแตกฉาน และชื่อเสียงสายวิชาการจะตามมาเอง"},"正印|閉":{"title":"วันร่างกายขอซ่อมตัว","text":"นอนให้พอ ปิดจอเร็ว งดยัดข้อมูลเข้าหัว วันนี้ร่างกายและสมองกำลังซ่อมแซมตัวเอง การพักไม่ใช่การหยุดก้าวหน้า มันคือการก้าวหน้าในโหมดเงียบ พรุ่งนี้จะสดกว่าเดิม"},"偏印|建":{"title":"วันเริ่มเส้นทางที่คนอื่นยังไม่เห็น","text":"ศาสตร์เฉพาะทาง โปรเจกต์ลับส่วนตัว แนวทางที่คนรอบตัวยังไม่เข้าใจ วันนี้เริ่มได้เลยโดยไม่ต้องขอเสียงเชียร์จากใคร เส้นทางแปลกที่เริ่มวันนี้ อีกสองปีคนจะเรียกว่าวิสัยทัศน์"},"偏印|除":{"title":"วันตัดเสียงรบกวนออกจากหัว","text":"ข้อมูลขยะ ฟีดที่เลื่อนแล้วใจขุ่น วงสนทนาที่คิดกันคนละคลื่น วันนี้ถอนตัวออกได้เงียบๆ หัวที่โล่งจากเสียงคนอื่นจะได้ยินเสียงตัวเองชัดขึ้นทันที และเสียงนั้นแม่นกว่าที่คิด"},"偏印|滿":{"title":"วันสัญญาณล้นจอ","text":"ลางสังหรณ์ ความฝัน สัญญาณรอบตัว วันนี้มาถี่จนล้น จดทุกอย่างที่ผุดขึ้นมาลงสมุดไว้ก่อน แต่ยังไม่ต้องเชื่อทั้งหมด ของจริงจะกลับมาซ้ำ ของหลอกจะจางไปเอง"},"偏印|平":{"title":"วันทำงานเงียบหลังฉาก","text":"วิจัย วิเคราะห์ เขียนสูตร งานลึกที่ต้องการสมาธิยาวๆ วันนี้โฟกัสมาเต็มถัง ปิดแจ้งเตือนแล้วดำดิ่งลงไป งานหลังฉากวันนี้คือรากของผลงานหน้าฉากเดือนหน้า"},"偏印|定":{"title":"วันวงในตัดสินใจ","text":"เรื่องเฉพาะทางให้ตกลงกับคนที่เข้าใจมันจริงๆ เท่านั้น วงในไม่กี่คนเคาะกันวันนี้ได้เลย วงนอกไม่ต้องรู้ทุกรายละเอียด ความเงียบของแผนคือเกราะของแผน"},"偏印|執":{"title":"วันขุดชั้นที่คนมองข้าม","text":"ตรวจงานซ้ำอีกชั้นที่ลึกกว่าเดิม ความผิดปกติเล็กๆ ซ่อนอยู่ในมุมที่ทุกคนเดินผ่าน วันนี้ตาเราคมกับของแบบนี้เป็นพิเศษ จุดเล็กที่เจอวันนี้อาจกันเรื่องใหญ่เดือนหน้าได้ทั้งเรื่อง"},"偏印|破":{"title":"วันอย่าตัดสินใจตอนใจมืด","text":"ความคิดวนลบๆ วันนี้แรงกว่าปกติ ห้ามตัดสินใจเรื่องใหญ่ตอนอารมณ์ดิ่ง แต่ความเชื่อพิษหรือความสัมพันธ์พิษที่กัดเรามานาน วันนี้เห็นมันชัดที่สุดและตัดได้ขาดที่สุด"},"偏印|危":{"title":"วันลางบอกให้ฟังแต่อย่าเพิ่งเชื่อ","text":"สังหรณ์ไม่ดีวันนี้ให้รับฟังไว้ แล้วไปตรวจข้อเท็จจริงก่อนทำตาม อย่าอยู่ที่เปลี่ยวคนเดียว งดของมึนเมาให้ขาด เส้นแบ่งระหว่างญาณกับจินตนาการวันนี้บางเป็นพิเศษ"},"偏印|成":{"title":"วันตัวจริงถูกตามหา","text":"งานเฉพาะทางที่บ่มเงียบๆ มานานสำเร็จวันนี้ สิ่งที่เคยถูกมองว่าแปลกกลายเป็นของหายากที่ต
