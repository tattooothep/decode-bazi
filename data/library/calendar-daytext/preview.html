eputation"},"七殺":{"label":"Pressure","hint":"A high-pressure day — sharp decisions, head-on challenges"},"正印":{"label":"Recharge","hint":"A day for learning, recovery, credentials, and kind mentors"},"偏印":{"label":"Instinct","hint":"Hunches run clear — think from odd angles, go deep"}},"officer":{"建":{"label":"Begin Day","hint":"Start new things — plant the first stake"},"除":{"label":"Clear-Out Day","hint":"Wash out the old, cut the clutter, begin treatment"},"滿":{"label":"Full Day","hint":"Abundance, celebrations, bringing people together"},"平":{"label":"Steady Day","hint":"Routine runs smooth — negotiate as equals"},"定":{"label":"Settle Day","hint":"Agree, book, and tie things down firmly"},"執":{"label":"Follow-Through Day","hint":"Handle the details, chase pending work, grip tight"},"破":{"label":"Breaker Day","hint":"Only for tearing down and ending things — skip anything auspicious"},"危":{"label":"Caution Day","hint":"Move slowly, avoid risk — a day for stillness and review"},"成":{"label":"Success Day","hint":"Bring things to a beautiful finish — unveil the results"},"收":{"label":"Harvest Day","hint":"Gather the returns, the money, and the goods"},"開":{"label":"Open Day","hint":"Launch, open the market, start learning, fire it up"},"閉":{"label":"Rest Day","hint":"Close the cycle, seal the leaks, rest and recharge"}},"stem":{"甲":"Yang Wood","乙":"Yin Wood","丙":"Yang Fire","丁":"Yin Fire","戊":"Yang Earth","己":"Yin Earth","庚":"Yang Metal","辛":"Yin Metal","壬":"Yang Water","癸":"Yin Water"},"branch":{"子":{"label":"Rat Day","animal":"Rat"},"丑":{"label":"Ox Day","animal":"Ox"},"寅":{"label":"Tiger Day","animal":"Tiger"},"卯":{"label":"Rabbit Day","animal":"Rabbit"},"辰":{"label":"Dragon Day","animal":"Dragon"},"巳":{"label":"Snake Day","animal":"Snake"},"午":{"label":"Horse Day","animal":"Horse"},"未":{"label":"Goat Day","animal":"Goat"},"申":{"label":"Monkey Day","animal":"Monkey"},"酉":{"label":"Rooster Day","animal":"Rooster"},"戌":{"label":"Dog Day","animal":"Dog"},"亥":{"label":"Pig Day","animal":"Pig"}},"lunarDay":{"format":"Lunar day {n}","hint":"Day of the lunar month, counted 1-30"},"ui":{"chongYou":"⚠ Your clash day","heYou":"✦ Your harmony day","chongYear":"Clash: {animal} year","heYear":"Harmony: {animal} year","direction":"Direction","luckyColor":"Lucky color","deepMode":"Deep read","simpleMode":"Easy read"},"goal":{"wealth":"Money","career":"Work","love":"Love","family":"Family","health":"Health","travel":"Travel"}},"combos":{"_comment":"Day-power × day-rhythm combos, set 3/3 (Recharge · Instinct) · translated from the Thai original (10 Jul 2026)","比肩|建":{"title":"Plant your own flag","text":"That thing you've wanted to start on your own for so long — put the first stake in the ground today. Don't wait for anyone's green light; your own strength is enough. Asking for funding or borrowing someone else's muscle isn't today's move though. Go solo for now and it will fall into place."},"比肩|除":{"title":"Drop the dead weight","text":"Habits that hold you back, burdens you've been carrying for other people until your back bends — today is the best day to cut them loose. Clear your desk, clear your calendar, take your time back. Travel light and you move fast."},"比肩|滿":{"title":"Tank full of energy","text":"Body and spirit are at full power — anything that takes your own muscle, go for it. Getting the old crew of kindred spirits together feels extra lively too. Just don't let a dare drag you into pointless contests. Save the strength for your own goals."},"比肩|平":{"title":"Run at your own pace","text":"Solo routine work flows unusually well today. Redo your schedule, work out, get your own systems in order. An ordinary day for quietly stacking up points — nobody else has to notice. You will."},"比肩|定":{"title":"A deal among equals","text":"Deals where you stand eye to eye with the other side settle nicely today. Fifty-fifty partnerships, clear lines on who does what — agree it now and both sides stay comfortable for a long time."},"比肩|執":{"title":"Finish your own list","text":"That backlog you've been putting off — bite through it one item at a time today. No waiting on the team, no waiting for anyone to be free. Your own two hands are the best tools you've got. By tonight you'll be proud the list is half as long."},"比肩|破":{"title":"Walk away from the wrong room","text":"The contract that shortchanges you, the circle that drains you — today you can walk away, clean and final. Don't start anything new, don't sign anything new. Today is for ending things properly, not beginning them."},"比肩|危":{"title":"Confident, not cocky","text":"Self-confidence is your strength — and today, your trap. Don't bet your name on anything you haven't seen in full. Double-check before you hit confirm. Slowing down just a little saves the whole board."},"比肩|成":{"title":"Claim what you built","text":"Something you've poured your own sweat into is finally blooming. Close it out in style and put your name on it, out loud. This credit is yours — take it, no blushing."},"比肩|收":{"title":"Collect what's yours","text":"Money you lent, things people borrowed, benefits you never claimed — today they come back easily. And the work you scattered across many hands? Pull it back and do it yourself; it'll be faster."},"比肩|開":{"title":"Announce yourself","text":"Launch the thing you made yourself, take the freelance gig, enter the competition, raise your hand for the opportunity. Speak in your own name today and people listen. Your voice carries — no spokesperson needed."},"比肩|閉":{"title":"Recharge your own battery","text":"Skip the socializing, skip the meetups. Keep your energy and your money close, and spend a quiet day with something you love. The strength you bank today funds the next battle. People who know how to rest are the ones who go far."},"劫財|建":{"title":"Build the team","text":"Starting something that needs many hands? Invite the right people today and it catches fire fast. But write the money rules down from day one. The closer the friend, the clearer the paper needs to be."},"劫財|除":{"title":"Clear the air in the group","text":"Lingering tension in the team, little debts between friends — today they settle cleanly, no hard feelings. And the person who's been draining the group for too long? Time for a kind goodbye. The circle will breathe easier immediately."},"劫財|滿":{"title":"A crowd around you","text":"Parties, gatherings, connections rolling in nonstop. But days like this are exactly when the wallet leaks. Set a budget before you leave the house — and if anyone pitches you a group investment today, always say you'll sleep on it."},"劫財|平":{"title":"Divide and conquer","text":"Group work runs smooth and drama-free today — split the tasks and it's done fast. A great day for coordinating in every direction: give each person what they do best, and don't quietly pick up other people's work to carry yourself."},"劫財|定":{"title":"Settle the split","text":"Money shares, equity, credit — whatever's been hanging, nail it down today. And it has to end up on paper, nothing less. A verbal agreement today is next month's brand-new problem."},"劫財|執":{"title":"Check what others are holding","text":"Work you left with a friend, money someone else is holding, documents out on loan — run through the list today, item by item. Don't leave important things in other people's hands longer than necessary."},"劫財|破":{"title":"No money talk with friends","text":"The risk of a blowup in your circle is sky-high today. Money between friends is strictly off the table — postpone the conversation. But if there's a group you know deep down isn't right for you, today is the cleanest day to step out for good."},"劫財|危":{"title":"Don't vouch for anyone","text":"Co-signing a loan, lending a large sum, signing in a friend's place — all three are off today. In company, listen a lot and say little. Secrets that slip out today travel faster than usual."},"劫財|成":{"title":"Win as a team","text":"The work you built together is paying off today. Celebrate together and spread the credit to every hand that helped. Generosity today is seed money for the team's next campaign."},"劫財|收":{"title":"Settle the group tab","text":"Pooled money, expenses covered for each other, shares friends are still holding — collect and reconcile today until everyone's numbers match. Clean books today mean friendships that last through next year."},"劫財|開":{"title":"Open the circle","text":"Launch the joint project, grow the team, post the job opening. Good people walk in on their own today — so announce it loudly. The circle you open today attracts the kind who stay."},"劫財|閉":{"title":"Wallet closed, circle closed","text":"Skip the night out. Money leaks fastest today when you're in the middle of a crowd. Stay in with a few close people instead. Tonight, quiet is a lot cheaper than fun."},"食神|建":{"title":"Start something that feeds your soul","text":"A creative project, a hobby, a cooking class, the backyard garden — anything that makes you genuinely happy is worth starting today. It will go the distance, because it starts from joy, not obligation."},"食神|除":{"title":"Wash the stress off","text":"A massage, a spa day, light exercise, decluttering the house — and anything you've been forcing yourself through, cut it today. Stress drains out easier today than any other day. Don't let it sleep over."},"食神|滿":{"title":"Full table, warm house","text":"Throw the celebration, cook for the people you love, hold the happy family occasion. The mood couldn't be more on your side — and kids at the gathering bring extra luck. Today's fullness reaches the heart, not just the stomach."},"食神|平":{"title":"Easy day — don't overbook","text":"Cook something delicious, take a walk, savor a light task you enjoy. Life wants a slower tempo today, so don't cram the calendar. Simplicity is today's gift. Take it."},"食神|定":{"title":"Close the deal over lunch","text":"Take the business talk somewhere relaxed — lunch or dinner is today's best meeting room. Things that stay tense across the conference table settle with surprising ease across the dining table."},"食神|執":{"title":"Slow hands, fine work","text":"Craftwork and creative pieces that need every corner polished — your hands are steady and your patience deep today. Work slowly, taste as you go, keep refining. Good things are never finished fast, and today you're in no hurry."},"食神|破":{"title":"Stop forcing the fun","text":"That activity you used to love but now leaves you drained — today you're allowed to admit it and set it down. Don't smile through the exhaustion. Give yourself the empty space back; new joy needs somewhere to land."},"食神|危":{"title":"Enjoy it — with a ceiling","text":"Treats, sweets, the shopping cart: today's classic traps. Enjoy yourself, but set the limit before you start. Eat and drink in moderation, and tomorrow morning your wallet and your waistline will both thank you."},"食神|成":{"title":"Release it and watch the love","text":"The creative work you've been nurturing is ready right on time. Put it out there — the response will be warmer than you expect. Work made with joy carries its own fragrance, and people can tell."},"食神|收":{"title":"The work you love starts paying","text":"Income from your craft, your content, the little shop you built with heart — today it collects nicely. And that recipe or trick you just discovered? Write it down and file it away to build on."},"食神|開":{"title":"Open the shop, launch the menu","text":"Open the store, debut the new menu, post your first piece of content, launch a class teaching what you love. Your charm pulls people in on its own today. A door opened with a smile never lacks visitors."},"食神|閉":{"title":"Quiet happiness","text":"An early night, a home-cooked meal, the movie you never finished. Happiness doesn't need hunting today — it's already in the house. Rest until you're full. Tomorrow can wait."},"傷官|建":{"title":"Launch the bold plan","text":"The one-of-a-kind idea sitting in your drawer — today, sketch it into a real plan. Your mind is unusually fast and sharp. Break the mold, but break it with style. Don't step on anyone's toes as you pull away."},"傷官|除":{"title":"Tear out the slow old way","text":"The workflow that's been sluggish forever — rip it out today and rewrite it clean. Delete the junk steps without a shred of regret. Your head is sharp enough to see exactly what's excess and what's missing. Get to it."},"傷官|滿":{"title":"Full room, all ears","text":"Presentations, pitches, the stage — the room is ready to hear you today, so show your ideas at full volume. But today's fire cuts both ways: one joke at someone else's expense and the whole performance is wasted."},"傷官|平":{"title":"Make the brilliant practical","text":"A brilliant idea only counts when it works in the real world, and today is for bringing the futuristic down to earth. Writing and editing flow smoothly, and trading ideas with sharp peers is so much fun you'll lose track of time."},"傷官|定":{"title":"Smooth talker — get it in writing","text":"Your silver tongue can close the deal today, but do not let it end at words. Whatever you agree, write it down immediately, and make the scope painfully clear. Today's charm is next month's double-edged sword."},"傷官|執":{"title":"Polish until it cuts","text":"The stalled draft, the content stuck in the pipeline — sit down today and finish them one piece at a time. Your eye catches flaws you missed yesterday, and three more revision rounds won't tire you. Today, the more you polish, the sharper it gets."},"傷官|破":{"title":"Your mouth is the fuse","text":"Criticism of the boss, the elders, or the company rules — keep it inside today. Said out loud, it's a bomb. If you're itching to tear something apart, go tear down the old stuff that genuinely deserves the dumpster. Far more useful."},"傷官|危":{"title":"Brilliant idea, thin ice","text":"Today's idea really is ahead of its time — but the ground underneath isn't solid yet. Don't make the big announcement. Check the legal side, the rules, the copyrights first. A good thing launched at the wrong moment turns bad instantly."},"傷官|成":{"title":"The idea that makes your name","text":"The unconventional work finally launches, and the world is ready to see that you're different. The style people once called strange is now your signature. Take the compliments in full — no false modesty."},"傷官|收":{"title":"Get paid for your ideas","text":"Idea fees, royalties, the overdue creative invoices — collect them all today. Close the job and fold the work into your portfolio. What you think up has a price, and today is payday."},"傷官|開":{"title":"Show the world","text":"The new campaign, the new channel, the innovation you built in secret — launch today and the noise is the good kind. Your nerve to speak up and show off is a magnet today. The more genuine, the stronger the pull."},"傷官|閉":{"title":"Let the idea ripen","text":"Write down every good idea that surfaces today, but don't release any of them — they're not ripe yet. Skip posting anything sensitive too. The world doesn't need to know what you're thinking. When the time comes, it will make its own noise."},"正財|建":{"title":"Set up the money system","text":"Open the savings account, start the income-and-expense plan, take on work that pays reliably every month. Financial roots planted today grow strong. Money that starts with a system today will feed you for a long time."},"正財|除":{"title":"Plug the leaks","text":"The subscriptions you never use, the small expenses bleeding out every month — cancel them all today, down to the last one. Close out the little debts too. The leaks you stop today are a whole year of savings."},"正財|滿":{"title":"Money moving fast","text":"Sales are brisk, goods flow in and out, customers come thicker than usual. But a big-money day is exactly when the numbers slip. Record every single transaction — real profit lives in the books, not in the feeling."},"正財|平":{"title":"Books in order","text":"Do the accounts, pay the bills, reconcile the totals, negotiate straight and fair. The numbers sit still today — no surprises. The boring routine money chores get done unusually fast today. Use it."},"正財|定":{"title":"Lock the price, lock the deal","text":"Sign the sale, agree the salary, fix the project price. Numbers settled today hold for the long run without flipping, and both sides walk away comfortable. A money deal tied down today is fair and tight."},"正財|執":{"title":"Line by line","text":"Unsent invoices, expense claims, totals that never got reconciled — sit down today and work through them line by line until they're done. Precision is pure profit today. One wrong digit found can pay for the whole day."},"正財|破":{"title":"No big buys, no new bets","text":"Big-ticket purchases and fresh investments — keep the wallet shut today, hard. Money that goes out today doesn't circle back. But a bad debt or a losing position that's dragged on too long? Today is the cleanest day to cut it loose."},"正財|危":{"title":"Don't move the big money","text":"Large transfers, portfolio moves, loan signings — postpone them all. Scams and hidden-interest contracts are running thick today. Whatever anyone hands you, read the fine print three times. Not sure means don't sign."},"正財|成":{"title":"The payment you've been waiting for","text":"The deal that's been ripening for months closes today, and the money you've chased finally lands in the account. Keep every receipt, thank your counterpart properly, and the next deal will come easier than this one."},"正財|收":{"title":"Money comes home","text":"Collect the debts, collect the rent, move money into savings — today is a true gathering day and money flows in easier than usual. One iron rule: nothing new goes out. Today the wallet is for receiving, not paying."},"正財|開":{"title":"Open a real income stream","text":"Open the storefront, start the side income with actual paying customers, raise your prices for good reason. The market is receptive today. New money started today isn't vapor — it's money you can count at every month-end."},"正財|閉":{"title":"Close the books, lock the safe","text":"Close out the totals, close the month, move money somewhere safe. Today is for summing up, not spending. That online cart you left full? Leave it full. A wallet shut tight today is a heavier wallet next month."},"偏財|建":{"title":"Open the side deal","text":"Side income, short-term deals, the unexpected client who just reached out — today is a good moment to begin. Floating money is looking for a place to land, but you have to reach out first. Don't wait for it to drift over on its own."},"偏財|除":{"title":"Flush out the dead weight","text":"The deals that stopped paying, the stock gathering dust, the part of the portfolio dragging everything down — today you can clear them out with full conviction. Let the old stuff go and make room. New opportunities need somewhere to park."},"偏財|滿":{"title":"Luck from every direction","text":"Today's social rounds are a gold mine — one introduction leads to another, and another. Hand out every card you've got. But don't promise more than you can carry: ten opportunities doesn't mean grabbing all ten. Pick the right ones."},"偏財|平":{"title":"Opportunity whispers","text":"The good deal today doesn't arrive with fanfare — it hides inside casual chats with people you know. Keep your ears open all day. Someone's throwaway remark today could turn into a whole quarter's income."},"偏財|定":{"title":"Turn the chance into a contract","text":"The opportunity that's been circling for days — lock it into writing today, before the wind changes. Any terms that are ready, hammer them down now. Chances like this pass once and don't come around for a second look."},"偏財|執":{"title":"Dig through the fine print","text":"The forgotten deal stuck in the pipeline, the clause nobody reads to the last page — dig into it today and you'll find treasure everyone else walked past. Today's best opportunities are hiding under a pile of paperwork."},"偏財|破":{"title":"Easy money is the bait","text":"Lotteries, gambling, hot speculation, anything guaranteeing suspiciously high returns — hands off, every kind of it. But if you're stuck in some risky cycle, today is the most decisive day of the month to break free."},"偏財|危":{"title":"Too good to be true","text":"The deal that looks too good, the stranger who's too generous — today belongs to the gold-plated trap. Before opening your wallet, check the story three layers deep. The real thing welcomes scrutiny. The fake will try to rush you."},"偏財|成":{"title":"Sharp eyes win the prize","text":"A well-calculated risk pays off today, and the side deal closes beautifully. This profit came from your eye, not from luck. Write down how you thought this one through — that method will work again and again."},"偏財|收":{"title":"Take the profit, skip the greed","text":"Whatever has hit its target — sell and pocket the gain today. Windfalls that come in, march them straight into the bank. Don't ride another round on greed. Profit you haven't collected isn't profit yet. It's just a number."},"偏財|開":{"title":"Try the untried market","text":"A new sales channel, a customer group you've never touched — open it today and somebody bites. Strangers are today's source of luck. Step one pace outside your usual field: the new money is beyond the fence you know."},"偏財|閉":{"title":"All bets on pause","text":"Fast money moves in and out unusually quickly today — whatever comes in, lock it into an account that's hard to touch, immediately. Every form of gambling goes on pause. The hand that isn't rolling dice today is the hand ready to catch a real opportunity tomorrow."},"正官|建":{"title":"Start the official process","text":"File the government paperwork, open the case for the position, begin anything that runs on formal steps. The system is friendly today — do it by the book and things move unusually smoothly. Get the documents complete and walk right in."},"正官|除":{"title":"Clean up your record","text":"The pending matter with the authorities, the stuck license, the system error with your name attached — today you can push it through to done. A clean record is a long-term asset. Clear it now and breathe easy for a long while."},"正官|滿":{"title":"Full-dress occasion","text":"Appointment ceremonies, promotion celebrations, grand openings with all the seniors present — the light lands on you today. Carry the role well: speak little, but make it count. Today's impression stays with the people upstairs for a long time."},"正官|平":{"title":"On time is the win","text":"Scheduled meetings, routine paperwork, the reports the system expects — smooth water today, no waves. The one thing to nail is the clock. The person who shows up on time today gets their name written down in the good column."},"正官|定":{"title":"Make it official","text":"Sign the major contract, hold the engagement, accept the post, make the appointment. Bonds tied today stand firm for the long haul. What you declare in front of many people today, heaven and earth take note of — and hold up."},"正官|執":{"title":"Polite but persistent","text":"The application that stalled, the answer that went silent — follow up today and it moves. Stay courteous and quote every reference number. Bureaucracy shifts for the person who follows up the right way, and today your way is right."},"正官|破":{"title":"Don't fight the system today","text":"Clashing with the boss, filing lawsuits, lodging appeals — skip all of it today. A collision with authority hurts only your side. But if there's a case you want to withdraw, a matter you want to drop, a tie you want to dissolve — today it ends cleanly."},"正官|危":{"title":"Your name is fragile today","text":"Don't sign for anyone, don't take responsibility for what you haven't fully seen, don't let anyone borrow your name. The reputation you've built over years is more exposed than usual today. Guard your signature like it's your last money."},"正官|成":{"title":"Approved","text":"The official matter you've long waited on gets approved today, and the position you hoped for carries your name on the notice. The people upstairs can see your work clearly. Remember to thank whoever pushed it through — the next rung is easier with someone steadying the ladder."},"正官|收":{"title":"Claim what's due","text":"Unclaimed benefits, entitlements now matured, files that need closing — today the errands complete in full. Everything your year of duty has earned turns into something real and touchable today."},"正官|開":{"title":"A new career door","text":"Apply for the new position, register the company properly, file for the promotion. The career gate stands wide open today — walk in with every document in hand. Today's official opportunities go only to the prepared."},"正官|閉":{"title":"File the folders, study the rules","text":"Don't submit anything new today — the system isn't receiving visitors. Use the time to put your files in perfect order and truly master the rules around your next move. The one who knows the rulebook deepest wins the next round."},"七殺|建":{"title":"Open the hard mission","text":"The fight you can't avoid, the hardest task on the list — open it today, because your nerve is unusually strong. But courage alone isn't enough: carry a backup plan. Fight with your head, not just your fists."},"七殺|除":{"title":"Cut out the old problem","text":"The problem you've been running from, the wound left to fester for months — today the blade is sharp enough to cut it out. A short sting today beats another year of ache. Face it head-on and it truly ends."},"七殺|滿":{"title":"Pressure from all sides","text":"It all crashes in at once — colliding deadlines, people chasing you, fresh problems sprouting. Don't fight every front at the same time. Rank the gates by which must fall first, then take them one at a time. Today you win by sequence, not speed."},"七殺|平":{"title":"Drill during the ceasefire","text":"The pressure eases for a moment — don't assume it's over. Use today to clear the heavy work at your own rhythm, rehearse for the next round, and sharpen your tools while the field is quiet. When the real fight comes, you'll be the readiest one on it."},"七殺|定":{"title":"Decide and don't look back","text":"The big question that's hung in your chest for so long — today you call it. The information is all in; only the courage is left. Pick your road and walk it without turning around. From today on, hesitating costs more than choosing wrong."},"七殺|執":{"title":"Grip and don't let go","text":"The hard problem everyone else backed away from — today you grind through it knot by knot with iron discipline. You don't need to be fast; you're just not allowed to stop. Stamina is today's secret weapon. The knot nobody could untie all month comes loose in the hands that refuse to let go."},"七殺|破":{"title":"One step back is the win","text":"Fuses are dangerously short today — one wrong word can break things for good. Stepping back isn't losing; it's choosing your battlefield. But if something genuinely needs demolishing — the old and the expired — today you can swing at full strength."},"七殺|危":{"title":"Danger on top of danger","text":"Physical risk, verbal risk, money risk — all three are off today. Heights, machinery, slick roads: avoid what you can. Let a neutral party handle the heated conversations. Staying somewhere safe today is strategy, not cowardice."},"七殺|成":{"title":"The long war ends in victory","text":"The battle you've fought for so long closes today with the result you wanted. The boldness people once called reckless is now remembered as decisive. Take the honors in full — then breathe, all the way out."},"七殺|收":{"title":"Collect the spoils","text":"That battle gave you more than a win. Pocket the lessons. Quietly bank the leverage, the connections, and the respect you earned along the way. All of it pays out in the next campaign."},"七殺|開":{"title":"Strike first","text":"The competition hasn't found its footing; the market hasn't moved yet. Heaven favors the bold mover today — launch the offensive you've been planning. The first-mover advantage you seize today will feed you for months."},"七殺|閉":{"title":"Stand down and rest","text":"Stillness is today's edge. Pull out of the fights that aren't worth it, and stop carrying every war alone — delegate what can be delegated. Close the door and truly rest. The general who knows how to rest is the one who survives to the next war."},"正印|建":{"title":"Open a new chapter of learning","text":"Enroll in the course, take up the new discipline, start writing your own handbook or book. Learning that begins today comes with a mentor's backing from the very first step. The knowledge you start collecting now becomes your second home."},"正印|除":{"title":"Update the old knowledge","text":"Outdated beliefs, information the world has already lapped — today they wash out of your head more easily than ever. Clear the book pile, sort your files into order. The brain space you free up today is where the new skill will live."},"正印|滿":{"title":"Surrounded by kindness","text":"Teaching, mentoring, anything built on sharing what you know — people show up today with both hands ready to help, and a kind senior appears at exactly the right moment. Accept the goodwill and remember who gave it. One day you'll be the one passing it on."},"正印|平":{"title":"One page at a time","text":"Read, write, review — no rush required. Your brain soaks up the slow-drip kind of learning unusually well today. Twenty pages today are worth more than two hundred the night before the exam. Consistency is a talent, and it can be trained."},"正印|定":{"title":"An agreement with your elders","text":"Settle the scholarship, the studies, the long-term deal that involves a senior figure. Promises made today come under protection — the terms will be fairer to you than expected, because the other side has been on your side from the start."},"正印|執":{"title":"Chase down every certificate","text":"The missing credits, the certificate you never picked up, the paperwork short a page — collect every last one today. They look like trivial chores, but they're the keys to the next door. Gather them now and skip the deadline-day scramble."},"正印|破":{"title":"Retire the disproven belief","text":"Don't argue with your teachers or embarrass someone who once helped you — that collision cuts deep on both sides today. But your own old belief, the one already proven wrong? Smash it today without a flicker of regret."},"正印|危":{"title":"Fake news everywhere","text":"False data, rumors, doctored statistics — they're swarming thicker than usual today. Check the source before you believe, check again before you share, and don't casually vouch for anyone or anything. Your credibility is worth more than the news is fast."},"正印|成":{"title":"The studying pays off","text":"Pass the exam, receive the certificate, see your writing in print. Today the library and the study desk pay you back — the knowledge you gathered quietly now carries an official stamp. Celebrate it properly."},"正印|收":{"title":"File the lesson away","text":"The course ends, the book closes, the learning project wraps up. Don't rush straight to the next thing — sit down and write one page of what you actually learned. Unsummarized knowledge evaporates. Summarized knowledge stays with you for life."},"正印|開":{"title":"Open the class","text":"Start teaching, open the class, share what you know with the world. People are ready to receive it today. Teaching is learning a second time — the more you give, the sharper you get, and the reputation follows on its own."},"正印|閉":{"title":"The body asks for repairs","text":"Sleep enough, screens off early, stop force-feeding your brain. Body and mind are running their self-repair today. Rest isn't a pause in your progress — it's progress in silent mode. Tomorrow you'll be fresher than before."},"偏印|建":{"title":"Start the path nobody sees yet","text":"The specialized craft, the private side project, the direction the people around you don't understand yet — start today, and no cheering squad required. The strange path you begin now is what they'll be calling vision in two years."},"偏印|除":{"title":"Cut the static","text":"Junk information, the feed that sours your mood with every scroll, conversations on a completely different wavelength — slip out quietly today. A head cleared of other people's noise hears its own voice immediately. And that voice is more accurate than you think."},"偏印|滿":{"title":"Signals flooding in","text":"Hunches, dreams, signs all around — they're coming in faster than you can process today. Write down everything that surfaces, but don't believe it all yet. The real ones will come back and repeat. The false ones fade on their own."},"偏印|平":{"title":"Deep work backstage","text":"Research, analysis, building the formula — long-focus work gets a full tank today. Kill the notifications and dive all the way down. Today's backstage work is the root of next month's onstage result."},"偏印|定":{"title":"The inner circle decides","text":"Specialized matters should be settled only with people who truly understand them. Let the small inner circle make the call today. The outer circle doesn't need every detail — a plan's silence is a plan's armor."},"偏印|執":{"title":"Dig the layer everyone skips","text":"Check the work one layer deeper than usual. Small anomalies hide in the corners everyone walks past — and today your eye is unusually sharp for exactly that. The tiny flaw you catch today can head off next month's disaster entirely."},"偏印|破":{"title":"Never decide in a dark mood","text":"The negative thought spirals run stronger than usual today — make no major decisions while your mood is down. But the toxic belief or toxic relationship that's been gnawing at you for so long? Today you see it at its clearest, and you can cut it at its cleanest."},"偏印|危":{"title":"Hear the omen, check the facts","text":"That bad feeling today — take note of it, then verify the facts before acting on it. Don't linger in lonely places alone, and skip the drinks entirely. The line between intuition and imagination is unusually thin today."},"偏印|成":{"title":"The real expert gets found","text":"The specialty you've quietly incubated for so long succeeds today. What people once called strange has become the rare thing the market wants — and now they're searching for the real expert. The real expert is you."},"偏印|收":{"title":"Record the secret recipe","text":"Your personal know-how, the formulas, the techniques you discovered on your own — gather them into an organized vault today. This is the one asset nobody can copy. Write it down before it fades; one day it will be your legacy."},"偏印|開":{"title":"The odd skill becomes the selling point","text":"The talent you hid away because you feared no one would get it — unveil it today. The niche market is opening its arms. The strangeness you kept tucked away is the difference that sells, and the buyers really are out there waiting."},"偏印|閉":{"title":"Retreat and listen inward","text":"A first-class day for solitude — meditate, take a quiet walk alone. The voice inside speaks clearly today, if you know how to mute the outside. Before your next big move, hear yourself out fully. The answer was inside you all along."}},"officer":{"_comment":"Universal almanac mode (user's chart unknown) · the 12 day rhythms, same for everyone · translated from the Thai original (10 Jul 2026) · meanings follow the classical almanac canon","建":{"title":"Begin Day","text":"A day for beginnings. Open the new chapter, plant the first stake, sign on for the job, walk into day one, pick the name, hold the launch — all strong today. Whatever starts today carries the momentum of a true beginning. The one exception: digging, demolition, and teardown work should wait."},"除":{"title":"Clear-Out Day","text":"A day for cleansing. Clear out the old, cut the clutter from your life, do the deep clean, start the treatment, drop the bad habit, end the toxic relationship. What you throw away today stays gone — it won't come back to haunt you."},"滿":{"title":"Full Day","text":"A day of abundance. Celebrations, family gatherings, opening the storeroom, taking in goods, restocking — the whole atmosphere favors festivity today. Funerals and sorrowful affairs, though, belong on another day."},"平":{"title":"Steady Day","text":"A day of even ground. Routine work runs smooth: level the field, balance the workload, negotiate as equals, split things fairly. Nothing flashy today, but everything dependable — perfect for filing work into the system and keeping life's rhythm."},"定":{"title":"Settle Day","text":"A day for agreements. Strike the deal, hold the engagement, sign the contract, book the slot, fix the date. What's agreed today stays settled and lasts. Tie down the things that matter — clarity is today's gift."},"執":{"title":"Follow-Through Day","text":"A day for gripping tight. Chase the backlog, handle the details, hire people, bring someone onto the team, revive the request that went silent. Grind through the list item by item today — persistence and precision beat speed."},"破":{"title":"Breaker Day","text":"A raw, breaking day. Avoid every kind of auspicious event — no launches, no signings, no weddings, no moving house. Today is good at exactly one thing: tearing down and ending. Demolish the old, withdraw the stale, finish it for good."},"危":{"title":"Caution Day","text":"A day on the edge. Walk slowly and think twice. Risky work, heights, machinery, long journeys — avoid what you can, and leave the big money untouched. Today favors staying still, reflecting, and quiet prayer."},"成":{"title":"Success Day","text":"A day of fulfillment. Close the project, hold the launch, get married, move house, start the business — all end well today. Whatever you've worked at for a long time is ready to bear fruit, and the day's energy carries things beautifully to the finish line."},"收":{"title":"Harvest Day","text":"A day for gathering in. Collect money, call in debts, stock the storeroom, close the accounts, receive the overdue deliveries. The current flows in more than out today — bring everything home to its place. New beginnings can wait for an Open Day."},"開":{"title":"Open Day","text":"A day of opening. Open the shop, open the market, start the class, launch the product, fire up the new project. Heaven's gate stands open today for beginnings with a long future — what opens today tends to keep on growing."},"閉":{"title":"Rest Day","text":"A day for closing up. Seal the leaks, close the books, finish the work cycle, move money somewhere safe, repair what's broken. Today is for storing up strength and shutting things properly. Launches and new ventures should skip to another day."}},"nayin":{"_comment":"The 30 day-essence names (cycling through the 60-day calendar) · full poetic English name + one line of daily color · translated from the Thai original (10 Jul 2026) · based on ref_jia_zi_60","海中金":{"name":"Gold Beneath the Sea","line":"Today's treasure hides deep — dive for it yourself. Don't wait for it to float up."},"爐中火":{"name":"Fire in the Furnace","line":"Today's fire is strong and pointed — perfect for forging big work into real shape."},"大林木":{"name":"Wood of the Great Forest","line":"Grow like a forest: no rush to stand tallest alone. Roots woven together are what hold firm."},"路旁土":{"name":"Earth by the Roadside","line":"Roadside earth takes in both dust and seeds. Stay open today — good things arrive with passersby."},"劍鋒金":{"name":"Sword-Edge Gold","line":"The edge is truly sharp today — decisions come clean and quick. Just mind the blade doesn't flash back at you."},"山頭火":{"name":"Fire on the Mountaintop","line":"A fire on the summit is seen by the whole town. All eyes are on you today — make sure you're lit for the right thing."},"澗下水":{"name":"Stream in the Ravine","line":"Cold water from the ravine flows quietly and never stops. Steadiness beats force today."},"城頭土":{"name":"Earth of the City Wall","line":"A day for building defenses: set the rules, draw the boundaries, protect what you've built."},"白蠟金":{"name":"Soft Wax Gold","line":"The good stuff is still soft today — moldable, shapeable. Don't rush it hard; let it set in its own time."},"楊柳木":{"name":"Willow Wood","line":"Bend with the wind and you won't break. Stay flexible today — rigid snaps, supple survives."},"泉中水":{"name":"Water from the Spring","line":"A spring rises from within. Today's ideas and energy come from you — no outside refill needed."},"屋上土":{"name":"Earth on the Rooftop","line":"Nobody notices a good roof until the day it rains. Today's behind-the-scenes work is the real hero."},"霹靂火":{"name":"Thunderbolt Fire","line":"Power arrives in lightning strikes today — one crack can change the whole game. Read the moment, then let it fly."},"松柏木":{"name":"Winter Pine","line":"The pine stands green through the cold. Today your endurance under pressure is the strength others don't have."},"長流水":{"name":"Ever-Flowing Water","line":"A long current never breaks. Work that needs steady continuity runs unusually smooth today."},"沙中金":{"name":"Gold in the Sand","line":"Gold mixed with sand takes sifting to find. Patient sorting today brings the real thing home."},"山下火":{"name":"Fire Below the Mountain","line":"The fire at the mountain's foot warms whoever is near. Look after the people right in front of you before looking far — warmth is power today."},"平地木":{"name":"Wood of the Open Plain","line":"A tree on open ground grows so travelers can rest. Be someone's shelter today — respect gathers under a generous shade."},"壁上土":{"name":"Earth in the Wall","line":"Good walls are what make a house a home. Today suits structural work — reinforce what's already standing."},"金箔金":{"name":"Gold Leaf","line":"Gold leaf is paper-thin, yet it makes the whole statue shine. Small details create the big difference today."},"覆燈火":{"name":"Lantern Fire","line":"A lantern lights only the circle around it. Focus on your small circle and light it well — don't try to illuminate the whole town."},"天河水":{"name":"Water of the Sky River","line":"Rain from heaven falls on everyone alike. Give without keeping score today — the sky keeps the ledger for you."},"大驛土":{"name":"Earth of the Great Highway","line":"A highway carries a thousand travelers a day. Stay open to every contact — whatever passes through today is opportunity."},"釵釧金":{"name":"Gold of the Bracelet","line":"This is gold already shaped into jewelry. What you have today needs only a polish to shine like new."},"桑柘木":{"name":"Mulberry Wood","line":"The mulberry feeds the silkworms that clothe a whole town. Small work that feeds others is sacred work today."},"大溪水":{"name":"Water of the Wide River","line":"A great river carries boats all the way to the sea. The current is strong and far-reaching today — board the right boat and let the water do the work."},"沙中土":{"name":"Earth Among the Sand","line":"Sandy soil needs watering again and again. Today's work asks for repeated care and steady heart — but the harvest is worth it."},"天上火":{"name":"Fire in the Sky","line":"The sun shines on everyone without choosing. Energy overflows today — hand out light all day and never run dry."},"石榴木":{"name":"Pomegranate Wood","line":"One pomegranate holds a hundred seeds. The small things you plant today will multiply beyond what the eye can see."},"大海水":{"name":"Water of the Open Sea","line":"The sea receives water from every river. Take in every opinion today with room to spare — your depth is your calm."}},"conditions":{"_comment":"Conditional inserts by chart or by day · clash days · harmony days · directions · colors · translated from the Thai original (10 Jul 2026)","chong_personal":{"chip":"⚠ Your clash day","line":"Today clashes with your birth year — the day's energy hits your chart head-on. Big moves, signings, launches, long trips: postpone what can be postponed. If you can't, leave extra time, double-check everything, and never decide while your temper is up."},"chong_universal":{"chip":"Clash: {animal} year","line":"Today clashes with people born in the Year of the {animal}. If that's your year, hold off on the big moves. If not, carry on as usual."},"he_personal":{"chip":"✦ Your harmony day","line":"Today is in harmony with your birth year — an extra tailwind all day long. That important matter you've been saving for the right moment? Move on it today. People around you are more ready than usual to take your side."},"he_universal":{"chip":"Harmony: {animal} year","line":"Today gives bonus points to anyone born in the Year of the {animal}. If that's your year, push the important things forward at full strength."},"harm_personal":{"chip":"△ Your friction day","line":"There's an undercurrent between today and your chart — nothing breaks, but plenty niggles. Watch for crossed wires and missed appointments, and confirm every meeting one more time."},"direction_use":{"wealth":"For money matters today, face {dir} or take your business that way — it gives you the edge","noble":"Meeting seniors, negotiating, interviewing — head {dir} and a helping hand will find you","joy":"Celebrations, key appointments, happy beginnings — {dir} adds extra power today","fortune":"Trying your luck or opening a new door? Go {dir} before anywhere else","avoid":"{dir} runs against the grain today — steer important business away from that direction"},"color_line":"Today's lucky colors: {colors}. Wear even one piece to pull the day's good rhythm your way","season_boost":{"spring":"The trees are leafing out and growing energy runs high — fresh starts and anything meant to grow get the wind behind them","summer":"Summer fire blazes — showing up and stepping into the spotlight get extra power, but a hot temper is the enemy","autumn":"Harvest-season steel is sharp and clear — decisions and gathering in results hit their perfect rhythm now","winter":"Winter water runs deep and still — planning and long-game thinking beat any rushed move"}},"goals":{"_comment":"Goal-focused lines · 12 day rhythms × 6 goals (money · work · love · family · health · travel) = 72 lines · shown only when the user picks a goal · translated from the Thai original (10 Jul 2026)","建|wealth":"Money: a fine day to start a new savings plan","建|career":"Work: open the project or start the new job — beginnings get a push today","建|love":"Love: open your heart, send the first hello, start the relationship — lovely timing","建|family":"Family: start a new house tradition — tonight's dinner together can be day one","建|health":"Health: day one of the workout plan — start today and it sticks","建|travel":"Travel: set off on the maiden trip — a new journey opens smoothly","除|wealth":"Money: cut the leaking expenses and wipe out the small debts, every last one","除|career":"Work: clear the backlog — and quitting what has no future lands clean today","除|love":"Love: clear the air, patch the misunderstanding, close the old chapter for good","除|family":"Family: deep-clean the house, toss the old stuff — clear home, clear head","除|health":"Health: start the treatment, pull the tooth, detox, quit smoking — strong cutting power today","除|travel":"Travel: cancel the trip that isn't right — a better route can take its place","滿|wealth":"Money: goods and income flow in from many directions — just record every bit","滿|career":"Work: the company party or team gathering tightens your work bonds","滿|love":"Love: engagements and anniversary celebrations — romance in full bloom","滿|family":"Family: gather the relatives, host the house blessing — a full, warm table","滿|health":"Health: energy at full tank — just don't celebrate your way past the limit","滿|travel":"Travel: big group trips are extra fun — plan for a crowd","平|wealth":"Money: do the books, pay the bills, negotiate fair and square — all smooth","平|career":"Work: routine runs like clockwork — file things into the system, stack quiet points","平|love":"Love: a simple, warm day — quiet time together is plenty","平|family":"Family: split the chores fairly and settle the house rules on even terms","平|health":"Health: easy walks and stretching — keep the steady rhythm","平|travel":"Travel: smooth roads the whole way — good for routine trips, safe out and back","定|wealth":"Money: lock the price, sign the sale — today's numbers hold for the long run","定|career":"Work: settle the position, sign the employment contract — key meetings click into place","定|love":"Love: ask to be together, propose, get engaged — promises made today hold firm","定|family":"Family: settle the house, the kids, the future — it ends well","定|health":"Health: book the doctor, set the long-term treatment plan — a schedule you'll actually keep","定|travel":"Travel: book the tickets and the room — locking the plan today feels right on price and heart","執|wealth":"Money: chase the debts, chase the invoices, reconcile line by line","執|career":"Work: grind the backlog to done, bring people onto the team, perfect the details","執|love":"Love: care shown in the small details pays off visibly today","執|family":"Family: fix things around the house and chase the household paperwork to completion","執|health":"Health: keep the checkup, keep the physio going — discipline is the medicine","執|travel":"Travel: check the documents — visa, insurance, everything — before you go","破|wealth":"Money: no new investments, no big buys — cutting losses is the only move","破|career":"Work: no signings, no launches — only tearing out systems that truly need to go","破|love":"Love: don't open a war of words — if it must end, end it calmly, not in today's temper","破|family":"Family: skip the family meeting about money and inheritance — it will crack","破|health":"Health: postpone non-urgent surgery and watch for accidents born of haste","破|travel":"Travel: postpone the important trip — if you must go, allow double the time","危|wealth":"Money: don't move the big sums — scams run thick today","危|career":"Work: no big promises, no signing in anyone's place — check three times","危|love":"Love: emotions swing easily — don't test each other today","危|family":"Family: keep the elders and little ones close — guard against slips and falls","危|health":"Health: skip risky sports, heights, machinery — and drive slower","危|travel":"Travel: avoid lonely routes and long night drives — check the car before leaving","成|wealth":"Money: close the sale, receive the payout — the deal ripens right on time","成|career":"Work: close the project, hand over the work, unveil the result — a clean win","成|love":"Love: wedding, registration, going public — an auspicious day at full strength","成|family":"Family: move into the new home, celebrate the family's successes","成|health":"Health: finish the treatment course, get the good results — your body rewards you","成|travel":"Travel: arrive in style — the important trip can depart today","收|wealth":"Money: save, collect, transfer into the nest egg — a receiving-wallet day","收|career":"Work: fold the results into your portfolio, wrap the report, claim the credit you're owed","收|love":"Love: gather the good memories — look back together at how far you've come","收|family":"Family: put things back in place, settle the household accounts, close out the expenses","收|health":"Health: collect the test results, take stock, plan the next round","收|travel":"Travel: come home safe, unpack the bags, settle the trip expenses","開|wealth":"Money: open the new income stream, open the shop, raise prices for good reason","開|career":"Work: launch the project, apply for the new job, announce the good news","開|love":"Love: go public, confess your feelings — good odds of a good answer","開|family":"Family: open the new room, welcome the new member — a lively house","開|health":"Health: start the new health program, join the gym — begun today, it lasts","開|travel":"Travel: open the big trip, head out far — clear skies and open roads","閉|wealth":"Money: close the books, tuck the money away, skip the big shopping — wallet shut","閉|career":"Work: close the cycle, file the folders, hold off on new deals — review the plan","閉|love":"Love: a quiet night in together beats any party tonight","閉|family":"Family: fix the house, seal the leaks, close the door and rest together","閉|health":"Health: sleep well and recover in full — the body is repairing itself","閉|travel":"Travel: no new trips — stay home and plan the next one"}},"zh":{"labels":{"_comment":"基礎標籤對照表 · 繁體中文版 · 譯自泰文原稿（2026-07-10）· 用白話取代日曆上的生僻術語","daypower":{"比肩":{"label":"靠自己","hint":"今天自身能量強，靠自己的雙手就站得穩"},"劫財":{"label":"靠夥伴","hint":"今天團隊和朋友給力，但錢的事一定要說清楚"},"食神":{"label":"享受日","hint":"適合放鬆、創作、好好照顧自己的一天"},"傷官":{"label":"靈感日","hint":"腦子轉得快、適合秀實力，但說話要留三分"},"正財":{"label":"穩定財","hint":"正職收入、實實在在存得下來的財運日"},"偏財":{"label":"機會財","hint":"外快和特殊機會的日子，人脈廣的人特別吃香"},"正官":{"label":"本分日","hint":"適合正式事務、規矩、長輩、形象管理的一天"},"七殺":{"label":"高壓日","hint":"壓力大但決斷力也強，適合正面迎戰"},"正印":{"label":"充電日","hint":"適合學習、休養、辦證件文書，貴人長輩緣好"},"偏印":{"label":"直覺日","hint":"第六感特別準、想法獨到，適合深度工作"}},"officer":{"建":{"label":"啟動日","hint":"適合開始新事情、立下第一個里程碑"},"除":{"label":"大掃除日","hint":"清掉舊東西、斷捨離、開始治療都合適"},"滿":{"label":"豐盛日","hint":"圓滿富足，適合慶祝、聚會、聚人氣"},"平":{"label":"平穩日","hint":"例行事務順順走，適合平等互惠的談判"},"定":{"label":"敲定日","hint":"適合定案、約定、把重要的事情敲死"},"執":{"label":"跟進日","hint":"抓細節、追進度、把該收尾的事握牢"},"破":{"label":"破除日","hint":"只適合拆除、丟棄、了斷，喜事一律避開"},"危":{"label":"謹慎日","hint":"放慢腳步、避開風險，適合靜下來檢視"},"成":{"label":"成事日","hint":"適合收尾漂亮結案、發表成果"},"收":{"label":"收成日","hint":"收錢、收成果、把東西歸位的日子"},"開":{"label":"開張日","hint":"開幕、開賣、開學、啟動計畫都對味"},"閉":{"label":"休養日","hint":"收尾封存、堵住漏洞、養精蓄銳"}},"stem":{"甲":"陽木","乙":"陰木","丙":"陽火","丁":"陰火","戊":"陽土","己":"陰土","庚":"陽金","辛":"陰金","壬":"陽水","癸":"陰水"},"branch":{"子":{"label":"鼠日","animal":"鼠"},"丑":{"label":"牛日","animal":"牛"},"寅":{"label":"虎日","animal":"虎"},"卯":{"label":"兔日","animal":"兔"},"辰":{"label":"龍日","animal":"龍"},"巳":{"label":"蛇日","animal":"蛇"},"午":{"label":"馬日","animal":"馬"},"未":{"label":"羊日","animal":"羊"},"申":{"label":"猴日","animal":"猴"},"酉":{"label":"雞日","animal":"雞"},"戌":{"label":"狗日","animal":"狗"},"亥":{"label":"豬日","animal":"豬"}},"lunarDay":{"format":"農曆第{n}天","hint":"初一＝農曆第1天 · 十五＝第15天 · 廿三＝第23天，初／十／廿寫法由程式轉換"},"ui":{"chongYou":"⚠ 今天沖你","heYou":"✦ 今天合你","chongYear":"沖{animal}年","heYear":"合{animal}年","direction":"方位","luckyColor":"幸運色","deepMode":"深度版","simpleMode":"白話版"},"goal":{"wealth":"財運","career":"事業","love":"感情","family":"家庭","health":"健康","travel":"出行"}},"combos":{"_comment":"日主能量×建除 組合 第3/3組（正印·偏印）· 繁體中文 · 譯自泰文原稿（2026-07-10）","比肩|建":{"title":"親手立樁的一天","text":"想靠自己開始的那件事，今天就下第一根樁，不必等誰點頭，你自己的力量就夠。但找金主、借別人力氣的事今天先不談。先一個人走，路自然會清楚。"},"比肩|除":{"title":"甩掉包袱的一天","text":"拖累自己的習慣、替別人扛到腰痠的責任，今天最適合一刀切掉。清桌面、清行程，把自己的時間拿回來。身上輕了，腳步自然快。"},"比肩|滿":{"title":"能量滿格的一天","text":"體力和心力都滿到溢出來，需要親力親為的事今天全都扛得動；同好聚會、老友重聚更是嗨。只是小心被人一句話激到，去爭沒意義的輸贏——力氣留給自己的目標。"},"比肩|平":{"title":"照自己節奏運轉的一天","text":"一個人做的例行工作今天特別順：重排時間表、運動、把自己的事收進系統。這是默默累積分數的平凡日子，別人看不見沒關係，你自己看得見。"},"比肩|定":{"title":"平起平坐談定的一天","text":"你和對方站在同一高度的合作，今天談得攏：五五分的合夥、各管各的分工，今天講清楚，之後彼此都輕鬆長久。"},"比肩|執":{"title":"把自己的待辦清空的一天","text":"拖了很久的待辦清單，今天一條一條咬著做完。不用等團隊、不用等誰有空，你的雙手就是最好的工具。今晚看到清單短了一半，你會為自己驕傲。"},"比肩|破":{"title":"退出不適合之地的一天","text":"佔你便宜的合約、吸乾你能量的圈子，今天退出最乾脆。別開新局、別簽任何新名字——今天是用來了斷的，不是用來開始的。"},"比肩|危":{"title":"自信可以、別過頭的一天","text":"自信是你的強項，但今天它可能變成陷阱。還沒看清楚的事，別押上自己的名聲；按下確認鍵之前再核對一次。慢那麼一點點，保住整盤棋。"},"比肩|成":{"title":"親手成果開花的一天","text":"一直親自下功夫的事情，今天到了開花結果的時候。漂亮收尾、以自己的名義大方展示成果——這份功勞是你的，別不好意思，收下。"},"比肩|收":{"title":"討回屬於你的一天","text":"借出去的錢、被拿走的東西、沒領的權益，今天追回來特別順。分散在很多人手上的工作，收回來自己做反而更快。"},"比肩|開":{"title":"為自己發聲的一天","text":"發表自己做的東西、接案、報名比賽、主動舉手要機會——今天用自己的名字說話，就有人聽。你的聲音夠大，不需要誰替你開口。"},"比肩|閉":{"title":"為自己充電的一天","text":"推掉聚會、推掉約，把力氣和錢留在身上，安安靜靜跟喜歡的事待一天。今天存下的能量，就是下一仗的本錢。會休息的人才走得遠。"},"劫財|建":{"title":"組隊開打的一天","text":"需要很多雙手的工作，今天開始最容易點著火；把對的人拉進團隊，一拍即合。但錢的規則要從第一天就寫清楚——交情越好，白紙黑字越要清楚。"},"劫財|除":{"title":"清理圈內舊帳的一天","text":"團隊裡卡著的心結、朋友之間的小額欠款，今天攤開來談，了結不傷感情。一直消耗大家的人，也是時候好聚好散——圈子馬上清爽起來。"},"劫財|滿":{"title":"人脈擠滿身邊的一天","text":"飯局、聚會、介紹接介紹，人脈源源不絕地湧過來。但這種日子錢包也漏得最快：出門前先設好預算；今天誰找你合資，一律回答「讓我回去想想」。"},"劫財|平":{"title":"分工前進的一天","text":"團體作業今天平順無戲劇性，一人一份分下去很快就收工。這是四面八方協調的日子，誰擅長什麼就讓誰拿什麼，別又把別人的工作默默揹回自己身上。"},"劫財|定":{"title":"把分帳談定的一天","text":"分錢、分股、分功勞——懸了很久的事今天敲定，而且只能敲在紙上。今天的口頭約定，就是下個月冒出來的麻煩。"},"劫財|執":{"title":"清點別人手上東西的一天","text":"寄放在朋友那的工作、別人代管的錢、借來借去的文件，今天逐項清點一遍。重要的東西，別放在別人手裡超過必要的時間。"},"劫財|破":{"title":"別跟朋友談錢的一天","text":"今天圈子裡翻臉的風險特別高，朋友之間的錢絕對不要拿出來談，先延後。但如果有哪個圈子你心裡早知道不對勁，今天退出最乾脆。"},"劫財|危":{"title":"別替人作保的一天","text":"作保、大額借出、替朋友簽名——這三件事今天全部禁止。在人群裡多聽少說，今天說溜嘴的祕密，傳得比平常快得多。"},"劫財|成":{"title":"團隊一起奪勝的一天","text":"大家一起流汗的工作，今天開花結果。一起慶祝，把功勞分到每一雙幫過忙的手上——今天的大方，就是團隊下一仗的資本。"},"劫財|收":{"title":"結清公帳的一天","text":"團體公款、互相代墊的費用、朋友手上壓著的分成，今天追齊、對到每個人數字都一致。帳目今天算清楚，友情才走得到明年。"},"劫財|開":{"title":"開圈納新的一天","text":"發起共同專案、擴編、招新人——今天對的人會自己走進來。大聲把消息放出去，今天敞開的圈子，收到的是能長久同行的人。"},"劫財|閉":{"title":"關上錢包也關上圈子的一天","text":"今天歇一天別應酬。人一到場子中間，錢包就特別容易漏。跟幾個親近的人安靜待著就好——今天的安靜，比熱鬧省錢多了。"},"食神|建":{"title":"開始讓心發脹的事的一天","text":"創作計畫、興趣、烹飪課、後院小花園——只要做了會快樂的事，今天開始就能走得長遠，因為它從心出發，不是硬撐。"},"食神|除":{"title":"把壓力洗出身體的一天","text":"按摩、泡湯、輕運動、把家整理得清爽；勉強自己很久的工作，今天砍掉。今天的壓力比平常好排解，別留著過夜。"},"食神|滿":{"title":"滿桌菜、滿屋暖的一天","text":"設宴慶祝、做菜給心愛的人吃、家裡辦喜事——今天的氣氛好到不行，席間有小孩更添福氣。今天的飽，是飽到心裡的。"},"食神|平":{"title":"放輕鬆、別塞滿行程的一天","text":"做點好吃的、散散步、挑喜歡的輕活慢慢磨。今天生活的節奏想慢一點，就別把行程排滿。簡單就是今天的禮物，收下吧。"},"食神|定":{"title":"在餐桌上把事談定的一天","text":"約個輕鬆的飯局談正事吧——午餐晚餐就是今天最好的會議室。會議桌上談到僵的事，搬到餐桌上，順利得讓人不敢相信。"},"食神|執":{"title":"耐心磨細活的一天","text":"手作、每個角度都要講究的創意工作，今天手特別穩、心特別靜。慢慢做、慢慢試、慢慢磨——好東西從來不會快，而今天我們不趕。"},"食神|破":{"title":"不再假裝快樂的一天","text":"曾經喜歡、現在做起來卻心累的活動，今天可以承認、可以放下。別再內心疲憊還硬擠笑容。把空間還給自己，新的快樂才有地方落腳。"},"食神|危":{"title":"可以享受、但要有上限的一天","text":"美食、甜點、購物車，就是今天的固定陷阱。可以盡興，但開始前先設好上限。吃喝八分飽，明天早上你的錢包和肚子都會謝謝你。"},"食神|成":{"title":"作品一出就被愛的一天","text":"醞釀很久的創作正好今天完工——放出去吧，回響會暖得超乎預期。用快樂做出來的東西自帶香氣，看的人聞得到。"},"食神|收":{"title":"心愛的事開始回本的一天","text":"手作、內容創作、用心養大的小店，今天收款特別有感。剛發現的獨門配方、小訣竅，記下來收進寶庫，之後都用得上。"},"食神|開":{"title":"開店上新菜的一天","text":"開店、推出新菜單、發第一支內容、開課教自己熱愛的事——今天你的魅力自己會拉客。用笑容打開的門，人潮不會斷。"},"食神|閉":{"title":"安靜小確幸的一天","text":"早點睡、自己煮頓飯、把沒看完的片追完。今天的快樂不用往外找，它就在家裡。好好休飽，明天再出發。"},"傷官|建":{"title":"啟動破格計畫的一天","text":"壓在抽屜裡那個與眾不同的點子，今天拿出來寫成真正的計畫吧——思路特別快、特別鋒利。可以打破框架，但要破得有章法，起跑時別踩到別人的腳。"},"傷官|除":{"title":"拆掉老舊流程的一天","text":"拖慢大家很久的工作流程，今天拆掉重寫，砍掉多餘的步驟不用心疼。今天你的腦子夠快，看得出哪裡冗、哪裡缺——動手吧。"},"傷官|滿":{"title":"滿場聽眾的一天","text":"簡報、提案、上台——今天全場都準備好聽你說，點子盡管秀好秀滿。但今天的火力是雙面刃，別在人群裡開踩人的玩笑，一句話就毀掉整場。"},"傷官|平":{"title":"把點子磨到能用的一天","text":"再驚豔的點子，能落地才值錢。今天適合把超前的東西調得接地氣，寫稿改稿特別順，跟同頻的人交換想法，聊到忘記時間。"},"傷官|定":{"title":"會說更要寫清楚的一天","text":"今天靠口才就能把案子談下來，但千萬別停在口頭——談成什麼立刻白紙黑字，工作範圍越清楚越好。今天的伶牙俐齒，是下個月的雙面刃。"},"傷官|執":{"title":"把作品磨利的一天","text":"卡住的草稿、堵在管線裡的內容，今天坐下來一件一件修完。你的眼睛今天看得見昨天忽略的瑕疵，再改三輪都不累——今天越磨越利。"},"傷官|破":{"title":"嘴巴就是引信的一天","text":"對上司、長輩、公司制度的批評，今天先收在心裡——今天說出口就是炸藥。如果真有想拆的衝動，去拆真正該丟的舊東西，划算得多。"},"傷官|危":{"title":"點子超前、地基還虛的一天","text":"今天的想法確實前衛，但底下的地基還不穩。先別大張旗鼓宣佈，法規、規則、版權逐一查清楚。好東西出場時機錯了，馬上變成壞東西。"},"傷官|成":{"title":"才華掛上名字的一天","text":"靠獨特腦洞做的作品今天亮相，世界準備好看見你的不一樣了。曾被說怪的風格，今天成了你的簽名。讚美大方收下，不用謙虛。"},"傷官|收":{"title":"收創意稿費的一天","text":"點子費、版權費、拖欠的創意報酬，今天全部追得回來。結案後把作品收進作品集——你腦子裡的東西有價，今天就是兌現日。"},"傷官|開":{"title":"讓世界看見的一天","text":"新企劃、新渠道、偷偷做的新玩意——今天發表，聲量是好的那種大。你敢說敢秀就是今天的磁鐵，越真誠越吸引人。"},"傷官|閉":{"title":"讓點子再熟一熟的一天","text":"今天冒出來的好想法先記進本子，別急著發——它還沒熟。敏感話題的貼文今天全部停發。世界暫時不必知道你在想什麼，時候到了它自己會響。"},"正財|建":{"title":"重建金錢系統的一天","text":"開儲蓄帳戶、開始記收支、開始一份每月穩定進帳的工作——今天打下的理財地基特別牢。今天有條有理開始的錢，會養你很久。"},"正財|除":{"title":"堵住錢包漏洞的一天","text":"沒在用的訂閱、每個月默默流掉的小額支出，今天逐筆取消個乾淨；零碎小債一次結清。今天止住的漏財，就是全年的存款。"},"正財|滿":{"title":"金流熱絡的一天","text":"生意旺、進出貨順、客人比平常多。但錢多的日子最容易記漏帳——每一筆都記下來，一筆都別掉。真正的利潤在帳本裡，不在感覺裡。"},"正財|平":{"title":"帳目清爽的一天","text":"記帳、繳費、對帳、實實在在地議價——今天數字安穩沒有意外。平常最無聊的財務例行事務，今天做起來快得反常。"},"正財|定":{"title":"鎖價鎖約的一天","text":"簽買賣合約、談薪水、敲定報價——今天談定的數字站得久、不翻盤，雙方都安心。今天綁定的財務約定，公道又牢靠。"},"正財|執":{"title":"逐行清帳的一天","text":"沒寄的請款單、報帳文件、還沒對上的帳，今天一行一行清到齊。今天的細心直接變成利潤——揪出一個錯的數字，可能就值回一整天。"},"正財|破":{"title":"禁止大額消費和新投資的一天","text":"大件物品、新的投資，今天絕對別掏錢——今天流出去的錢回不來。但如果手上有爛帳或拖著失血的投資，今天停損砍掉最乾脆。"},"正財|危":{"title":"大錢別動的一天","text":"大額轉帳、搬動投資組合、簽貸款，今天全部延後。詐騙和藏著陷阱的合約今天特別多——誰遞什麼過來，小字讀三遍，不確定就是不簽。"},"正財|成":{"title":"等到那筆錢的一天","text":"醞釀很久的案子剛好熟成，今天能成交；追了好幾個月的款項今天入帳。憑證收齊、好好謝過合作方，下一筆生意會更容易。"},"正財|收":{"title":"錢入口袋的一天","text":"催款、收租、轉進儲蓄帳戶——今天是不折不扣的收錢日，錢進來得比平常順。但鐵律是：不再放新的錢出去。今天的錢包是用來收的，不是用來付的。"},"正財|開":{"title":"打開實在財路的一天","text":"開店面、開一條有真實客源的副業、有理有據地調漲價格——今天市場買單。今天開始的新財路不是空氣財，是每個月底數得出來的錢。"},"正財|閉":{"title":"結帳入庫的一天","text":"結月帳、關帳、把錢移到安全的地方——今天適合總結，不適合花。購物車裡躺著的東西就讓它繼續躺。今天關緊的錢包，下個月會更沉。"},"偏財|建":{"title":"開啟本業外新單的一天","text":"副業收入、短期案子、剛來探詢的圈外客戶——今天開始正是好時機。流動的財正在找地方落，但你得先伸手，別等它自己飄過來。"},"偏財|除":{"title":"清倉洗牌的一天","text":"不回本的案子、佔位置的滯銷庫存、拖累整體的部位——今天出清最下得了手。把舊東西放出去騰出空位，新機會才有地方停。"},"偏財|滿":{"title":"財路多頭湧進的一天","text":"今天的社交場就是金礦，人脈一個牽一個。名片盡管發，但嘴巴別亂答應——機會來十條不代表要全抓，挑對的就夠。"},"偏財|平":{"title":"機會低調上門的一天","text":"今天的好案子不會敲鑼打鼓，它藏在與熟人閒聊的字句裡。整天把耳朵打開——某人隨口一句話，可能變成你一整季的收入。"},"偏財|定":{"title":"把機會簽下來的一天","text":"在身邊飄了好幾天的機會，今天要趁風向未變趕快落成白紙黑字。條件談得攏就直接敲——這種東西過了就過了，不會繞回來第二次。"},"偏財|執":{"title":"從細節裡挖出機會的一天","text":"所有人都遺忘的擱置案、沒人讀到最後一頁的條款——今天鑽進去，你會找到別人看不見的好東西。今天最漂亮的機會，就埋在文件堆底下。"},"偏財|破":{"title":"快錢即誘餌的一天","text":"彩券、賭局、短線炒作、報酬率高得反常的東西，今天一律不碰。但如果你正卡在某種投機循環裡，今天是這個月最能一刀斷開的日子。"},"偏財|危":{"title":"機會香得可疑的一天","text":"好到不像真的的案子、熱心得過頭的陌生人——今天是鍍金陷阱的主場。掏錢之前把來歷查三層：真貨不怕查，假貨才會催你快。"},"偏財|成":{"title":"眼光換來獎賞的一天","text":"算計好的險今天開出結果，副業案子漂亮收官。這筆利潤靠的是眼光，不是運氣。把這一輪的思路記下來——它還能再用很多次。"},"偏財|收":{"title":"獲利落袋、別戀戰的一天","text":"到了目標價的部位，今天就獲利了結；流進來的外快立刻收進帳戶。別因為貪心續攤——沒落袋的獲利不叫獲利，那只是數字。"},"偏財|開":{"title":"試沒試過的市場的一天","text":"新銷售渠道、沒碰過的客群——今天一打開就有人接。陌生人就是今天的財源。跨出熟悉的場子一步，新錢都在你熟悉的圍籬外面。"},"偏財|閉":{"title":"暫停一切投機的一天","text":"今天的流動財來得快去得也快，進來多少立刻鎖進不易提領的帳戶。任何形式的冒險先按暫停——今天離開賭桌的手，才是明天接得住真機會的手。"},"正官|建":{"title":"跑正式流程的一天","text":"遞交公文、申請職位、啟動有明確流程的程序——今天體制對你友善，照規矩來，事情順得反常。文件備齊，直接走進去辦。"},"正官|除":{"title":"把紀錄洗乾淨的一天","text":"跟機關卡住的舊案、卡關的許可證、系統裡掛著你名字的錯誤，今天去跑就能解決。乾淨的紀錄是長期資產——今天清完，輕鬆很久。"},"正官|滿":{"title":"盛裝出席的一天","text":"授階、升職慶典、貴賓雲集的開幕式——今天聚光燈打在你身上。舉止要配得上角色，話少但每句有分量。今天留下的印象，會在長輩心裡放很久。"},"正官|平":{"title":"準時就是加分的一天","text":"例行會議、定期文件、按制度回報的工作，今天平穩無波。唯一必須做到位的是「準時」——今天守時的人，名字會被記在好的那一欄。"},"正官|定":{"title":"正式締約的一天","text":"簽大約、訂婚、就任、任命人事——今天綁下的承諾穩固長久。今天當眾宣佈的事，天地共鑒，站得住。"},"正官|執":{"title":"客氣但不放手的一天","text":"遞出去石沉大海的申請、消失的答覆，今天追有效。禮貌地催，文號引齊——體制會為用對方法的人動起來，而今天你的方法是對的。"},"正官|破":{"title":"別跟體制開戰的一天","text":"跟上司衝突、興訟、提上訴，今天全部停。今天硬碰有權者，痛的只有自己這邊。但想撤告、撤案、好聚好散的事，今天辦得漂亮收得乾淨。"},"正官|危":{"title":"名聲易碎的一天","text":"別替人簽名、別為沒看清的事扛責任、別把名字借給任何人。累積多年的聲譽今天比平常脆弱——像守護最後一筆存款一樣守護你的簽名。"},"正官|成":{"title":"升職獲批的一天","text":"等了很久的公事今天批下來，期望的職位名單上有你，上面清楚看見了你的成果。記得謝謝在背後推你一把的人——下一階的梯子才有人幫你扶。"},"正官|收":{"title":"領取到期權益的一天","text":"沒報的福利、到期的權益、該歸檔結案的文件，今天去辦一次收齊。一整年守本分的成果，今天兌換成拿得到手的東西。"},"正官|開":{"title":"打開職涯新路的一天","text":"申請新職位、正式登記開公司、遞交升等——今天職涯的大門敞開。帶著齊全的文件走進去。今天的正式機會，只留給準備好的人。"},"正官|閉":{"title":"歸檔讀規則的一天","text":"今天別遞新案，體制不收客。把時間拿來整理檔案，把跟下一步有關的規定、章程讀透。把規則讀得最深的人，就是下一輪的贏家。"},"七殺|建":{"title":"硬仗開打的一天","text":"躲不掉的硬仗、清單上最難的任務，今天適合開打，因為今天你的膽子特別足。但光有勇不夠，備案要握在手裡——用腦子上場，不是只靠拳頭。"},"七殺|除":{"title":"給老問題動刀的一天","text":"逃了很久的問題、放到潰爛好幾個月的傷口，今天的刀夠利，割得下去。今天短痛，好過再痛一整年。正面迎上去，它才會真的結束。"},"七殺|滿":{"title":"四面受敵的一天","text":"壓力從幾個方向同時砸來：死線撞死線、有人催、問題冒。別全線開戰——排出哪一關必須先過，一關一關打。今天靠順序取勝，不是靠速度。"},"七殺|平":{"title":"中場練兵的一天","text":"壓力暫時鬆了些，先別以為結束了。利用今天有節奏地清掉重活、演練下一輪的應對、趁戰場安靜磨刀。等仗真的來，你會比誰都準備好。"},"七殺|定":{"title":"決定了就不回頭的一天","text":"懸在心中很久的大事，今天必須拍板。資料都齊了，缺的只是膽量。選了路就走，不用回頭——從今天起的猶豫，比選錯更貴。"},"七殺|執":{"title":"咬住不放的一天","text":"人人打退堂鼓的難題，今天你可以用鐵的紀律一個結一個結拆。不用快，但不准停。今天的韌性就是祕密武器——卡了一個月的死結，會鬆在不肯放手的人手裡。"},"七殺|破":{"title":"退一步即是贏的一天","text":"今天引信特別短，一句話說錯位置就可能永久破裂。退一步不是輸，是選戰場。若真有該砸的——比如過期的舊東西——今天盡管全力砸。"},"七殺|危":{"title":"危上加危的一天","text":"身體的險、言語的險、金錢的險，今天三樣全戒。高處、機械、濕滑路面能避就避；火爆的事讓中間人去談。今天待在安全的地方是戰略，不是懦弱。"},"七殺|成":{"title":"長仗打贏的一天","text":"纏鬥很久的事今天以你要的結果收場。曾被笑莽撞的膽識，今天被記成果敢。功勞大大方方收下，然後深呼吸，好好歇一口氣。"},"七殺|收":{"title":"收攏籌碼的一天","text":"打完的仗給你的不只是勝利。把教訓收進口袋，把談判籌碼、人脈和別人對你的敬意安安靜靜收進倉庫——這些東西會在下一仗開花。"},"七殺|開":{"title":"搶先開局的一天","text":"對手還沒站穩、市場還沒反應——今天天時向敢先動手的人敞開。醞釀很久的攻勢今天放出去，先行者的優勢會吃好幾個月。"},"七殺|閉":{"title":"收兵休戰的一天","text":"今天按兵不動就是優勢。從不划算的戰場撤兵，別一個人扛所有仗，能交辦就交辦。關起門真正休息——會休息的將軍，才活得到下一場戰爭。"},"正印|建":{"title":"翻開新篇章的一天","text":"報名課程、開始學一門新學問、動筆寫自己的手冊或書——今天開始的學習之路，從第一步就有貴人長輩在背後撐著。今天開始累積的知識，會變成你的第二個家。"},"正印|除":{"title":"更新舊知識的一天","text":"過時的觀念、被世界甩在後面的舊資料，今天最容易從腦子裡清出去。清書堆、把檔案整理成系統——今天騰出來的腦容量，就是新學問的住處。"},"正印|滿":{"title":"被善意環繞的一天","text":"教學、傳承、需要分享知識的工作——今天大家搶著幫你，暖心的長輩剛好在對的時機出現。把善意收下、把給的人記住，改天輪到我們接力傳下去。"},"正印|平":{"title":"一頁一頁累積的一天","text":"讀、寫、複習，不用趕。今天的腦子對慢慢進來的東西吸收得特別好。今天的二十頁，勝過考前的兩百頁。持之以恆，是練得出來的天賦。"},"正印|定":{"title":"與長輩締約的一天","text":"談獎學金、談學業、簽有長輩參與的長期合約——今天的承諾有人罩。談出來的條件會好得超乎預期，因為對方本來就疼你。"},"正印|執":{"title":"補齊證書的一天","text":"沒修完的學分、還沒去領的證書、缺頁的學術文件，今天一張一張追到齊。這些東西看著瑣碎，其實是下一扇門的鑰匙——今天收好，死線那天就不用狂奔。"},"正印|破":{"title":"放下已被證明是錯的執念的一天","text":"今天別跟老師抬槓、別讓恩人下不了台——跟幫過你的人硬碰，兩邊都會痛得很深。但自己那些已被證明是錯的舊信念，今天盡管砸掉，不必心疼。"},"正印|危":{"title":"假消息滿天飛的一天","text":"假資料、謠言、動過手腳的統計，今天飄得比平常兇。信之前查來源，轉發前再查一次，也別輕易替任何人或任何事簽名背書。你的信用比消息的速度值錢。"},"正印|成":{"title":"苦讀開花的一天","text":"考試通過、拿到證書、文章獲得刊登——今天是圖書館和書桌回報你的日子。安靜累積的學問，今天蓋上了正式的認證章。盡情慶祝吧。"},"正印|收":{"title":"把學問收進倉庫的一天","text":"課程結業、讀完一本書、學習專案收尾——今天先別急著往下衝。坐下來，把學到的東西總結成一頁筆記。沒總結的知識會蒸發，總結過的才跟你一輩子。"},"正印|開":{"title":"開課分享的一天","text":"開班、開講、把知識公開分享——今天大家準備好接收你會的東西。教學就是第二次學習，越給越通透，學術聲望自然跟著來。"},"正印|閉":{"title":"身體要求檢修的一天","text":"睡飽、早點關螢幕、停止往腦子裡塞資訊——今天身體和大腦正在自我修復。休息不是停止前進，是靜音模式下的前進。明天會比今天更清醒。"},"偏印|建":{"title":"走上別人還看不見的路的一天","text":"冷門專業、私人祕密計畫、身邊人還不理解的方向——今天直接開始，不需要任何人的加油聲。今天啟程的怪路，兩年後別人會改口叫它遠見。"},"偏印|除":{"title":"切掉腦中雜訊的一天","text":"垃圾資訊、越滑越心煩的動態、頻率不合的聊天群，今天安靜退出就好。腦子清掉別人的聲音，馬上聽得見自己的聲音——而那個聲音比你以為的準。"},"偏印|滿":{"title":"訊號爆棚的一天","text":"預感、夢境、身邊的徵兆，今天多到滿出來。先把浮現的東西全記進本子，但別急著全信——真的會回來重複，假的自己會淡掉。"},"偏印|平":{"title":"幕後深潛的一天","text":"研究、分析、寫公式，需要長時間專注的深度工作，今天專注力滿格。關掉通知，潛下去。今天的幕後功夫，就是下個月台前成果的根。"},"偏印|定":{"title":"小圈子拍板的一天","text":"專業的事，只跟真正懂它的人談。核心幾個人今天就能拍板，外圍的人不必知道每個細節。計畫的安靜，就是計畫的盔甲。"},"偏印|執":{"title":"挖開被忽略那一層的一天","text":"把工作再往下查一層。小小的異常就藏在人人路過的角落，而今天你的眼睛對這種東西特別利。今天找到的小點，可能擋下下個月的大事。"},"偏印|破":{"title":"情緒低谷別做決定的一天","text":"負面念頭今天轉得比平常兇，情緒往下沉的時候，大事一律不決定。但那些咬了你很久的有毒信念、有毒關係，今天看得最清楚，也切得最斷。"},"偏印|危":{"title":"預感要聽、但先查證的一天","text":"今天的不祥預感先收下，但行動前去核對事實。別一個人待在偏僻處，酒精徹底戒掉——今天直覺和想像之間的那條線，特別細。"},"偏印|成":{"title":"真高手被找上門的一天","text":"默默醞釀許久的專業成果今天完成。曾被當成怪東西的，現在成了市場搶著要的稀有品。大家開始尋找這個領域裡的真高手——而真高手就是你。"},"偏印|收":{"title":"記下獨門心法的一天","text":"只屬於你的知識體系、私房祕方、自己摸出來的技巧——今天有系統地收進倉庫。這些是抄不走的資產。今天記下防忘，往後它就是一門傳家的學問。"},"偏印|開":{"title":"冷門絕活變賣點的一天","text":"因為怕人不懂而藏起來的本事，今天可以亮出來了。小眾市場正在打開，你藏起來的怪，正是賣得掉的不一樣——而且真的有人在等這種東西。"},"偏印|閉":{"title":"獨處聽內心的一天","text":"高品質的獨處：靜坐、一個人安靜散步。把外面的聲音關掉，裡面的聲音今天說得特別清楚。下一步大棋之前，先把自己聽完——答案一直都在裡面。"}},"officer":{"_comment":"通用模式（不知使用者八字）· 十二建除白話版 · 繁體中文 · 譯自泰文原稿（2026-07-10）· 含義依《協紀辨方書》","建":{"title":"啟動日","text":"今天是萬事起頭的日子（建日）。開新案子、簽約入職、上班第一天、命名、亮相，整天都有一股「開局」的推力，今天開始的事情自帶起跑加速度。唯獨動土、拆除這類工程先緩一緩。"},"除":{"title":"大掃除日","text":"今天適合清理和了斷（除日）。丟掉舊物、大掃除、開始看病治療、戒掉壞習慣、結束消耗你的關係——今天切割，乾淨俐落不回頭。把生活裡卡住你的東西清出去，就是今天最好的開運法。"},"滿":{"title":"豐盛日","text":"今天是圓滿富足的日子（滿日）。慶功、家族聚會、進貨補庫存、收東西入庫都順，整體氣氛熱熱鬧鬧、人越多越旺。只有喪葬和傷心事，改天再辦。"},"平":{"title":"平穩日","text":"今天是四平八穩的日子（平日）。例行公事順順走，適合整地鋪路、把工作攤平分配、公平地談條件、東西平均分。不驚喜也不出錯，最適合把事情收進系統、維持生活節奏。"},"定":{"title":"敲定日","text":"今天適合把事情定下來（定日）。談成交易、訂婚、簽約、預約、把日期敲死——今天定案的事情特別穩、特別長久。把重要的事落成白紙黑字，清楚明白就是今天最好的禮物。"},"執":{"title":"跟進日","text":"今天適合抓緊和收攏（執日）。追欠了很久的進度、摳細節、招人進團隊、把石沉大海的事再催一次。今天一件一件咬著做完，耐性和細心比速度更有回報。"},"破":{"title":"破除日","text":"今天是沖破之日（破日），所有喜事一律避開：開幕、簽約、結婚、搬家統統不宜。今天唯一拿手的事就是「拆」和「斷」——拆舊物、退舊案、把該了結的事情了結乾淨。要丟就今天丟，丟得徹底。"},"危":{"title":"謹慎日","text":"今天走在鋼索上（危日），凡事放慢、多想一層。高處作業、機械操作、長途出行，能避就避；大筆的錢先別動。今天最適合靜下來、盤點檢視、拜拜安心。"},"成":{"title":"成事日","text":"今天是心想事成的日子（成日）。結案、發表、結婚、搬家、開業都吉利，經營很久的事情正好在今天收成。今天的能量會推著事情走向漂亮的結局，放心把重要的一步踏出去。"},"收":{"title":"收成日","text":"今天是收割的日子（收日）。收錢、收帳、催款、東西入庫、結清帳目、簽收遲到的包裹都順，今天進來的多、出去的少。適合把一切歸攏到位；要開新局，等「開日」再說。"},"開":{"title":"開張日","text":"今天是大門敞開的日子（開日）。開店、開市、開課、新品上市、新專案啟動——天時正向有長遠打算的開始敞開，今天開的局有持續成長的後勁。想了很久的那件事，今天就按下開始鍵。"},"閉":{"title":"休養日","text":"今天適合關起門來休養（閉日）。結帳封存、堵住漏洞、修理壞掉的東西、把錢收進安全的地方，然後好好休息、儲備體力。開張、亮相、開新局的事，跳過今天再說。"}},"nayin":{"_comment":"納音 30 名（六十甲子循環）· name 用經典納音名 · line 為白話新句 · 繁體中文 · 譯自泰文原稿（2026-07-10）· 依 ref_jia_zi_60","海中金":{"name":"海中金","line":"今天的寶貝藏在深處，要自己潛下去撈，別等它自己浮上來。"},"爐中火":{"name":"爐中火","line":"今天的火又旺又有方向，正適合把大案子熔鑄成形。"},"大林木":{"name":"大林木","line":"像大森林那樣成長：不急著一個人竄高，根纏得緊才是真的穩。"},"路旁土":{"name":"路旁土","line":"路邊的土既接灰塵也接種子。今天心胸放寬，好東西會跟著過路人一起來。"},"劍鋒金":{"name":"劍鋒金","line":"今天的刀鋒是真利，下決定又快又準，但小心刀刃反彈傷到自己。"},"山頭火":{"name":"山頭火","line":"山頂的火全城都看得見。今天做什麼都有人盯著，要亮就亮在對的事上。"},"澗下水":{"name":"澗下水","line":"山澗的冷泉流得安靜卻從不停。今天比的是穩定持久，不是聲勢。"},"城頭土":{"name":"城頭土","line":"今天適合築防線：立規矩、劃界線，守住一路建立起來的東西。"},"白蠟金":{"name":"白蠟金","line":"今天的好東西還軟，可以捏、可以修，先別急著讓它定型，等它自己成形。"},"楊柳木":{"name":"楊柳木","line":"柳枝隨風彎卻不斷。今天柔軟一點——太硬會脆，懂得彎才活得下來。"},"泉中水":{"name":"泉中水","line":"泉水從裡面湧出來。今天的點子和能量都來自你自己，不必等誰來灌。"},"屋上土":{"name":"屋上土","line":"屋頂做得好，沒人看見，直到下雨那天。今天的幕後工作才是真正的主角。"},"霹靂火":{"name":"霹靂火","line":"能量像閃電一樣一陣一陣來，一擊就能改變戰局。抓準時機再出手。"},"松柏木":{"name":"松柏木","line":"松柏在寒冬裡照樣常青。今天你扛壓的耐力，正是別人沒有的強項。"},"長流水":{"name":"長流水","line":"長流的水不斷線。需要長期持續的工作，今天走得特別順。"},"沙中金":{"name":"沙中金","line":"金子混在沙裡，要淘才找得到。今天耐心過濾，就能把真貨帶回家。"},"山下火":{"name":"山下火","line":"山腳的火暖的是身邊人。今天先把眼前的人照顧好再想遠方，溫暖就是力量。"},"平地木":{"name":"平地木","line":"平原上的樹長大是給人歇腳的。今天當得起別人的依靠，樹蔭底下攢的是人望。"},"壁上土":{"name":"壁上土","line":"牆砌得好，房子才算家。今天適合做結構性的收尾，把原有的地基再夯實一層。"},"金箔金":{"name":"金箔金","line":"金箔薄薄一層，卻讓整件作品發光。今天的小細節，做出大不同。"},"覆燈火":{"name":"覆燈火","line":"一盞燈照得亮的只有身邊那一圈。今天把小圈子照清楚就好，別想照亮全城。"},"天河水":{"name":"天河水","line":"天上的雨落遍每個角落、不挑地方。今天不求回報地給，天自然會替你記帳。"},"大驛土":{"name":"大驛土","line":"大路一天迎來送往幾千人。今天敞開接洽，每一件過路的事都可能是機會。"},"釵釧金":{"name":"釵釧金","line":"已經打成首飾的金子。今天手上現有的東西，稍微擦亮就跟新的一樣漂亮。"},"桑柘木":{"name":"桑柘木","line":"一棵桑樹養活全城的蠶織出綢緞。今天能養活別人的小事，就是神聖的大事。"},"大溪水":{"name":"大溪水","line":"大河載著船一路到海。今天水流又急又遠——上對船，剩下的交給水。"},"沙中土":{"name":"沙中土","line":"沙質的土種東西要勤澆水。今天的工作要多回頭澆灌幾次，費心，但值得。"},"天上火":{"name":"天上火","line":"太陽照人不挑臉。今天能量多到用不完，整天發光發熱都不會見底。"},"石榴木":{"name":"石榴木","line":"一顆石榴裡有上百顆籽。今天播下的小種子，會結出多到看不完的果。"},"大海水":{"name":"大海水","line":"大海容得下每一條河。今天什麼意見都聽得進，你的深度就是你的平靜。"}},"conditions":{"_comment":"依個人八字／依日插入的條件句 · 沖（六沖）· 合（六合）· 方位 · 顏色 · 繁體中文 · 譯自泰文原稿（2026-07-10）","chong_personal":{"chip":"⚠ 今天沖你","line":"今天與你的出生年正沖，日的能量和你的命格正面對撞。大事——簽約、發表、遠行——能改期就改期；避不開的話多留緩衝時間、每件事重複核對，而且千萬別在情緒上頭時做決定。"},"chong_universal":{"chip":"沖{animal}年","line":"今天沖屬{animal}的人。如果是你的生肖，大事先緩一緩； const USER_YEAR='子';
const CN={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
function lunarNum(s){const m=String(s||'').match(/(初|十|廿|三十|二十)?([一二三四五六七八九十]+)$/);if(!m)return null;const pre=m[1]||'',t=m[2];
 if(pre==='初')return CN[t]||null;if(pre==='廿'||pre==='二十')return 20+(CN[t]===10?0:CN[t]||0);if(pre==='三十')return 30;
 if(pre==='十')return 10+(CN[t]===10?0:CN[t]||0);if(t==='十')return 10;
 if(t.length===2&&t[1]==='十')return (CN[t[0]]||0)*10;if(t.length===2&&t[0]==='十')return 10+(CN[t[1]]||0);return CN[t]||null}
function fmt(t,v){return String(t||'').replace(/\{(\w+)\}/g,(_,k)=>v[k]??'')}
let st={lang:'th',mode:'self',goal:'all',deep:false};
const DOW=['อา','จ','อ','พ','พฤ','ศ','ส'];
function render(){
 const L=LIB[st.lang],g=document.getElementById('g');let h=DOW.map(d=>'<div class="dow">'+d+'</div>').join('');
 h+='<div class="cell empty"></div>'.repeat(DAYS[0].dow);
 for(const d of DAYS){
  let label,title,text;
  if(st.mode==='self'&&L.combos[d.tenGod+'|'+d.officer]){const c=L.combos[d.tenGod+'|'+d.officer];label=L.labels.daypower[d.tenGod].label;title=c.title;text=c.text}
  else{const o=L.officer[d.officer];label=o.title;title='';text=o.text}
  let chip='';const ct=CHONG[d.branch],he=LIUHE[d.branch];
  if(st.mode==='self'){ if(ct===USER_YEAR)chip='<span class="chip ch">'+L.conditions.chong_personal.chip+'</span>';
   else if(he===USER_YEAR)chip='<span class="chip he">'+L.conditions.he_personal.chip+'</span>'}
  else if(ct)chip='<span class="chip chu">'+fmt(L.conditions.chong_universal.chip,{animal:L.labels.branch[ct].animal})+'</span>';
  const sub=[fmt(L.labels.lunarDay.format,{n:lunarNum(d.lunar)}),(L.nayin[d.nayin]||{}).name,L.labels.branch[d.branch].label].filter(Boolean).join(' · ');
  const goal=(st.goal!=='all'&&L.goals[d.officer+'|'+st.goal])?'<div class="goal">▸ '+L.goals[d.officer+'|'+st.goal]+'</div>':'';
  const deep=st.deep?'<div class="deep">'+d.ganzhi+' · '+d.officer+' · '+d.lunar+' · '+d.tenGod+'</div>':'';
  h+='<div class="cell"><div class="top"><span class="num">'+d.day+'</span><span class="power">'+label+'</span>'+chip+'</div>'
    +'<div class="subline">'+sub+'</div>'+(title?'<div class="title">'+title+'</div>':'')
    +'<div class="text">'+text+'</div>'+goal+deep+'</div>';
 }
 g.innerHTML=h;
 document.getElementById('mode').textContent=st.mode==='self'?'ดวงฉัน 我':'ทั่วไป 黃曆';
 document.getElementById('deep').textContent='แบบลึก: '+(st.deep?'เปิด':'ปิด');
}

render();
