<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ตั้งรหัสผ่านใหม่ · hourkey</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+Thai:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    font-family:'Noto Serif Thai',serif;background:radial-gradient(circle at 50% 0%,#14171c 0%,#0b0d10 70%);color:#f6f1e6;transition:.3s}
  [data-theme="light"] body{background:radial-gradient(circle at 50% 0%,#faf5e8 0%,#f1ebdc 70%);color:#1a1612}
  .card{background:linear-gradient(160deg,#14171c 0%,#0d0f12 100%);border:1px solid rgba(200,164,77,.3);border-radius:18px;
    padding:36px 30px;max-width:440px;width:100%;position:relative}
  [data-theme="light"] .card{background:linear-gradient(160deg,#f9f4e6 0%,#f5efe2 100%);border-color:rgba(138,109,42,.35)}
  .eye{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.32em;color:#c8a44d;text-transform:uppercase;margin-bottom:10px}
  h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;margin-bottom:6px}
  .sub{font-size:13px;color:rgba(246,241,230,.65);margin-bottom:24px;line-height:1.6}
  [data-theme="light"] .sub{color:rgba(26,22,18,.65)}
  label{display:block;font-size:11px;letter-spacing:.06em;color:#c8a44d;margin-bottom:6px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
  input{width:100%;padding:13px 14px;margin-bottom:16px;border-radius:10px;border:1px solid rgba(200,164,77,.28);
    background:rgba(255,255,255,.04);color:inherit;font-family:'Noto Serif Thai',serif;font-size:15px;transition:.2s}
  [data-theme="light"] input{background:rgba(0,0,0,.03);border-color:rgba(138,109,42,.3)}
  input:focus{outline:none;border-color:#c8a44d}
  button{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#c8a44d,#a8862f);color:#1a1410;
    font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:.2s}
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{font-size:13px;margin-top:14px;line-height:1.6;min-height:18px}
  .msg.err{color:#e07a6a}.msg.ok{color:#7ac88a}
  .foot{margin-top:20px;font-size:12px;text-align:center}
  .foot a{color:#c8a44d;text-decoration:none}
  [data-theme="light"] .foot a{color:#8a6d2a}
  .topbar{position:fixed;top:16px;right:18px;display:flex;gap:10px}
  .topbar button{width:auto;padding:6px 10px;background:transparent;border:1px solid rgba(200,164,77,.3);color:#c8a44d;font-size:10px;letter-spacing:.1em}
</style>
</head>
<body>
<div class="topbar">
  <button id="langBtn" onclick="cycleLang()">TH</button>
  <button id="themeBtn" onclick="toggleTheme()">☾</button>
</div>
<div class="card">
  <div class="eye">RESET PASSWORD · 重設密碼</div>
  <h1 id="t_h1">ตั้งรหัสผ่านใหม่</h1>
  <p class="sub" id="t_sub">กรอกรหัสผ่านใหม่ของคุณ (อย่างน้อย 6 ตัวอักษร)</p>
  <form id="resetForm" onsubmit="return submitReset(event)">
    <label id="t_l1">รหัสผ่านใหม่</label>
    <input type="password" id="pw1" autocomplete="new-password" minlength="6" required/>
    <label id="t_l2">ยืนยันรหัสผ่านใหม่</label>
    <input type="password" id="pw2" autocomplete="new-password" minlength="6" required/>
    <button type="submit" id="t_btn">ตั้งรหัสผ่าน →</button>
    <div class="msg" id="msg"></div>
  </form>
  <div class="foot"><a href="/signup?tab=login" id="t_back">← กลับไปเข้าสู่ระบบ</a></div>
</div>
<script>
/* token จาก path /reset-password/{token} */
var parts = location.pathname.split('/').filter(Boolean);
var TOKEN = decodeURIComponent(parts[parts.length - 1] || '');
if (TOKEN === 'reset-password') TOKEN = '';

var I18N = {
  th:{title:'ตั้งรหัสผ่านใหม่ · hourkey',h1:'ตั้งรหัสผ่านใหม่',sub:'กรอกรหัสผ่านใหม่ของคุณ (อย่างน้อย 6 ตัวอักษร)',l1:'รหัสผ่านใหม่',l2:'ยืนยันรหัสผ่านใหม่',btn:'ตั้งรหัสผ่าน →',back:'← กลับไปเข้าสู่ระบบ',
    bad:'ลิงก์ไม่ครบ · ขอลิงก์รีเซ็ตใหม่อีกครั้ง',mismatch:'รหัสผ่านสองช่องไม่ตรงกัน',short:'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร',sending:'กำลังตั้งรหัส...',ok:'✓ ตั้งรหัสผ่านใหม่สำเร็จ · กำลังพาเข้าระบบ...',neterr:'⚠ เครือข่ายขัดข้อง · ลองใหม่'},
  en:{title:'Set a new password · hourkey',h1:'Set a new password',sub:'Enter your new password (at least 6 characters)',l1:'New password',l2:'Confirm new password',btn:'Set password →',back:'← Back to sign in',
    bad:'Invalid link · request a new reset link',mismatch:'Passwords do not match',short:'Password must be at least 6 characters',sending:'Setting password...',ok:'✓ Password updated · signing you in...',neterr:'⚠ Network error · try again'},
  zh:{title:'設定新密碼 · hourkey',h1:'設定新密碼',sub:'請輸入新密碼（至少 6 個字元）',l1:'新密碼',l2:'確認新密碼',btn:'設定密碼 →',back:'← 返回登入',
    bad:'連結不完整 · 請重新申請重設連結',mismatch:'兩次密碼不一致',short:'密碼至少需 6 個字元',sending:'設定中...',ok:'✓ 密碼已更新 · 正在登入...',neterr:'⚠ 網路錯誤 · 請重試'}
};
/* hk_locale = คีย์มาตรฐานทั้งเว็บ (ของเดิมใช้ hk_lang เดี่ยว ๆ ทำให้ค่าที่ตั้งจากหน้าอื่นไม่ตามมา) */
var LANGS = ['th','en','zh'], LANG = localStorage.getItem('hk_locale') || localStorage.getItem('hk_lang') || 'th';
if (LANGS.indexOf(LANG) < 0) LANG = 'th';

/* 🌐 overlay ภาษาใหม่ (vi/ja/ko/ru/es) — ถามค่าจาก /i18n/<locale>.json ก่อน · th/en/zh พฤติกรรมเดิมเป๊ะ (6 ก.ค. 2569) */
function _rptx(k){
  try{var ov=window.HK_OVERLAY_GET&&HK_OVERLAY_GET('reset-password.html',k,LANG);if(ov!=null)return ov;}catch(_){}
  var d=I18N[LANG]||I18N.th; var v=d[k]; return v!=null?v:I18N.th[k];
}
function _rpbag(){var o={};Object.keys(I18N.th).forEach(function(k){o[k]=_rptx(k);});return o;}
window.__hkOverlayApply=function(l){LANG=l;applyLang();};

function applyLang(){
  var t = _rpbag();
  document.documentElement.lang = LANG;
  document.title = t.title;
  document.getElementById('t_h1').textContent = t.h1;
  document.getElementById('t_sub').textContent = t.sub;
  document.getElementById('t_l1').textContent = t.l1;
  document.getElementById('t_l2').textContent = t.l2;
  document.getElementById('t_btn').textContent = t.btn;
  document.getElementById('t_back').textContent = t.back;
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
}
function cycleLang(){ LANG = LANGS[(LANGS.indexOf(LANG)+1)%3]; try{ localStorage.setItem('hk_locale',LANG); localStorage.setItem('hk_lang',LANG); }catch(e){} applyLang(); }
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',cur);
  localStorage.setItem('hk_theme',cur);
  document.getElementById('themeBtn').textContent = cur==='light'?'☀':'☾';
}
(function(){
  var th = localStorage.getItem('hk_theme') || 'dark';
  document.documentElement.setAttribute('data-theme',th);
  document.getElementById('themeBtn').textContent = th==='light'?'☀':'☾';
  applyLang();
  if (!TOKEN){ var m=document.getElementById('msg'); m.textContent=_rptx('bad'); m.className='msg err'; }
})();

async function submitReset(e){
  e.preventDefault();
  var t = _rpbag(), msg = document.getElementById('msg');
  var p1 = document.getElementById('pw1').value, p2 = document.getElementById('pw2').value;
  if (!TOKEN){ msg.textContent=t.bad; msg.className='msg err'; return false; }
  if (p1.length < 6){ msg.textContent=t.short; msg.className='msg err'; return false; }
  if (p1 !== p2){ msg.textContent=t.mismatch; msg.className='msg err'; return false; }
  var btn = document.getElementById('t_btn'); btn.disabled = true;
  msg.textContent = t.sending; msg.className = 'msg';
  try{
    var r = await fetch('/api/auth/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token: TOKEN, password: p1 })
    });
    if (r.ok){
      msg.textContent = t.ok; msg.className = 'msg ok';
      setTimeout(function(){ location.href = '/master'; }, 1400);
    } else {
      var j = await r.json().catch(function(){return {};});
      msg.textContent = '⚠ ' + (j.error || t.neterr); msg.className = 'msg err';
      btn.disabled = false;
    }
  } catch(_){ msg.textContent = t.neterr; msg.className = 'msg err'; btn.disabled = false; }
  return false;
}
</script>
<script defer src="/js/hk-zhcn.js?v=1"></script>
<script src="/js/hk-i18n-core.js?v=1" defer></script>
<script>
/* 🌐 hk-overlay-boot · ภาษาใหม่ (vi/ja/ko/ru/es) โหลด /i18n/<locale>.json แล้ว re-apply การแปลของหน้า — th/en/zh ไม่เข้าเงื่อนไขนี้เลย (6 ก.ค. 2569) */
(function(){try{
var l=localStorage.getItem('hk_locale')||localStorage.getItem('hk_lang')||'';
if(!l||['th','en','zh'].indexOf(l)!==-1)return;
var n=0;(function boot(){
if(!(window.HK&&window.HK.i18n&&window.HK.i18n.loadOverlay)){if(++n<200)setTimeout(boot,50);return;}
window.HK.i18n.loadOverlay(l).then(function(ov){if(!ov)return;try{if(typeof window.__hkOverlayApply==='function')window.__hkOverlayApply(l);}catch(_){}});
})();
}catch(_){}})();
</script>
</body>
</html>
