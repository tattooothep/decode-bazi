        ['7. 禁止使用',['不得攻擊、爬取、大量抓取、逆向工程、入侵、使用 bot 或規避 rate limit。','不得用服務騷擾、欺騙、勒索、散播仇恨或傷害他人。','不得把解讀宣稱為 Hourkey 保證的專業認證或事實。']],
        ['8. 變更與暫停',['我們可基於安全、品質、成本或法律原因更新、增加、移除或暫停功能。','我們可不時更新本條款，最新日期會顯示於本頁。','更新後繼續使用服務，表示您接受修訂條款。']],
        ['9. 責任限制',['服務按現況提供，不保證解讀準確、完整、不間斷或符合特定目的。','在法律允許範圍內，Hourkey 不對間接損害、利潤損失、使用者決策或解讀結果負責。','在法律允許範圍內，我們的總責任不超過您為相關服務支付給 Hourkey 的金額。']],
        ['10. 法律與聯絡',['本條款依與服務提供者及使用者相關的法律解釋，且不排除法律強制賦予的消費者權利。','若部分條款無法執行，其餘條款仍有效。','如有問題、爭議或疑問，請聯絡 support。']]
      ]},
      cn:{nav:{privacy:'隐私',signup:'注册'},kicker:'服务条款',title:'服务条款',lead:'使用 Hourkey 即表示您接受本条款。Hourkey 提供象征式命理阅读与生活参考工具，不保证未来，也不能取代专业意见。',updated:'最后更新：2026年7月9日',scope:'适用于 hourkey.io 及相关服务',foot:'如对本条款有疑问，请通过网站显示的 support 渠道联系我们。',sections:[
        ['1. 接受条款',['创建账户、登录、购买套餐、使用 AI 师傅、上传资料或使用任何 Hourkey 功能，即表示您同意本条款。','若您代表组织使用服务，表示您有权使该组织受本条款约束。','若不同意本条款，请停止使用服务。']],
        ['2. 服务性质',['Hourkey 提供八字、奇门、择日、多术融合、手相及相关工具的计算、解读与呈现。','解读属于象征式诠释，用于自我反思、规划、娱乐及参考，并非科学事实或保证结果。','AI 输出可能错误、过时、不完整，或受您提供资料影响。']],
        ['3. 重要限制',['不得以 Hourkey 取代医生、律师、财务顾问、心理健康专业人士或其他专业人士。','不得把解读视为投资、医疗、停药、诉讼、结婚、离婚或高风险行动的指令。','健康、法律、财务、安全或紧急事项，应咨询合适专业人士。']],
        ['4. 账户与安全',['您应提供合理准确资料，并保护密码、设备与登录 session。','不得使用他人账户、冒充他人、转售账户或规避点数与使用限制。','若检测到异常使用，我们可暂停、限制或关闭账户以防止损害。']],
        ['5. 点数、套餐与付款',['点数或“ยาม”用于开启 Hourkey 部分功能。条件、价格与点数数量可依套餐页调整。','外部支付服务可能处理付款资料。Hourkey 不打算在系统中保存完整卡号。','退款或取消取决于套餐、适用法律与使用状态。付款错误请附证据联系 support。']],
        ['6. 用户资料与内容',['您对提交的出生资料、问题、图片及其他内容负责。','您允许 Hourkey 为提供解读、运营账户、提升安全及 Privacy Policy 所述目的而处理资料。','不得上传违法、侵犯他人权利或您无权使用的内容。']],
        ['7. 禁止使用',['不得攻击、爬取、大量抓取、逆向工程、入侵、使用 bot 或规避 rate limit。','不得用服务骚扰、欺骗、勒索、传播仇恨或伤害他人。','不得把解读宣称为 Hourkey 保证的专业认证或事实。']],
        ['8. 变更与暂停',['我们可基于安全、质量、成本或法律原因更新、增加、移除或暂停功能。','我们可不时更新本条款，最新日期会显示于本页。','更新后继续使用服务，表示您接受修订条款。']],
        ['9. 责任限制',['服务按现况提供，不保证解读准确、完整、不中断或符合特定目的。','在法律允许范围内，Hourkey 不对间接损害、利润损失、用户决策或解读结果负责。','在法律允许范围内，我们的总责任不超过您为相关服务支付给 Hourkey 的金额。']],
        ['10. 法律与联系',['本条款依与服务提供者及用户相关的法律解释，且不排除法律强制赋予的消费者权利。','若部分条款无法执行，其余条款仍有效。','如有问题、争议或疑问，请联系 support。']]
      ]},
      vi:{nav:{privacy:'Quyền riêng tư',signup:'Đăng ký'},kicker:'ĐIỀU KHOẢN DỊCH VỤ',title:'Điều khoản dịch vụ',lead:'Khi sử dụng Hourkey, bạn chấp nhận các điều khoản này. Hourkey cung cấp công cụ đọc biểu tượng và định hướng cuộc sống; không bảo đảm tương lai và không thay thế tư vấn chuyên môn.',updated:'Cập nhật lần cuối: 9/7/2026',scope:'Áp dụng cho hourkey.io và dịch vụ liên quan',foot:'Nếu có câu hỏi về điều khoản, hãy liên hệ qua kênh support trên website.',sections:[
        ['1. Chấp nhận',['Tạo tài khoản, đăng nhập, mua gói, dùng AI Sifu, tải dữ liệu lên hoặc dùng bất kỳ tính năng nào nghĩa là bạn đồng ý với điều khoản này.','Nếu dùng thay cho tổ chức, bạn xác nhận có quyền ràng buộc tổ chức đó.','Nếu không đồng ý, hãy ngừng sử dụng dịch vụ.']],
        ['2. Bản chất dịch vụ',['Hourkey cung cấp công cụ tính toán và diễn giải các hệ thống như BaZi, Qi Men, chọn ngày, hợp nhất nhiều hệ, xem tay và công cụ liên quan.','Kết quả là diễn giải biểu tượng để suy ngẫm, lập kế hoạch, giải trí và tham khảo; không phải sự thật khoa học hay cam kết kết quả.','AI có thể sai, lỗi thời, thiếu hoặc bị ảnh hưởng bởi dữ liệu bạn nhập.']],
        ['3. Giới hạn quan trọng',['Không dùng Hourkey thay cho bác sĩ, luật sư, cố vấn tài chính, chuyên gia sức khỏe tinh thần hoặc chuyên gia khác.','Không xem kết quả là mệnh lệnh đầu tư, điều trị, ngừng thuốc, kiện tụng, kết hôn, ly hôn hoặc hành động rủi ro.','Với vấn đề sức khỏe, pháp lý, tài chính, an toàn hoặc khẩn cấp, hãy hỏi chuyên gia phù hợp.']],
        ['4. Tài khoản và bảo mật',['Bạn cần cung cấp thông tin tương đối chính xác và bảo vệ mật khẩu, thiết bị, session.','Không dùng tài khoản người khác, mạo danh, bán lại tài khoản hoặc né giới hạn credit.','Nếu phát hiện bất thường, chúng tôi có thể tạm dừng, giới hạn hoặc đóng tài khoản.']],
        ['5. Credit, gói và thanh toán',['Credit hoặc yam dùng để mở một số tính năng. Điều kiện, giá và số credit có thể thay đổi theo trang gói.','Nhà cung cấp thanh toán bên ngoài có thể xử lý dữ liệu thanh toán. Hourkey không chủ ý lưu toàn bộ số thẻ.','Hoàn tiền hoặc hủy tùy gói, luật áp dụng và trạng thái sử dụng. Lỗi thanh toán hãy gửi bằng chứng cho support.']],
        ['6. Dữ liệu và nội dung người dùng',['Bạn chịu trách nhiệm về ngày giờ sinh, câu hỏi, hình ảnh và nội dung gửi vào hệ thống.','Bạn cho phép Hourkey xử lý dữ liệu để cung cấp kết quả, vận hành tài khoản, cải thiện an toàn và theo Privacy Policy.','Không tải lên nội dung trái luật, xâm phạm quyền người khác hoặc bạn không có quyền dùng.']],
        ['7. Hành vi bị cấm',['Không tấn công, scrape, reverse engineer, xâm nhập, dùng bot hoặc né rate limit.','Không dùng dịch vụ để quấy rối, lừa đảo, tống tiền, kích động thù ghét hoặc gây hại.','Không trình bày kết quả như chứng nhận chuyên môn hoặc sự thật do Hourkey bảo đảm.']],
        ['8. Thay đổi và tạm dừng',['Chúng tôi có thể cập nhật, thêm, bỏ hoặc tạm dừng tính năng vì an toàn, chất lượng, chi phí hoặc pháp lý.','Điều khoản có thể được cập nhật; ngày mới nhất hiển thị trên trang này.','Tiếp tục sử dụng sau cập nhật nghĩa là bạn chấp nhận điều khoản sửa đổi.']],
        ['9. Giới hạn trách nhiệm',['Dịch vụ cung cấp theo hiện trạng, không bảo đảm kết quả chính xác, đầy đủ, liên tục hoặc phù hợp mục đích cụ thể.','Trong phạm vi luật cho phép, Hourkey không chịu trách nhiệm với thiệt hại gián tiếp, mất lợi nhuận, quyết định của người dùng hoặc kết quả từ việc diễn giải.','Tổng trách nhiệm của chúng tôi không vượt quá số tiền bạn đã trả cho dịch vụ liên quan khi luật cho phép.']],
        ['10. Luật và liên hệ',['Điều khoản được hiểu theo luật liên quan đến nhà cung cấp và người dùng, không loại bỏ quyền người tiêu dùng bắt buộc.','Nếu một điều khoản không thể thi hành, các điều còn lại vẫn có hiệu lực.','Liên hệ support nếu có vấn đề, tranh chấp hoặc câu hỏi.']]
      ]},
      ja:{nav:{privacy:'プライバシー',signup:'登録'},kicker:'利用規約',title:'利用規約',lead:'Hourkey を利用することで、本規約に同意したものとみなされます。Hourkey は象徴的なリーディングと生活上の参考ツールを提供するもので、未来を保証せず、専門的助言の代替ではありません。',updated:'最終更新日：2026年7月9日',scope:'hourkey.io および関連サービスに適用',foot:'本規約に関する質問は、サイト上の support 窓口からご連絡ください。',sections:[
        ['1. 同意',['アカウント作成、ログイン、購入、AI Sifu の利用、データ送信、各機能の利用により、本規約に同意します。','組織のために利用する場合、その組織を拘束する権限があることを確認します。','同意しない場合は利用を停止してください。']],
        ['2. サービスの性質',['Hourkey は八字、奇門、日選び、多体系統合、手相などの計算・解釈・表示ツールを提供します。','リーディングは内省、計画、娯楽、参考のための象徴的解釈であり、科学的事実や結果保証ではありません。','AI 出力は誤り、古さ、不完全さ、入力データの影響を含む場合があります。']],
        ['3. 重要な制限',['Hourkey を医師、弁護士、金融専門家、メンタルヘルス専門家などの代替として使用しないでください。','投資、治療、服薬中止、訴訟、結婚、離婚、危険行為の命令として扱わないでください。','健康、法律、金融、安全、緊急事項は適切な専門家に相談してください。']],
        ['4. アカウントと安全',['合理的に正確な情報を提供し、パスワード、端末、session を保護してください。','他人のアカウント利用、なりすまし、転売、credit 制限の回避は禁止です。','異常利用を検知した場合、被害防止のためアカウントを停止・制限・閉鎖できます。']],
        ['5. Credit、プラン、支払い',['credit または yam は一部機能の利用に使われます。条件、価格、数量はプランページに従い変更される場合があります。','外部決済業者が決済情報を処理する場合があります。Hourkey は完全なカード番号を保存する意図はありません。','返金や解約はプラン、適用法、利用状況によります。決済エラーは証拠を添えて support へ連絡してください。']],
        ['6. ユーザーデータと内容',['出生情報、質問、画像、その他送信内容について責任を負います。','Hourkey が結果提供、アカウント運営、安全性向上、Privacy Policy の目的で処理することを許可します。','違法、他者の権利侵害、または利用権限のない内容を送信しないでください。']],
        ['7. 禁止行為',['攻撃、スクレイピング、リバースエンジニアリング、不正侵入、bot 利用、rate limit 回避は禁止です。','嫌がらせ、欺瞞、恐喝、ヘイト、他者への害のために使用しないでください。','リーディングを Hourkey が保証する専門認証や事実として示さないでください。']],
        ['8. 変更・停止',['安全、品質、費用、法的理由により機能を更新、追加、削除、停止する場合があります。','本規約は随時更新され、最新日付は本ページに表示されます。','更新後も利用を続ける場合、改定後の規約に同意したものとします。']],
        ['9. 責任制限',['サービスは現状有姿で提供され、正確性、完全性、継続性、特定目的適合性を保証しません。','法の許す範囲で、Hourkey は間接損害、逸失利益、利用者の判断、解釈結果について責任を負いません。','当社の総責任は、法の許す範囲で、関連サービスに対し利用者が Hourkey に支払った額を上限とします。']],
        ['10. 法律と連絡',['本規約は提供者および利用者に関連する法律に従って解釈され、強制的な消費者権利を排除しません。','一部が無効でも他の条項は有効です。','問題、紛争、質問は support へご連絡ください。']]
      ]},
      ko:{nav:{privacy:'개인정보',signup:'가입'},kicker:'서비스 약관',title:'서비스 약관',lead:'Hourkey를 사용하면 본 약관에 동의한 것으로 봅니다. Hourkey는 상징적 리딩과 삶의 참고 도구를 제공하며, 미래를 보장하거나 전문 조언을 대체하지 않습니다.',updated:'최종 업데이트: 2026년 7월 9일',scope:'hourkey.io 및 관련 서비스에 적용',foot:'약관에 관한 질문은 웹사이트의 support 채널로 문의해 주세요.',sections:[
        ['1. 동의',['계정 생성, 로그인, 패키지 구매, AI Sifu 사용, 데이터 업로드 또는 기능 이용 시 본 약관에 동의합니다.','조직을 대신해 사용하는 경우 해당 조직을 구속할 권한이 있음을 확인합니다.','동의하지 않으면 서비스를 중단해 주세요.']],
        ['2. 서비스 성격',['Hourkey는 BaZi, Qi Men, 날짜 선택, 다중 시스템 fusion, 손금 및 관련 도구의 계산과 해석을 제공합니다.','리딩은 성찰, 계획, 오락, 참고를 위한 상징적 해석이며 과학적 사실이나 결과 보장이 아닙니다.','AI 출력은 틀리거나 오래되었거나 불완전하거나 입력 데이터의 영향을 받을 수 있습니다.']],
        ['3. 중요한 제한',['Hourkey를 의사, 변호사, 금융 자문가, 정신건강 전문가 등 전문인의 대체로 사용하지 마세요.','투자, 치료, 약 중단, 소송, 결혼, 이혼, 위험 행동의 지시로 받아들이지 마세요.','건강, 법률, 금융, 안전, 긴급 문제는 적절한 전문가에게 문의하세요.']],
        ['4. 계정과 보안',['합리적으로 정확한 정보를 제공하고 비밀번호, 기기, session을 보호해야 합니다.','타인 계정 사용, 사칭, 계정 재판매, credit 제한 우회는 금지됩니다.','이상 사용이 감지되면 피해 방지를 위해 계정을 정지, 제한 또는 종료할 수 있습니다.']],
        ['5. Credit, 패키지, 결제',['credit 또는 yam은 일부 기능 이용에 쓰입니다. 조건, 가격, 수량은 패키지 페이지에 따라 변경될 수 있습니다.','외부 결제 제공자가 결제 정보를 처리할 수 있습니다. Hourkey는 전체 카드번호를 저장하려는 의도가 없습니다.','환불 또는 취소는 패키지, 적용 법률, 사용 상태에 따릅니다. 결제 오류는 증빙과 함께 support에 문의하세요.']],
        ['6. 사용자 데이터와 콘텐츠',['생년월일, 질문, 이미지 및 제출 콘텐츠에 대한 책임은 사용자에게 있습니다.','Hourkey가 리딩 제공, 계정 운영, 안전 개선 및 Privacy Policy 목적을 위해 처리하는 것을 허용합니다.','불법, 타인의 권리 침해, 사용 권한이 없는 콘텐츠를 업로드하지 마세요.']],
        ['7. 금지 사용',['공격, 스크래핑, 리버스 엔지니어링, 침입, bot 사용, rate limit 우회를 금지합니다.','괴롭힘, 사기, 협박, 혐오 확산, 타인에게 해를 주기 위해 사용하지 마세요.','리딩을 Hourkey가 보증하는 전문 인증이나 사실처럼 표시하지 마세요.']],

    function pickLang(){
      var q=new URLSearchParams(location.search).get('lang');
      var saved=''; try{saved=localStorage.getItem('hk_locale')||localStorage.getItem('hk_lang')||'';}catch(_){}
      var raw=(q||saved||navigator.language||'th').toLowerCase();
      if(raw.indexOf('zh-cn')===0||raw==='cn') return 'cn';
      if(raw.indexOf('zh')===0) return 'zh';
      raw=raw.slice(0,2);
      return LANGS.indexOf(raw)>=0?raw:'en';
    }
    function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function render(lang){
      var d=DATA[lang]||DATA.en;
      document.documentElement.lang=lang==='cn'?'zh-CN':(lang==='zh'?'zh-TW':lang);
      document.documentElement.dataset.lang=lang;
      try{localStorage.setItem('hk_locale',lang);localStorage.setItem('hk_lang',lang);}catch(_){}
      document.title='hourkey · '+d.title;
      document.querySelector('[data-nav="privacy"]').textContent=d.nav.privacy;
      document.querySelector('[data-nav="signup"]').textContent=d.nav.signup;
      document.getElementById('kicker').textContent=d.kicker;
      document.getElementById('title').textContent=d.title;
      document.getElementById('lead').textContent=d.lead;
      document.getElementById('updated').textContent=d.updated;
      document.getElementById('scope').textContent=d.scope;
      document.getElementById('foot').textContent=d.foot;
      document.getElementById('doc').innerHTML=d.sections.map(function(sec,i){
        return '<section class="card '+(i===2?'danger':'')+'"><h2>'+esc(sec[0])+'</h2><ul>'+sec[1].map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul></section>';
      }).join('');
      document.querySelectorAll('#lang button').forEach(function(b){b.classList.toggle('on',b.dataset.lang===lang);});
    }
    var box=document.getElementById('lang');
    box.innerHTML=LANGS.map(function(l){return '<button type="button" data-lang="'+l+'">'+LABEL[l]+'</button>';}).join('');
    box.addEventListener('click',function(e){if(e.target&&e.target.dataset.lang) render(e.target.dataset.lang);});
    render(pickLang());
  })();
