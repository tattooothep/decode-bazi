<style>
  /* fonts · matches /article/geometry */
  :root{
    --serif:'Cormorant Garamond',serif;
    --tc:'Noto Serif TC',serif;
    --th:'Noto Serif Thai',serif;
    --mono:'JetBrains Mono',monospace;
    --bookserif:var(--th),var(--tc),var(--serif);
  }
  /* theme palette · lifted verbatim from /article/geometry */
  [data-theme="dark"]{
    --bg:#0b0d11; --bg-2:#12151b; --bg-3:#191d26; --bg-4:#20242f;
    --fg:#f3edde; --fg-soft:#c3b99f; --fg-faint:#7c766a;
    --gold:#c8a44d; --gold-bright:#e6c976; --gold-deep:#8a6d2a;
    --gold-soft:rgba(200,164,77,.13); --gold-line:rgba(200,164,77,.32);
    --line:rgba(200,164,77,.14);
    --topbar-bg:rgba(11,13,17,.82);
    /* legacy aliases · keep book internals/JS inline styles working */
    --panel:var(--bg-2); --ink:var(--fg); --muted:var(--fg-soft);
    --accent:var(--gold); --accent2:var(--gold-bright);
    --shadow:0 2px 22px rgba(0,0,0,.42);
  }
  [data-theme="light"]{
    --bg:#f6f1e6; --bg-2:#fffdf6; --bg-3:#efe8d6; --bg-4:#e7dfc9;
    --fg:#221e15; --fg-soft:#5b5443; --fg-faint:#948b78;
    --gold:#9c7a22; --gold-bright:#b8933a; --gold-deep:#7a5f1c;
    --gold-soft:rgba(156,122,34,.11); --gold-line:rgba(156,122,34,.38);
    --line:rgba(120,95,30,.18);
    --topbar-bg:rgba(246,241,230,.88);
    --panel:var(--bg-2); --ink:var(--fg); --muted:var(--fg-soft);
    --accent:var(--gold); --accent2:var(--gold-bright);
    --shadow:0 2px 18px rgba(60,45,20,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--th),var(--tc),var(--serif);line-height:1.7;font-size:16px;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
  a{color:var(--gold);text-decoration:none}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}
  .wrap{max-width:920px;margin:0 auto;padding:0 18px}
  /* ===== topbar · matches /article/geometry ===== */
  .topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 20px;background:var(--topbar-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--gold-line);flex-wrap:wrap;row-gap:8px}
  .back{display:inline-flex;align-items:center;gap:9px;text-decoration:none;color:var(--fg);font-size:13px}
  .back .seal{width:28px;height:28px;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--tc);font-size:13px;color:var(--gold);flex-shrink:0}
  .back:hover{color:var(--gold)}
  .top-r{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .lang-seg{display:inline-flex;background:var(--bg-3);border:1px solid var(--gold-line);border-radius:99px;padding:3px}
  .lang-seg button{min-width:30px;height:24px;padding:0 8px;border:none;background:transparent;color:var(--fg-soft);font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.06em;border-radius:99px;cursor:pointer;transition:.2s}
  .lang-seg button.on{background:var(--gold);color:var(--bg)}
  .tbtn{width:30px;height:30px;background:var(--bg-3);border:1px solid var(--gold-line);color:var(--fg-soft);border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.2s}
  .tbtn:hover{color:var(--gold);border-color:var(--gold)}
  .pbtn{height:30px;padding:0 14px;background:var(--gold);border:1px solid var(--gold);color:var(--bg);border-radius:99px;cursor:pointer;font-family:var(--th),var(--serif);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:.2s}
  .pbtn:hover{background:var(--gold-bright);border-color:var(--gold-bright)}
  /* ===== buttons (modal / shelf) ===== */
  .btn{border:1px solid var(--gold-line);background:var(--bg-3);color:var(--fg);border-radius:10px;padding:8px 14px;font:inherit;font-size:14px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn.primary{background:var(--gold);color:var(--bg);border-color:var(--gold)}
  .btn.primary:hover{background:var(--gold-bright);border-color:var(--gold-bright);color:var(--bg)}
  /* ===== cover ===== */
  .cover{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
         margin:22px 0;padding:44px 30px;text-align:center;position:relative;overflow:hidden}
  .cover:before{content:"";position:absolute;inset:10px;border:1px solid var(--accent2);border-radius:12px;opacity:.35;pointer-events:none}
  .cover .kai{font-family:var(--bookserif);font-size:13px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase}
  .cover h1{font-family:var(--bookserif);font-size:clamp(28px,7vw,42px);margin:14px 0 4px;color:var(--ink)}
  .cover .zh{font-size:20px;color:var(--accent);letter-spacing:.2em}
  .cover .who{font-size:clamp(20px,5vw,26px);margin:24px 0 6px;font-weight:700}
  .cover .meta{color:var(--muted);font-size:14px}
  .cover .pillars{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:22px 0 6px}
  .cover .pill{border:1px solid var(--line);border-radius:12px;padding:8px 12px;min-width:58px;background:var(--bg)}
  .cover .pill .lab{font-size:11px;color:var(--muted)}
  .cover .pill .gz{font-size:20px;font-weight:700;color:var(--accent)}
  .cover .dom{display:inline-block;margin-top:12px;padding:5px 14px;border-radius:20px;background:var(--accent);color:#fff;font-size:13px}
  .cover .issued{margin-top:18px;font-size:12px;color:var(--muted)}
  /* ===== toc ===== */
  .toc{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 22px;margin:18px 0}
  .toc h3{font-family:var(--bookserif);margin:0 0 10px;color:var(--accent)}
  .toc ol{margin:0;padding-left:20px}
  .toc li{margin:4px 0}
  .toc a{color:var(--ink)}
  /* ===== chapter ===== */
  .chapter{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px 26px 30px;margin:18px 0;box-shadow:var(--shadow)}
  .chapter .cnum{font-family:var(--bookserif);color:var(--gold);font-size:13px;letter-spacing:.2em}
  .chapter h2{font-family:var(--bookserif);font-size:clamp(22px,5vw,28px);margin:4px 0 16px;color:var(--ink);border-bottom:2px solid var(--accent2);padding-bottom:10px}
  .preface{border-left:3px solid var(--accent2)}
  /* ภาพพื้นดวงหัวบท (r401) · inline SVG deterministic จาก template */
  .chart-fig{margin:2px auto 20px;max-width:440px;text-align:center;break-inside:avoid;page-break-inside:avoid}
  .chart-fig svg{max-width:100%;height:auto;display:block;margin:0 auto}
  /* markdown */
  .md-h{font-family:var(--bookserif);font-weight:700;color:var(--accent);margin:18px 0 8px;line-height:1.4}
  .md-h1{font-size:22px} .md-h2{font-size:19px} .md-h3{font-size:17px} .md-h4{font-size:16px}
  .md-p{margin:9px 0}
  .md-ul{margin:8px 0 8px 4px;padding-left:20px}
  .md-ul li{margin:4px 0}
  .md-sp{height:6px}
  .md-hr{border:0;border-top:1px solid var(--line);margin:16px 0}
  .md-tw{overflow-x:auto;margin:12px 0}
  .md-t{border-collapse:collapse;width:100%;font-size:14px;min-width:480px}
  .md-t th,.md-t td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  .md-t th{background:var(--bg);color:var(--accent);font-weight:700}
  code{background:var(--bg);padding:1px 5px;border-radius:5px;font-size:.92em}
  /* ===== states ===== */
  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .progress{max-width:320px;margin:14px auto 0}
  .progress .track{height:8px;background:var(--line);border-radius:6px;overflow:hidden}
  .progress .fill{height:100%;background:var(--accent);width:10%;transition:width .5s}
  .badge{display:inline-block;font-size:12px;padding:2px 9px;border-radius:20px;border:1px solid var(--line);color:var(--muted);margin-left:6px}
  .badge.degraded{color:#b06a1a;border-color:#e5c48a}
  .notready{color:var(--muted);font-style:italic;padding:8px 0}
  .foot{text-align:center;color:var(--muted);font-size:12px;padding:30px 0 50px}
  /* ===== modal สร้างเล่มใหม่ (r402 · ย้ายจาก fusion) ===== */
  .cmodal{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:18px}
  .cmodal.hidden{display:none}
  .cmodal-dialog{width:min(560px,100%);max-height:90vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .cmodal-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding:18px 20px;border-bottom:1px solid var(--line)}
  .cmodal-title{font-family:var(--bookserif);font-size:18px;font-weight:700;color:var(--accent)}
  .cmodal-sub{margin-top:5px;font-size:13px;color:var(--muted);line-height:1.5}
  .cmodal-body{padding:16px 20px;display:grid;gap:12px}
  .cmodal-flabel{font-size:13px;color:var(--muted)}
  .cmodal-select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);font:inherit;font-size:14px}
  .sci-list{display:grid;gap:8px}
  .sci-item{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;font-size:14px;background:var(--bg)}
  .sci-item.checked{border-color:var(--accent)}
  .sci-item.disabled{opacity:.5;cursor:not-allowed}
  .sci-item input{accent-color:var(--accent)}
  .sci-item .sci-name{font-weight:600;color:var(--ink)}
  .sci-item .sci-note{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap}
  .cmodal-synth{display:flex;gap:9px;align-items:center;border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;font-size:14px;color:var(--ink);background:var(--bg)}
  .cmodal-synth input{accent-color:var(--accent)}
  .cmodal-synth.disabled{opacity:.5;cursor:not-allowed}
  .cmodal-total{font-size:14px;color:var(--ink)}
  .cmodal-total b{font-family:var(--bookserif);font-size:18px;color:var(--gold)}
  .cmodal-msg{font-size:13px;color:#b06a1a;min-height:16px}
  .cmodal-msg.ok{color:var(--muted)}
  .cmodal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--line)}
  /* ===== print → PDF ===== */
  @media print{
    :root{--bg:#fff;--bg-2:#fff;--bg-3:#fff;--panel:#fff;--fg:#000;--ink:#000;--fg-soft:#333;--fg-faint:#555;--muted:#555;--line:#ccc}
    .topbar,.printbtn,.foot .noprint,.cmodal{display:none!important}
    body{font-size:12pt;background:#fff}
    .wrap{max-width:none;padding:0}
    .cover{box-shadow:none;page-break-after:always;border:2px solid var(--accent2)}
    .chapter,.toc{box-shadow:none;page-break-before:always;border:0;padding:0 0 10px}
    .chapter h2,.toc{padding-top:6px}
    .md-tw{overflow:visible}
    .md-t{min-width:0}
    .chart-fig{max-width:340px}
    a{color:#000;text-decoration:none}
  }
</style>

  function normalizeLang(raw){
    raw=String(raw||'').toLowerCase().replace("_","-");
    if(raw==='cn'||raw==='zh-cn'||raw==='zh-hans'||raw==='hans') return 'cn';
    if(raw==='zh'||raw==='zh-tw'||raw==='zh-hant'||raw==='zh-hk'||raw==='hant') return 'zh';
    if(raw.indexOf('en')===0) return 'en';
    if(raw.indexOf('th')===0) return 'th';
    if(["vi","ja","ko","ru","es"].indexOf(raw)!==-1) return raw;
    return '';
  }
  function stateInputForLang(l){ return l==="cn"?"zh-cn":(l==="zh"?"zh-hant":l); }
  function langFromState(st, requested){
    var want=normalizeLang(requested);
    if(st&&st.raw==="zh"&&(st.variant==="cn"||want==="cn")) return "cn";
    return normalizeLang(st&&st.raw)||want||lang||"th";
  }
  function langUrlCode(){ return lang==="cn"?"cn":lang; }
  function langHref(href){
    try{

      var u=new URL(href, location.href); u.searchParams.set("lang", langUrlCode()); u.searchParams.delete("locale");
      return u.pathname+u.search+u.hash;
    }catch(_){ return href; }
  }

    return normalizeLang(q)||langFromState(st,s)||normalizeLang(s)||"th";
  })();

  function esc(s){
    return String(s==null?"":s).replace(/[&<>"']/g,function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];

  // markdown ปลอดภัย (escape ก่อนแปลง) · หัวข้อ/ตาราง/ตัวหนา/ลิสต์/เส้นคั่น
  function mdSafe(md){
    var lines = String(md==null?"":md).split(/\r?\n/), out=[], listBuf=[], i=0;
    function inline(s){ s=esc(s); s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>"); s=s.replace(/`([^`]+)`/g,"<code>$1</code>"); return s; }
    function flushList(){ if(listBuf.length){ out.push('<ul class="md-ul">'+listBuf.join("")+"</ul>"); listBuf=[]; } }
    while(i<lines.length){
      var ln=lines[i];
      if(/^\s*\|.+\|\s*$/.test(ln) && i+1<lines.length && /^\s*\|[\s:|\-]+\|\s*$/.test(lines[i+1])){
        flushList();
        var cells=function(row){ return row.trim().replace(/^\|/,"").replace(/\|$/,"").split("|").map(function(c){ return inline(c.trim()); }); };
        var head=cells(ln); i+=2; var rows=[];
        while(i<lines.length && /^\s*\|.+\|\s*$/.test(lines[i])){ rows.push(cells(lines[i])); i++; }
        out.push('<div class="md-tw"><table class="md-t"><thead><tr>'+head.map(function(h){return "<th>"+h+"</th>";}).join("")+
          "</tr></thead><tbody>"+rows.map(function(r){return "<tr>"+r.map(function(c){return "<td>"+c+"</td>";}).join("")+"</tr>";}).join("")+"</tbody></table></div>");
        continue;
      }
      if(/^\s*#{1,4}\s+/.test(ln)){ flushList(); var lvl=ln.match(/^\s*(#{1,4})/)[1].length; out.push('<div class="md-h md-h'+lvl+'">'+inline(ln.replace(/^\s*#{1,4}\s+/,""))+"</div>"); i++; continue; }
      if(/^\s*[-*•]\s+/.test(ln)){ listBuf.push("<li>"+inline(ln.replace(/^\s*[-*•]\s+/,""))+"</li>"); i++; continue; }
      var num=ln.match(/^\s*(\d{1,2}[.)])\s+(.*)$/);
      if(num){ flushList(); out.push('<div class="md-p"><strong>'+esc(num[1])+"</strong> "+inline(num[2])+"</div>"); i++; continue; }
      if(/^\s*(-{3,}|_{3,})\s*$/.test(ln)){ flushList(); out.push('<hr class="md-hr">'); i++; continue; }
      flushList();
      out.push(ln.trim()===""?'<div class="md-sp"></div>':'<div class="md-p">'+inline(ln)+"</div>");
      i++;
    }
    flushList();
    return out.join("");
  }

  function applyStaticI18n(){

  function loadOverlayForLang(l, done){
    var ol=overlayLocale(l);

  function pillarBox(lab, p){

  function renderCover(cover, book){
    if(!cover) cover={};

      '<div class="meta">'+esc(cover.birthSolar||"")+(cover.place?(" · "+esc(cover.place)):"")+"</div>"+

  function renderTOC(chapters, synthOn){
    var items = [];
    items.push('<li><a href="#preface">'+esc(t("preface"))+"</a></li>");
    (chapters||[]).forEach(function(c,idx){
      items.push('<li><a href="#ch-'+esc(c.science)+'">'+esc(t("chapter"))+" "+(idx+1)+" · "+esc(c.label)+(c.ok?"":' <span class="badge degraded">'+esc(t("notReady"))+"</span>")+"</a></li>");
    });
    if(synthOn){ items.push('<li><a href="#synthesis">'+esc(t("synthesis"))+"</a></li>"); }
    items.push('<li><a href="#appendix">'+esc(t("appendix"))+"</a></li>");
    return '<nav class="toc" id="toc"><h3>'+esc(t("toc"))+"</h3><ol>"+items.join("")+"</ol></nav>";
  }

  // ภาพพื้นดวงหัวบท (r401) · c.chartSvg = inline SVG จาก server (deterministic · ไม่มี script) · ไม่มี=ข้าม
  function chartFig(c){
    var svg = c && c.chartSvg;

  function renderChapter(c, idx){

  function renderSection(id, title, markdown){

    return '<article class="chapter" id="'+id+'"><h2>'+esc(title)+"</h2>"+body+"</article>";
  }

  function renderAppendix(res){
    var ap = (res && res.appendix) || {};
    var rows = [];
    if(ap.method) rows.push("<p><strong>"+esc(t("method"))+":</strong> "+esc(ap.method)+"</p>");
    if(ap.disclaimer) rows.push("<p><strong>"+esc(t("disclaimer"))+":</strong> "+esc(ap.disclaimer)+"</p>");
    var sk = ap.skipped && ap.skipped.length ? "<p>"+esc(t("degraded"))+": "+esc(ap.skipped.join(", "))+"</p>" : "";
    return '<article class="chapter" id="appendix"><h2>'+esc(t("appendix"))+"</h2>"+rows.join("")+sk+"</article>";
  }

  function renderBook(book){
    var res = book.result || {};
    var chapters = res.chapters || [];
    var timingMd = (res.synthesis && res.synthesis.markdown) || "";
    // synthesis markdown มี 2 บท (## บทหลอมรวม + ## บทจังหวะเวลา) รวมในก้อนเดียว → แสดงเป็นบทหลอมรวม
    // บทหลอมรวม: แสดงเมื่อผู้ใช้ติ๊ก (requested !== false) · เล่มเก่าไม่มี field = แสดงเหมือนเดิม
    var synthOn = !(res.synthesis && res.synthesis.requested === false);
    var html = "";
    html += renderCover(res.cover||{}, book);
    html += renderTOC(chapters, synthOn);
    html += renderSection("preface", t("preface")+" · "+t("kai"), t("prefaceBody"));
    // ทำ preface เป็น left-border style
    chapters.forEach(function(c,idx){ html += renderChapter(c, idx); });
    if(synthOn){ html += renderSection("synthesis", t("synthesis")+" · "+t("timing"), timingMd); }
    html += renderAppendix(res);
    var deg = (res.meta && res.meta.degradedChapters && res.meta.degradedChapters.length) ? '<span class="badge degraded">'+esc(t("degraded"))+"</span>" : "";

    root.innerHTML = html;
    var pre = document.getElementById("preface"); if(pre) pre.classList.add("preface");
    bookName = (res.cover && res.cover.name) || "";
  }

  function loadShelf(){
    root.innerHTML = '<div class="state"><div class="spinner"></div><div>'+esc(t("shelfTitle"))+"…</div></div>";

  function load(){
    var id = getId();
    if(!id){ loadShelf(); return; }
    ensureSignedIn().then(function(ok){
      if(!ok){ location.href = loginHref(); return null; }
      return fetch("/api/book?id="+encodeURIComponent(id), { headers:{ "Accept":"application/json" }, credentials:"same-origin" });
    })
      .then(function(r){ if(!r) return null; return r.json().then(function(j){ return { ok:r.ok, j:j }; }); })
      .then(function(res){
        if(!res) return;
        var j = res.j || {};
        if(!res.ok || j.error){
          if(j.error==="not_logged_in"){ location.href = "/signup?next="+encodeURIComponent(location.pathname+location.search); return; }
          renderError(j.error || "error"); return;
        }
        if(j.status==="running"){
          renderRunning(j);

        if(j.status==="error"){ renderError(j.error || t("errTitle")); return; }
        // done | degraded → render จาก result (resume โหลดซ้ำ = ไม่เจนใหม่)

  var DISCIPLINES = {
    bazi:    { th:"ปาจื้อ 八字",          en:"BaZi 八字",          zh:"八字", cn:"八字", vi:"BaZi 八字", ja:"四柱推命 八字", ru:"Ба-цзы 八字", ko:"사주 八字", es:"BaZi 八字", needsBirthTime:false, available:true },
    qizheng: { th:"ดาวจริง 七政四餘",      en:"Real-Star 七政四餘", zh:"七政四餘", cn:"七政四余", vi:"Sao thực 七政四餘", ja:"七政四余", ru:"Реальные звезды 七政四餘", ko:"실성 七政四餘", es:"Estrellas reales 七政四餘", needsBirthTime:true,  available:true },
    ziwei:   { th:"จื่อเวยโต่วซู 紫微斗數", en:"Zi Wei 紫微斗數",    zh:"紫微斗數", cn:"紫微斗数", vi:"Tử Vi 紫微斗數", ja:"紫微斗数", ru:"Цзы Вэй 紫微斗數", ko:"자미두수 紫微斗數", es:"Zi Wei 紫微斗數", needsBirthTime:true,  available:true },
    western: { th:"โหราตะวันตก",          en:"Western Astrology",  zh:"西洋占星", cn:"西洋占星", vi:"Chiêm tinh Tây phương", ja:"西洋占星術", ru:"Западная астрология", ko:"서양 점성술", es:"Astrología occidental", needsBirthTime:false, available:true },
    vedic:   { th:"โหราพระเวท (ฮินดู)",   en:"Vedic Astrology",    zh:"吠陀占星", cn:"吠陀占星", vi:"Chiêm tinh Vệ Đà", ja:"ヴェーダ占星術", ru:"Ведическая астрология", ko:"베다 점성술", es:"Astrología védica", needsBirthTime:false, available:true },
    uranian: { th:"โหราศาสตร์ยูเรเนียน",  en:"Uranian Astrology",  zh:"天王星占星(漢堡學派)", cn:"天王星占星(汉堡学派)", vi:"Chiêm tinh Uranian", ja:"ウラニアン占星術", ru:"Уранианская астрология", ko:"우라니안 점성술", es:"Astrología uraniana", needsBirthTime:false, available:true }
  };
  var SCI_ORDER = ["bazi","qizheng","ziwei","western","vedic","uranian"];
  var BOOK_SCI_YAM = 50, BOOK_SYNTH_YAM = 50;
  var cProfiles = [], cProfileId = "", cSel = {}, cSynth = true, cSubmitting = false;
  function sciLabel(s){ var b=DISCIPLINES[s]; return b?(b[lang]||b.en||b.th):s; }
  function cProfileById(id){ return cProfiles.find(function(p){ return String(p.id)===String(id); })||null; }
  function cProfileHasTime(p){ return !p || p.birth_time_known !== false; }
  function cSelectable(){ var has=cProfileHasTime(cProfileById(cProfileId)); return SCI_ORDER.filter(function(s){ var b=DISCIPLINES[s]; return b&&b.available&&(!b.needsBirthTime||has); }); }
  function cSelectedList(){ return cSelectable().filter(function(s){ return cSel[s]; }); }
  function cComputeYam(){ var n=cSelectedList().length; return n*BOOK_SCI_YAM+(cSynth&&n>=2?BOOK_SYNTH_YAM:0); }
  function cRenderSci(){
    var list=document.getElementById("cmodal-sci"); if(!list) return;
    var has=cProfileHasTime(cProfileById(cProfileId));
    list.innerHTML = SCI_ORDER.map(function(s){
      var b=DISCIPLINES[s];
      var blockedTime=b.needsBirthTime&&!has;
      var disabled=!b.available||blockedTime;
      var checked=!!cSel[s]&&!disabled;
      var note=!b.available?t("soon"):(blockedTime?t("needTime"):(BOOK_SCI_YAM+" 時"));
      return '<label class="sci-item'+(checked?" checked":"")+(disabled?" disabled":"")+'" data-sci="'+s+'">'+
        '<input type="checkbox" data-sci-cb="'+s+'"'+(checked?" checked":"")+(disabled?" disabled":"")+'>'+
        '<span class="sci-name">'+esc(sciLabel(s))+'</span>'+
        '<span class="sci-note">'+esc(note)+'</span></label>';
    }).join("");
  }
  function cUpdate(){
    var n=cSelectedList().length;
    var row=document.getElementById("cmodal-synth-row");
    var cb=document.getElementById("cmodal-synth");
    var sd=n<2;
    if(row) row.classList.toggle("disabled",sd);
    if(cb){ cb.disabled=sd; cb.checked=cSynth&&!sd; }
    var yam=document.getElementById("cmodal-yam"); if(yam) yam.textContent=cComputeYam();
    var conf=document.getElementById("cmodal-confirm"); if(conf) conf.disabled=(n===0||cSubmitting);
    var msg=document.getElementById("cmodal-msg"); if(msg&&!cSubmitting){ msg.className="cmodal-msg"; msg.textContent=(n===0?t("noSci"):""); }
  }
  function cFillProfiles(){
    var sel=document.getElementById("cmodal-profile"); if(!sel) return;
    sel.innerHTML = cProfiles.map(function(p){
      var nm = p.is_self ? ("⭐ "+(p.name||p.nickname||"—")) : (p.nickname||p.name||"—");
      return '<option value="'+esc(String(p.id))+'">'+esc(nm)+"</option>";
    }).join("");
    if(cProfileId && sel.querySelector('option[value="'+cProfileId+'"]')) sel.value=cProfileId;
    else cProfileId = sel.value;
  }
  function openCreateModal(){
    var m=document.getElementById("cmodal"); if(!m) return;
    var msg=document.getElementById("cmodal-msg"); if(msg){ msg.className="cmodal-msg"; msg.textContent=""; }
    cSubmitting=false;
    cSel={}; cSelectable().forEach(function(s){ cSel[s]=true; }); cSynth=true;
    m.classList.remove("hidden");
    if(!cProfiles.length){
      fetch("/api/profile",{ credentials:"same-origin", cache:"no-store", headers:{ "Accept":"application/json" } })
        .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, st:r.status, j:j }; }); })
        .then(function(res){
          if(res.st===401){ location.href="/signup?next="+encodeURIComponent(location.pathname); return; }
          var j=res.j||{};
          cProfiles=Array.isArray(j.profiles)?j.profiles:[];
          if(!cProfiles.length){ if(msg){ msg.className="cmodal-msg"; msg.textContent=t("noProfile"); } var c=document.getElementById("cmodal-confirm"); if(c) c.disabled=true; return; }
          cProfileId=String((j.active_profile&&j.active_profile.id)||cProfiles[0].id);
          cSel={}; cSelectable().forEach(function(s){ cSel[s]=true; });
          cFillProfiles(); cRenderSci(); cUpdate();
        })
        .catch(function(){ if(msg){ msg.className="cmodal-msg"; msg.textContent=t("jobError"); } });
    } else {
      cFillProfiles(); cRenderSci(); cUpdate();
    }
  }
  function closeCreateModal(){ var m=document.getElementById("cmodal"); if(m) m.classList.add("hidden"); }
  function submitCreate(){
    if(cSubmitting) return;
    var sciences=cSelectedList(); if(!sciences.length||!cProfileId) return;
    var includeSynth=cSynth&&sciences.length>=2;
    var msg=document.getElementById("cmodal-msg");
    var conf=document.getElementById("cmodal-confirm");
    cSubmitting=true; if(conf) conf.disabled=true;
    if(msg){ msg.className="cmodal-msg ok"; msg.textContent=t("creating"); }
    fetch("/api/book",{ method:"POST", headers:{ "Content-Type":"application/json" }, credentials:"same-origin",
      body: JSON.stringify({ profileId:cProfileId, sciences:sciences, includeSynthesis:includeSynth, lang:lang, force:1 }) })
      .then(function(r){ return r.json().then(function(j){ return { status:r.status, j:j }; }); })
      .then(function(res){
        var j=res.j||{};
        if(j.bookId){ location.href="/book?id="+encodeURIComponent(j.bookId); return; }
        cSubmitting=false; if(conf) conf.disabled=false;
        if(msg){ msg.className="cmodal-msg";
          if(j.error==="insufficient_hours"){ msg.textContent=t("needYam")+" · "+(j.needed||j.required||cComputeYam())+" 時"; }
          else if(res.status===401){ msg.textContent=t("needLogin"); }
          else { msg.textContent=String(j.error||res.status); }
        }
      })
      .catch(function(){ cSubmitting=false; if(conf) conf.disabled=false; if(msg){ msg.className="cmodal-msg"; msg.textContent=t("jobError"); } });
  }
  (function wireCreateModal(){
    var sci=document.getElementById("cmodal-sci");
    if(sci) sci.addEventListener("change",function(e){
      var cb=e.target.closest&&e.target.closest("[data-sci-cb]"); if(!cb) return;
      cSel[cb.getAttribute("data-sci-cb")]=cb.checked;
      var lab=cb.closest(".sci-item"); if(lab) lab.classList.toggle("checked",cb.checked);
      cUpdate();
    });
    var synth=document.getElementById("cmodal-synth");
    if(synth) synth.addEventListener("change",function(){ cSynth=synth.checked; cUpdate(); });
    var prof=document.getElementById("cmodal-profile");
    if(prof) prof.addEventListener("change",function(){
      cProfileId=prof.value;
      cSel={}; cSelectable().forEach(function(s){ cSel[s]=true; });
      cRenderSci(); cUpdate();
    });
    var close=document.getElementById("cmodal-close"); if(close) close.addEventListener("click",closeCreateModal);
    var cancel=document.getElementById("cmodal-cancel"); if(cancel) cancel.addEventListener("click",closeCreateModal);
    var conf=document.getElementById("cmodal-confirm"); if(conf) conf.addEventListener("click",submitCreate);
    var modal=document.getElementById("cmodal"); if(modal) modal.addEventListener("click",function(e){ if(e.target===modal) closeCreateModal(); });
  })();
  // ปุ่ม "สร้างเล่มใหม่" ในชั้นหนังสือ (root re-render บ่อย → ใช้ delegation บน root)
  root.addEventListener("click", function(e){
    var b = e.target.closest && e.target.closest("#shelfNewBtn");
    if(b){ e.preventDefault(); openCreateModal(); }
  });

  // ===== events =====
  document.getElementById("themeBtn").addEventListener("click", function(){
    theme = theme==="dark"?"light":"dark"; localStorage.setItem("hk_book_theme", theme); applyTheme();
  });
  document.getElementById("langSeg").addEventListener("click", function(e){
    var b = e.target.closest("button[data-lang]"); if(!b) return;
    lang = normalizeLang(b.getAttribute("data-lang"))||lang; localStorage.setItem("hk_book_lang", lang);
    applyStaticI18n();
    // re-render เนื้อ (ป้าย UI เปลี่ยน · เนื้อ AI คงภาษาที่เจนไว้)
    load();
    loadOverlayForLang(lang, function(){ load(); });
  });
  document.getElementById("printBtn").addEventListener("click", function(){
    // ตั้งชื่อไฟล์ PDF ให้สวย (browser ใช้ document.title เป็นชื่อไฟล์ตอน Save as PDF)
    var prev = document.title;
    if(bookName){ document.title = t("brand") + "-" + bookName; }
    window.print();
    setTimeout(function(){ document.title = prev; }, 800);
  });

  applyTheme();
  applyStaticI18n();
  load();
  loadOverlayForLang(lang, function(){ load(); });
})();
</script>
<script defer src="/js/hk-zhcn.js?v=1"></script>
<script src="/js/hk-i18n-core.js?v=1" defer></script>
<script>
/* 🌐 hk-overlay-boot · ภาษาใหม่ (vi/ja/ko/ru/es) โหลด /i18n/<locale>.json แล้ว re-apply การแปลของหน้า — th/en/zh ไม่เข้าเงื่อนไขนี้เลย (6 ก.ค. 2569) */
(function(){try{
var l=localStorage.getItem('hk_locale')||localStorage.getItem('hk_lang')||'';
if(!l||['th','en','zh'].indexOf(l)!==-1)return;
var n=0;(function boot(){
if(!(window.HK&&window.HK.i18n&&window.HK.i18n.loadOverlay)){if(++n<200)setTimeout(boot,50);return;}
window.HK.i18n.loadOverlay(l).then(function(ov){if(!ov)return;try{if(typeof window.__hkOverlayApply==='function')window.__hkOverlayApply(l);}catch(_){}});
})();
}catch(_){}})();
</script>
