<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ซินแส Fusion · hourkey</title>
  <style>
    :root{
      --bg:#0e1014;
      --panel:#151922;
      --panel-2:#10131a;
      --line:rgba(210,176,94,.24);
      --line-strong:rgba(210,176,94,.48);
      --text:#f4efe5;
      --muted:rgba(244,239,229,.68);
      --faint:rgba(244,239,229,.42);
      --gold:#d2b05e;
      --gold-2:#8f7433;
      --ok:#77c48a;
      --warn:#d8a84c;
      --bad:#e36f5f;
      --blue:#74a8d8;
      --thai:"Noto Sans Thai","Th Sarabun New",system-ui,sans-serif;
      --mono:"JetBrains Mono","SFMono-Regular",Consolas,monospace;
      --serif:"Cormorant Garamond","Noto Serif Thai",serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--thai);min-height:100vh}
    button,select,textarea{font:inherit}
    a{color:inherit;text-decoration:none}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(14,16,20,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}
    .topbar-inner{max-width:1180px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:18px}
    .brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:22px;color:var(--gold);white-space:nowrap}
    .seal{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid var(--line-strong);border-radius:50%;font-family:serif;font-weight:700;color:var(--bg);background:var(--gold)}
    .nav{display:flex;gap:12px;align-items:center;margin-left:auto;color:var(--muted);font-size:13px}
    .nav a{padding:8px 10px;border:1px solid transparent;border-radius:8px}
    .nav a:hover{border-color:var(--line);color:var(--gold)}
    #hk-user-menu-mount{display:flex;align-items:center}
    main{max-width:1180px;margin:0 auto;padding:28px 18px 44px}
    .header{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:20px;align-items:end;margin-bottom:22px}
    h1{margin:0;font-family:var(--serif);font-size:42px;font-weight:500;line-height:1.08;letter-spacing:0}
    .sub{margin:10px 0 0;color:var(--muted);font-size:14px;line-height:1.6;max-width:720px}
    .badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .badge{display:inline-flex;align-items:center;min-height:30px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;color:var(--muted);font-family:var(--mono);font-size:11px;background:rgba(255,255,255,.02)}
    .badge.ok{border-color:rgba(119,196,138,.45);color:var(--ok)}
    .badge.warn{border-color:rgba(216,168,76,.45);color:var(--warn)}
    .layout{display:grid;grid-template-columns:390px minmax(0,1fr);gap:18px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
    .panel-title{font-family:var(--mono);font-size:12px;color:var(--gold);letter-spacing:0;text-transform:uppercase}
    .panel-body{padding:16px}
    label{display:block;margin:0 0 8px;color:var(--muted);font-size:12px;font-family:var(--mono)}
    .field{margin-bottom:14px}
    select,textarea{width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:11px 12px;outline:none}
    select:focus,textarea:focus{border-color:var(--gold)}
    textarea{min-height:150px;resize:vertical;line-height:1.55}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btnbar{display:flex;gap:10px;align-items:center}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;border:1px solid var(--line-strong);border-radius:8px;padding:0 15px;background:var(--gold);color:#121212;font-weight:700;cursor:pointer}
    .btn.secondary{background:transparent;color:var(--muted);border-color:var(--line)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .status{min-height:34px;margin-top:12px;color:var(--muted);font-size:13px;line-height:1.5}
    .status.err{color:var(--bad)}
    .status.ok{color:var(--ok)}
    .progress-card{margin-top:12px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.02);padding:11px}
    .progress-card.hidden{display:none}
    .progress-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:9px}
    .progress-title{font-family:var(--mono);font-size:11px;color:var(--gold);text-transform:uppercase}
    .progress-percent{font-family:var(--mono);font-size:12px;color:var(--text)}
    .progress-track{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
    .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--blue));transition:width .35s}
    .progress-message{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.45}
    .progress-models{display:grid;gap:6px;margin-top:10px}
    .progress-model{display:grid;grid-template-columns:132px 76px minmax(0,1fr);gap:8px;align-items:start;font-size:12px}
    .pill.run{color:var(--blue);border-color:rgba(116,168,216,.45)}
    .pill.queue{color:var(--faint)}
    .pill.skip{color:var(--warn);border-color:rgba(216,168,76,.45)}
    .chat{display:flex;flex-direction:column;gap:12px;min-height:500px}
    .msg{display:grid;grid-template-columns:68px minmax(0,1fr);gap:12px}
    .role{font-family:var(--mono);font-size:11px;color:var(--faint);padding-top:10px;text-transform:uppercase}
    .bubble{border:1px solid var(--line);border-radius:8px;padding:13px 14px;background:var(--panel-2);white-space:pre-wrap;line-height:1.65;overflow-wrap:anywhere}
    .msg.user .bubble{background:rgba(210,176,94,.08);border-color:rgba(210,176,94,.34)}
    .meta-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:14px}
    .metric{border:1px solid var(--line);border-radius:8px;padding:10px;background:rgba(255,255,255,.02)}
    .metric .k{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase}
    .metric .v{margin-top:5px;font-family:var(--mono);font-size:12px;color:var(--text);overflow-wrap:anywhere}
    .models{display:grid;gap:8px;margin-top:12px}
    .model-row{display:grid;grid-template-columns:132px 74px minmax(0,1fr);gap:10px;align-items:start;border:1px solid var(--line);border-radius:8px;padding:10px;background:rgba(255,255,255,.02)}
    .model-name{font-family:var(--mono);font-size:12px;color:var(--blue)}
    .fusion-proof{white-space:normal;border:1px solid rgba(116,168,216,.28);border-radius:8px;background:rgba(116,168,216,.06);padding:10px 11px;margin:0 0 12px;display:grid;gap:6px}
    .proof-line{display:flex;gap:8px;align-items:flex-start;font-size:12px;line-height:1.45;color:var(--muted)}
    .proof-tag{flex:0 0 auto;min-width:86px;font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--blue)}
    .proof-value{overflow-wrap:anywhere}
    .proof-muted{color:var(--faint)}
    .answer-tools{white-space:normal;display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
    .answer-tools-label{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase}
    .answer-open{min-height:28px;border:1px solid var(--line);border-radius:8px;background:rgba(116,168,216,.08);color:var(--blue);padding:4px 9px;font-family:var(--mono);font-size:11px;cursor:pointer}
    .answer-open:hover{border-color:rgba(116,168,216,.55);background:rgba(116,168,216,.14)}
    .answer-open.final{border-color:rgba(210,176,94,.45);background:rgba(210,176,94,.08);color:var(--gold)}
    .answer-open.panel{border-color:rgba(116,168,216,.36)}
    .answer-modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.66);display:flex;align-items:center;justify-content:center;padding:18px}
    .answer-modal.hidden{display:none}
    .answer-dialog{width:min(920px,100%);max-height:88vh;background:var(--panel);border:1px solid var(--line-strong);border-radius:8px;display:grid;grid-template-rows:auto minmax(0,1fr);box-shadow:0 24px 70px rgba(0,0,0,.45)}
    .answer-head{display:flex;justify-content:space-between;gap:14px;align-items:start;padding:14px 16px;border-bottom:1px solid var(--line)}
    .answer-title{font-family:var(--mono);font-size:13px;color:var(--gold)}
    .answer-sub{margin-top:5px;font-size:12px;color:var(--muted);line-height:1.45}
    .answer-close{border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--muted);min-height:32px;padding:4px 10px;cursor:pointer}
    .answer-body{margin:0;padding:16px;overflow:auto;white-space:pre-wrap;line-height:1.65;color:var(--text);font-family:var(--thai);font-size:14px;background:var(--panel-2)}
    .pill{display:inline-flex;align-items:center;justify-content:center;min-height:24px;border-radius:8px;padding:3px 8px;font-family:var(--mono);font-size:10px;border:1px solid var(--line);color:var(--muted)}
    .pill.ok{color:var(--ok);border-color:rgba(119,196,138,.45)}
    .pill.err{color:var(--bad);border-color:rgba(227,111,95,.45)}
    .model-note{font-size:12px;color:var(--muted);line-height:1.45;overflow-wrap:anywhere}
    .history-panel{margin-top:18px}
    .history-filters{display:grid;grid-template-columns:minmax(180px,1.4fr) repeat(5,minmax(105px,1fr)) auto;gap:9px;align-items:end;margin-bottom:14px}
    .history-filters input,.history-filters select{width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:10px 11px;outline:none}
    .history-grid{display:grid;grid-template-columns:370px minmax(0,1fr);gap:14px}
    .history-list{display:grid;gap:8px;align-content:start;max-height:680px;overflow:auto;padding-right:4px}
    .history-item{border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.02);padding:10px;display:grid;gap:7px;cursor:pointer}
    .history-item.active{border-color:var(--gold);background:rgba(210,176,94,.08)}
    .history-top{display:flex;justify-content:space-between;gap:8px;align-items:start}
    .history-title{font-size:13px;line-height:1.45;color:var(--text);overflow-wrap:anywhere}
    .history-flags{display:flex;gap:5px;align-items:center;white-space:nowrap}
    .history-meta{font-family:var(--mono);font-size:10px;color:var(--faint);line-height:1.45}
    .history-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .mini-btn{min-height:28px;border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--muted);padding:3px 8px;font-family:var(--mono);font-size:10px;cursor:pointer}
    .mini-btn:hover{border-color:var(--line-strong);color:var(--gold)}
    .mini-btn.active{border-color:rgba(210,176,94,.65);color:var(--gold);background:rgba(210,176,94,.08)}
    .history-detail{min-height:420px;border:1px solid var(--line);border-radius:8px;background:var(--panel-2);padding:14px;overflow:hidden}
    .history-empty{color:var(--muted);font-size:13px;line-height:1.6}
    .detail-head{display:flex;justify-content:space-between;gap:12px;align-items:start;margin-bottom:12px}
    .detail-title{font-size:15px;line-height:1.5;font-weight:700}
    .detail-sub{font-family:var(--mono);font-size:11px;color:var(--faint);line-height:1.5;margin-top:4px}
    .detail-tools{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
    .detail-block{border-top:1px solid var(--line);padding-top:12px;margin-top:12px}
    .detail-label{font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;margin-bottom:7px}
    .detail-text{white-space:pre-wrap;line-height:1.65;font-size:14px;color:var(--text);overflow-wrap:anywhere}
    .note-box{width:100%;min-height:88px;margin-top:8px;background:#0d1016;border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px;resize:vertical}
    .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .compare-card{border:1px solid var(--line);border-radius:8px;padding:11px;background:rgba(255,255,255,.02);min-width:0}
    .compare-card .detail-text{max-height:420px;overflow:auto}
    .history-check{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--faint)}
    .snapshot-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}
    .snapshot-grid .metric{margin:0}
    @media (max-width:900px){
      .header,.layout{grid-template-columns:1fr}
      .badges{justify-content:flex-start}
      .meta-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .history-filters,.history-grid,.compare-grid,.snapshot-grid{grid-template-columns:1fr}
      .history-list{max-height:none}
    }
    @media (max-width:560px){
      .topbar-inner{padding:12px;gap:10px}
      .nav a:not(.keep){display:none}
      main{padding:20px 12px 34px}
      h1{font-size:32px}
      .row,.meta-grid,.model-row{grid-template-columns:1fr}
      .answer-head{display:grid}
      .msg{grid-template-columns:1fr;gap:5px}
      .role{padding-top:0}
      .btnbar{flex-direction:column;align-items:stretch}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/"><span class="seal">時</span><span>hourkey</span></a>
      <nav class="nav">
        <a href="/master">ซินแส</a>
        <a href="/chart">ดวงของฉัน</a>
        <a class="keep" href="/master-fusion">Fusion</a>
      </nav>
      <div id="hk-user-menu-mount"></div>
    </div>
  </header>

  <main>
    <section class="header">
      <div>
        <h1>ซินแส Fusion</h1>
        <p class="sub">Master Lab · 問師 · 3-Panel Fusion + Claude Judge</p>
      </div>
      <div class="badges">
        <span class="badge" id="tier-badge">TIER · -</span>
        <span class="badge" id="balance-badge">時 · -</span>
        <span class="badge warn" id="gate-badge">3-PANEL LAB</span>
      </div>
    </section>

    <section class="layout">
      <aside class="panel">
        <div class="panel-head">
          <div class="panel-title">Ask Packet</div>
          <span class="pill">/api/sifu/fusion</span>
        </div>
        <div class="panel-body">
          <div class="field">
            <label for="profile">Profile</label>
            <select id="profile"></select>
          </div>
          <div class="field">
            <label for="fusion-mode">Mode</label>
            <select id="fusion-mode">
              <option value="resilient">Resilient</option>
            </select>
          </div>
          <div class="row">
            <div class="field">
              <label for="topic">Topic</label>
              <select id="topic">
                <option value="overview">overview</option>
                <option value="career">career</option>
                <option value="wealth">wealth</option>
                <option value="love">love</option>
                <option value="health">health</option>
                <option value="study">study</option>
              </select>
            </div>
            <div class="field">
              <label for="lang">Lang</label>
              <select id="lang">
                <option value="th">TH</option>
                <option value="en">EN</option>
                <option value="zh">ZH</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="question">Question</label>
            <textarea id="question" maxlength="2000" placeholder="ถามดวงจาก profile ที่เลือก"></textarea>
          </div>
          <div class="btnbar">
            <button class="btn" id="send" disabled>Run Fusion · 25 時</button>
            <button class="btn secondary" id="clear" type="button">Clear</button>
          </div>
          <div class="status" id="status"></div>
          <div class="progress-card hidden" id="fusion-progress"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">Fusion Answer</div>
          <span class="pill" id="run-state">idle</span>
        </div>
        <div class="panel-body">
          <div class="chat" id="chat"></div>
          <div id="fusion-meta"></div>
        </div>
      </section>
    </section>

    <section class="panel history-panel">
      <div class="panel-head">
        <div class="panel-title">Premium Fusion History</div>
        <button class="mini-btn" id="history-refresh" type="button">Refresh</button>
      </div>
      <div class="panel-body">
        <div class="history-filters">
          <div>
            <label for="history-q">Search</label>
            <input id="history-q" type="search" maxlength="160" placeholder="ค้นจากคำถาม/คำตอบ">
          </div>
          <div>
            <label for="history-topic">Topic</label>
            <select id="history-topic">
              <option value="">all</option>
              <option value="overview">overview</option>
              <option value="career">career</option>
              <option value="wealth">wealth</option>
              <option value="love">love</option>
              <option value="health">health</option>
              <option value="study">study</option>
            </select>
          </div>
          <div>
            <label for="history-mode">Mode</label>
            <select id="history-mode">
              <option value="">all</option>
              <option value="resilient">resilient</option>
              <option value="strict">strict</option>
            </select>
          </div>
          <div>
            <label for="history-status">Status</label>
            <select id="history-status">
              <option value="">all</option>
              <option value="done">done</option>
              <option value="degraded">degraded</option>
              <option value="fail">fail</option>
            </select>
          </div>
          <div>
            <label for="history-from">From</label>
            <input id="history-from" type="date">
          </div>
          <div>
            <label for="history-to">To</label>
            <input id="history-to" type="date">
          </div>
          <button class="mini-btn" id="history-search" type="button">Search</button>
        </div>
        <div class="history-grid">
          <div class="history-list" id="history-list"></div>
          <div class="history-detail" id="history-detail">
            <div class="history-empty">เลือกประวัติ Fusion เพื่อดูคำตอบ final, คำตอบราย AI, receipt, packet version และ note ส่วนตัว</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="answer-modal hidden" id="answer-modal" role="dialog" aria-modal="true" aria-labelledby="answer-title">
    <div class="answer-dialog">
      <div class="answer-head">
        <div>
          <div class="answer-title" id="answer-title">AI answer</div>
          <div class="answer-sub" id="answer-sub"></div>
        </div>
        <button class="answer-close" id="answer-close" type="button">Close</button>
      </div>
      <pre class="answer-body" id="answer-body"></pre>
    </div>
  </div>

  <script src="/js/hk-user-menu.js?v=14"></script>
  <script>
  (function(){
    var $ = function(id){ return document.getElementById(id); };
    var state = { account:null, fusionAccess:null, spendHours:25, profiles:[], history:[], historyProfileId:'', busy:false, ready:false, progressTimer:null, activeRunId:'', answerSeq:0, answers:{}, fusionHistory:[], activeHistoryId:'', compareIds:[] };
    var els = {
      profile:$('profile'), fusionMode:$('fusion-mode'), topic:$('topic'), lang:$('lang'), question:$('question'), send:$('send'),
      clear:$('clear'), status:$('status'), progress:$('fusion-progress'), chat:$('chat'), meta:$('fusion-meta'), runState:$('run-state'),
      tier:$('tier-badge'), balance:$('balance-badge'), gate:$('gate-badge'),
      answerModal:$('answer-modal'), answerTitle:$('answer-title'), answerSub:$('answer-sub'), answerBody:$('answer-body'), answerClose:$('answer-close'),
      historyList:$('history-list'), historyDetail:$('history-detail'), historyRefresh:$('history-refresh'), historySearch:$('history-search'),
      historyQ:$('history-q'), historyTopic:$('history-topic'), historyMode:$('history-mode'), historyStatus:$('history-status'), historyFrom:$('history-from'), historyTo:$('history-to')
    };
    function esc(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
      });
    }
    function setStatus(text, kind){
      els.status.textContent = text || '';
      els.status.className = 'status' + (kind ? ' ' + kind : '');
    }
    function setRunState(text, kind){
      els.runState.textContent = text;
      els.runState.className = 'pill' + (kind ? ' ' + kind : '');
    }
    function fusionSpendHours(){
      var spend = Number(state.spendHours);
      return Number.isFinite(spend) ? spend : 25;
    }
    function canUseFusion(){
      var access = state.fusionAccess;
      var spend = fusionSpendHours();
      if (!access || access.allowed !== true) return false;
      return spend <= 0 || Number(access.hour_balance || 0) >= spend;
    }
    function fusionGateMessage(){
      var access = state.fusionAccess;
      var spend = fusionSpendHours();
      if (!access) return 'กำลังตรวจสิทธิ์ Fusion';
      if (access.allowed !== true) return 'ต้องใช้สิทธิ์ Master หรือ admin/owner เพื่อใช้ Fusion';
      if (spend > 0 && Number(access.hour_balance || 0) < spend) return 'ยามไม่พอสำหรับ Fusion · ต้องมี ' + spend + ' 時';
      return 'พร้อมถามดวง Fusion · ' + spend + ' 時 ต่อครั้ง';
    }
    function updateSendAvailability(){
      els.send.disabled = state.busy || !state.ready || !canUseFusion();
    }
    function applyFusionGate(){
      var access = state.fusionAccess;
      var spend = fusionSpendHours();

        var j = await r.json().catch(function(){ return {}; });
        if (!r.ok) throw new Error(j.error || ('history ' + r.status));
        state.fusionHistory = Array.isArray(j.history) ? j.history : [];
        state.compareIds = state.compareIds.filter(function(id){ return !!findHistory(id); }).slice(0,2);
        if (state.activeHistoryId && !findHistory(state.activeHistoryId)) state.activeHistoryId = '';
        renderHistoryList();
        renderHistoryDetail(state.activeHistoryId || (state.fusionHistory[0] && state.fusionHistory[0].id) || '');
      } catch(e) {
        els.historyList.innerHTML = '<div class="history-empty">โหลดประวัติไม่สำเร็จ: ' + esc(e.message || e) + '</div>';
      }
    }
    async function patchHistory(id, patch){
      var r = await fetch('/api/sifu/fusion/history', {
        method:'PATCH',
        headers:{ 'Content-Type':'application/json' },
        credentials:'same-origin',
        cache:'no-store',
        body: JSON.stringify(Object.assign({ id:id, profileId:selectedProfileId() }, patch))
      });
      var j = await r.json().catch(function(){ return {}; });
      if (!r.ok) throw new Error(j.error || ('history patch ' + r.status));
      var row = findHistory(id);
      if (row && j.item && j.item.response_meta) {
        row.response_meta = j.item.response_meta;
        row.user_state = j.item.user_state;
      }
      renderHistoryList();
      renderHistoryDetail(id);
    }
    function continueFromHistory(row){
      resetConversationForProfile(row.profile_id || selectedProfileId());
      addMsg('user', row.question || '');
      addMsg('sifu', row.answer || '', fusionFromHistory(row));
      state.history.push({ role:'user', content:row.question || '' }, { role:'assistant', content:row.answer || '' });
      state.history = state.history.slice(-12);
      renderMeta(fusionFromHistory(row));
      setStatus('ตั้ง context จากประวัติรอบนี้แล้ว พิมพ์คำถามต่อได้');
      window.scrollTo({ top:0, behavior:'smooth' });
    }
    function rerunHistory(row){
      resetConversationForProfile(selectedProfileId());
      els.question.value = row.question || '';
      setStatus('กำลังรันใหม่ด้วย packet ปัจจุบันของ profile ที่เลือก');
      window.scrollTo({ top:0, behavior:'smooth' });
      setTimeout(function(){ send(); }, 0);
    }
    function markdownForHistory(row){
      var fusion = fusionFromHistory(row);
      var answers = fusionAnswers(fusion);
      var md = '# Fusion History\\n\\n';
      md += '- Date: ' + rowDate(row) + '\\n';
      md += '- Profile: ' + (row.profile_id || '-') + '\\n';
      md += '- Receipt: ' + runReceipt(row) + '\\n';
      md += '- Packet: ' + (fusion.packet_version || row.packet_hash || '-') + '\\n\\n';
      md += '## Question\\n\\n' + (row.question || '') + '\\n\\n';
      md += '## Final Answer\\n\\n' + (row.answer || '') + '\\n\\n';
      if (answers.length) {
        md += '## AI Answers\\n\\n';
        answers.forEach(function(item){ md += '### ' + answerName(item) + '\\n\\n' + (item.reply || '') + '\\n\\n'; });
      }
      var note = historyUserState(row).note;
      if (note) md += '## Private Note\\n\\n' + note + '\\n';
      return md;
    }
    function exportMarkdown(row){
      var blob = new Blob([markdownForHistory(row)], { type:'text/markdown;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'fusion-history-' + String(row.id || Date.now()).slice(0,8) + '.md';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    }
    function printPdf(row){
      var w = window.open('', '_blank');
      if (!w) { setStatus('เปิดหน้าพิมพ์ PDF ไม่สำเร็จ', 'err'); return; }
      w.document.write('<!doctype html><title>Fusion History</title><style>body{font-family:system-ui,sans-serif;line-height:1.65;padding:28px;max-width:900px;margin:auto}pre{white-space:pre-wrap}</style><h1>Fusion History</h1><pre>' + esc(markdownForHistory(row)) + '</pre>');
      w.document.close();
      w.focus();
      setTimeout(function(){ w.print(); }, 250);
    }
    async function loadAccount(){
      try {
        var r = await fetch('/api/account/me', { credentials:'same-origin', cache:'no-store' });
        var j = await r.json().catch(function(){ return {}; });
        if (!r.ok) throw new Error(j.error || ('account ' + r.status));
        state.account = j;
        var tier = String(j.tier || 'free').toUpperCase();
        els.tier.textContent = 'TIER · ' + tier;
        els.tier.className = 'badge ' + (tier === 'MASTER' ? 'ok' : 'warn');
        els.balance.textContent = '時 · ' + (j.hour_balance == null ? 0 : j.hour_balance);
        return true;
      } catch(e) {
        els.tier.textContent = 'TIER · LOGIN';
        els.tier.className = 'badge warn';
        setStatus('กรุณาเข้าสู่ระบบก่อนใช้ Fusion', 'err');
        els.send.disabled = true;
        return false;
      }
    }
    async function loadFusionAccess(){
      try {
        var r = await fetch('/api/sifu/fusion?check=access', { credentials:'same-origin', cache:'no-store' });
        var j = await r.json().catch(function(){ return {}; });
        if (!r.ok) throw new Error(j.error || ('fusion access ' + r.status));
        state.fusionAccess = j.access || null;
        state.spendHours = Number(j.spend_hours == null ? 25 : j.spend_hours);
        if (state.fusionAccess && state.fusionAccess.hour_balance != null) {
          els.balance.textContent = '時 · ' + state.fusionAccess.hour_balance;
        }
        applyFusionGate();
        return true;
      } catch(e) {
        state.fusionAccess = null;
        applyFusionGate();
        setStatus('ตรวจสิทธิ์ Fusion ไม่สำเร็จ: ' + (e.message || e), 'err');
        return false;
      }
    }
    async function loadProfiles(){
      var r = await fetch('/api/profile', { credentials:'same-origin', cache:'no-store' });
      var j = await r.json().catch(function(){ return {}; });
      if (!r.ok) throw new Error(j.error || ('profile ' + r.status));
      state.profiles = Array.isArray(j.profiles) ? j.profiles : [];
      els.profile.innerHTML = '';
      if (!state.profiles.length) {
        var opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'ไม่มี profile';
        els.profile.appendChild(opt);
        return;
      }
      var saved = '';
      try { saved = localStorage.getItem('hk_profile_id') || ''; } catch(_){}
      var active = (j.active_profile && j.active_profile.id) || saved || state.profiles[0].id;
      state.profiles.forEach(function(p){
        var opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = (p.nickname || p.name || 'profile') + ' · 日主 ' + (p.day_master || '-');
        els.profile.appendChild(opt);
      });
      if (active) els.profile.value = String(active);
      resetConversationForProfile(els.profile.value);
    }
    async function send(){
      if (state.busy) return;
      if (!state.ready) { setStatus('กำลังโหลดบัญชีและ profile', 'err'); return; }
      var message = els.question.value.trim();
      var profileId = selectedProfileId();
      if (!profileId) { setStatus('กรุณาเลือก profile', 'err'); return; }
      if (!message) { setStatus('กรุณาใส่คำถาม', 'err'); return; }
      if (!canUseFusion()) { applyFusionGate(); setStatus(fusionGateMessage(), 'err'); return; }
      if (state.historyProfileId !== profileId) resetConversationForProfile(profileId);
      state.busy = true;
      els.send.disabled = true;
      setRunState('running');
      setStatus('กำลังเรียก Codex, Grok, Gemini API เป็น panel · Claude เป็น judge · ค่ารัน 25 時');
      var runId = newRunId();
      startProgressPolling(runId);
      addMsg('user', message);
      renderMeta(null);
      try {
        var body = {
          message: message,
          profileId: profileId,
          topic: els.topic.value,
          lang: els.lang.value,
          history: state.history.slice(-6),
          threadId: 'master-fusion',
          threadProfileId: profileId,
          runId: runId,
          fusionMode: 'resilient',
          noCache: true
        };
        var r = await fetch('/api/sifu/fusion', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          credentials:'same-origin',
          cache:'no-store',
          body: JSON.stringify(body)
        });
        var j = await r.json().catch(function(){ return {}; });
        if (!r.ok) throw Object.assign(new Error(j.error || ('fusion ' + r.status)), { data:j, status:r.status });
        var fusion = j.fusion || {};
        var aiLine = (fusion.ai_answered_count != null && fusion.ai_requested_count != null)
          ? ('Fusion รอบนี้: AI ตอบจริง ' + fusion.ai_answered_count + '/' + fusion.ai_requested_count + ' ตัว' + (fusion.judge_backup_used ? ' · ใช้ judge สำรอง' : '') + (fusion.used_panel_fallback ? ' · ใช้ panel fallback' : '') + '\n\n')
          : '';
        addMsg('sifu', aiLine + (j.reply || ''), fusion);
        state.history.push({ role:'user', content:message }, { role:'assistant', content:j.reply || '' });
        state.history = state.history.slice(-12);
        renderMeta(fusion);
        renderProgressFromFusion(fusion);
        setRunState(fusion && fusion.degraded ? 'degraded' : 'done', fusion && fusion.degraded ? 'err' : 'ok');
        setStatus('Fusion complete · AI answered ' + (fusion.ai_answered_count != null ? fusion.ai_answered_count : '-') + '/' + (fusion.ai_requested_count != null ? fusion.ai_requested_count : '-'), 'ok');
        if (fusion && fusion.balance_after != null) {
          els.balance.textContent = '時 · ' + fusion.balance_after;
          if (state.fusionAccess) state.fusionAccess.hour_balance = Number(fusion.balance_after);
        }
        els.question.value = '';
        try { localStorage.setItem('hk_profile_id', profileId); } catch(_){}
        await loadFusionHistory();
      } catch(e) {
        var d = e.data || {};
        var msg = d.reason || d.error || e.message || 'fusion failed';
        addMsg('sifu', 'ไม่สามารถรัน Fusion ได้: ' + msg, d.fusion);
        renderMeta(d.fusion);
        if (d.fusion) renderProgressFromFusion(d.fusion);
        if (d.access) state.fusionAccess = d.access;
        if (d.balance != null && state.fusionAccess) state.fusionAccess.hour_balance = Number(d.balance);
        if (d.fusion && d.fusion.balance_after != null) {
          els.balance.textContent = '時 · ' + d.fusion.balance_after;
          if (state.fusionAccess) state.fusionAccess.hour_balance = Number(d.fusion.balance_after);
        }
        setRunState('failed', 'err');
        setStatus(msg, 'err');
        if (d.fusion && d.fusion.history_id) await loadFusionHistory();
      } finally {
        stopProgressPolling();
        state.busy = false;
        applyFusionGate();
      }
    }
    els.send.addEventListener('click', send);
    document.addEventListener('click', function(e){
      var btn = e.target && e.target.closest ? e.target.closest('[data-answer-id]') : null;
      if (btn) {
        openAnswer(btn.getAttribute('data-answer-id'));
        return;
      }
      var hact = e.target && e.target.closest ? e.target.closest('[data-hact]') : null;
      if (hact) {
        e.stopPropagation();
        var id = hact.getAttribute('data-id');
        var row = findHistory(id);
        var act = hact.getAttribute('data-hact');
        if (!row && act !== 'compare') return;
        if (act === 'compare') {
          var checked = !!hact.checked;
          state.compareIds = state.compareIds.filter(function(x){ return x !== id; });
          if (checked) {
            state.compareIds.push(id);
            if (state.compareIds.length > 2) state.compareIds.shift();
          }
          renderHistoryDetail(state.activeHistoryId || id);
          return;
        }
        if (act === 'pin' || act === 'favorite') {
          var us = historyUserState(row);
          var patch = act === 'pin' ? { pinned:!us.pinned } : { favorite:!us.favorite };
          patchHistory(id, patch).catch(function(err){ setStatus(err.message || err, 'err'); });
          return;
        }
        if (act === 'save-note') {
          var noteEl = $('history-note');
          patchHistory(id, { note: noteEl ? noteEl.value : '' }).then(function(){ setStatus('บันทึก note แล้ว', 'ok'); }).catch(function(err){ setStatus(err.message || err, 'err'); });
          return;
        }
        if (act === 'continue') { continueFromHistory(row); return; }
        if (act === 'rerun') { rerunHistory(row); return; }
        if (act === 'export-md') { exportMarkdown(row); return; }
        if (act === 'print-pdf') { printPdf(row); return; }
      }
      var histItem = e.target && e.target.closest ? e.target.closest('.history-item[data-history-id]') : null;
      if (histItem) {
        renderHistoryDetail(histItem.getAttribute('data-history-id'));
        return;
      }
      if (e.target === els.answerModal) closeAnswer();
    });
    els.answerClose.addEventListener('click', closeAnswer);
    document.addEventListener('keydown', function(e){
      if (e.key === 'Escape') closeAnswer();
    });
    els.clear.addEventListener('click', function(){
      resetConversationForProfile(selectedProfileId());
      stopProgressPolling();
      renderProgress(null);
      setStatus('');
      setRunState('idle');
    });
    els.profile.addEventListener('change', function(){
      resetConversationForProfile(selectedProfileId());
      state.activeHistoryId = '';
      state.compareIds = [];
      try { localStorage.setItem('hk_profile_id', selectedProfileId()); } catch(_){}
      setStatus('เปลี่ยน profile แล้ว เริ่มบทสนทนาใหม่');
      loadFusionHistory();
    });
    els.question.addEventListener('keydown', function(e){
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') send();
    });
    els.historyRefresh.addEventListener('click', function(){ loadFusionHistory(); });
    els.historySearch.addEventListener('click', function(){ state.activeHistoryId=''; loadFusionHistory(); });
    [els.historyTopic, els.historyMode, els.historyStatus, els.historyFrom, els.historyTo].forEach(function(el){
      el.addEventListener('change', function(){ state.activeHistoryId=''; loadFusionHistory(); });
    });
    els.historyQ.addEventListener('keydown', function(e){
      if (e.key === 'Enter') { state.activeHistoryId=''; loadFusionHistory(); }
    });
    els.lang.value = (function(){ try { return localStorage.getItem('hk_locale') || 'th'; } catch(_) { return 'th'; } })();
    (async function init(){
      var accountOk = await loadAccount();
      if (!accountOk) return;
      await loadFusionAccess();
      try {
        await loadProfiles();
        await loadFusionHistory();
        state.ready = true;
        applyFusionGate();
        setStatus(fusionGateMessage(), canUseFusion() ? 'ok' : 'err');
      } catch(e) {
        var msg = /401|not logged/i.test(String(e && e.message || ''))
          ? 'กรุณาเข้าสู่ระบบก่อนใช้ Fusion'
          : (e.message || 'โหลดข้อมูลไม่สำเร็จ');
        setStatus(msg, 'err');
        els.send.disabled = true;
      }
    })();
  })();
  </script>
</body>
</html>
