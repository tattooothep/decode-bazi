var LANGS = ['th','en','zh','vi','ja','ru','ko','es'];
function normLang(raw){
  raw = String(raw || '').toLowerCase().replace('_','-');
  if (raw === 'cn' || raw === 'zh-cn' || raw === 'zh-hans') return 'zh';
  if (raw.indexOf('zh') === 0) return 'zh';
  if (LANGS.indexOf(raw) !== -1) return raw;
  return 'th';
}
var LANG = normLang((params.get('lang')) || localStorage.getItem('hk_locale') || localStorage.getItem('hk_lang') || 'th');

function _vtx(k){
  try{var ov=window.HK_OVERLAY_GET&&HK_OVERLAY_GET('verify-email-result.html',k,LANG);if(ov!=null)return ov;}catch(_){}
  var d=I18N[LANG]||I18N.en; var v=d[k]; return v!=null?v:(LANG==='th'?I18N.th[k]:I18N.en[k]);
}
function _vbag(){var o={};Object.keys(I18N.th).forEach(function(k){o[k]=_vtx(k);});return o;}
window.__hkOverlayApply=function(l){LANG=normLang(l);render();};

function render(){
  var t = _vbag();
  document.documentElement.lang = LANG;
  document.title = t.title;
  document.getElementById('t_eye').textContent = t.eye;
  document.getElementById('t_home').textContent = t.home;
  document.getElementById('langBtn').textContent = LANG.toUpperCase();
  document.getElementById('t_email_l').textContent = t.email_l;
  document.getElementById('resendBtn').textContent = t.cta_resend;

  var badge = document.getElementById('badge');
  var h1 = document.getElementById('t_h1');
  var sub = document.getElementById('t_sub');
  var actions = document.getElementById('actions');
  var resendBox = document.getElementById('resendBox');

  if (OK) {
    badge.textContent = t.ok_badge;
    badge.className = 'badge ok';
    h1.textContent = t.ok_h1;
    sub.textContent = t.ok_sub;
    actions.innerHTML =
      '<a class="btn btn-primary" href="/today">' + t.cta_today + '</a>' +
      '<a class="btn btn-ghost" href="/signup?tab=login">' + t.cta_login + '</a>';
    resendBox.style.display = 'none';
  } else {
    badge.textContent = t.err_badge;
    badge.className = 'badge err';
    h1.textContent = t.err_h1;
    sub.textContent = ERR ? decodeURIComponent(ERR) : t.err_sub;
    if (ERR && !sub.textContent) sub.textContent = t.err_sub;
    actions.innerHTML =
      '<a class="btn btn-ghost" href="/signup?tab=login">' + t.cta_login + '</a>' +
      '<a class="btn btn-ghost" href="/signup">' + t.cta_signup + '</a>';
    resendBox.style.display = 'block';
  }
}

function cycleLang(){
  LANG = LANGS[(LANGS.indexOf(LANG)+1)%LANGS.length];
  try{ localStorage.setItem('hk_locale',LANG); localStorage.setItem('hk_lang',LANG); }catch(e){}
  render();
}
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',cur);
  localStorage.setItem('hk_theme',cur);
  document.getElementById('themeBtn').textContent = cur==='light'?'☀':'☾';
}

async function resendVerify(){
  var t = _vbag();
  var email = (document.getElementById('emailIn').value || '').trim();
  var msg = document.getElementById('msg');
  var btn = document.getElementById('resendBtn');
  if (!email || email.indexOf('@') < 0) {
    msg.textContent = t.resend_need; msg.className = 'msg err'; return;
  }
  btn.disabled = true;
  msg.textContent = t.resend_sending; msg.className = 'msg';
  try {
    var r = await fetch('/api/auth/send-email-verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    });
    var j = await r.json().catch(function(){ return {}; });
    if (r.ok) {
      msg.textContent = t.resend_ok; msg.className = 'msg ok';
    } else {
      msg.textContent = '⚠ ' + (j.error || t.resend_fail); msg.className = 'msg err';
    }
  } catch (_) {
    msg.textContent = t.resend_fail; msg.className = 'msg err';
  }
  btn.disabled = false;
}

(function(){
  var th = localStorage.getItem('hk_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', th);
  document.getElementById('themeBtn').textContent = th==='light'?'☀':'☾';
  /* prefill email from query if any */
  var em = params.get('email');
  if (em) document.getElementById('emailIn').value = em;
  render();
})();
</script>

<script>
(function(){try{
var l=localStorage.getItem('hk_locale')||localStorage.getItem('hk_lang')||'';
if(!l||['th','en','zh'].indexOf(l)!==-1)return;
var n=0;(function boot(){
if(!(window.HK&&window.HK.i18n&&window.HK.i18n.loadOverlay)){if(++n<200)setTimeout(boot,50);return;}
window.HK.i18n.loadOverlay(l).then(function(ov){if(!ov)return;try{if(typeof window.__hkOverlayApply==='function')window.__hkOverlayApply(l);}catch(_){}});
})();
}catch(_){}})();
</script>
